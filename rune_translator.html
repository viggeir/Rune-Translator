<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rune Translator — Endrborninn</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#d4c9a8;font-family:'Cinzel',serif;padding:2rem 1.5rem 3rem;min-height:100vh}
.title-rune{font-size:22px;color:#c9a84c;letter-spacing:5px;margin-bottom:6px}
h1{font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:#e8dfc0;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.subtitle{font-family:'IM Fell English',serif;font-size:13px;color:#7a6e52;font-style:italic;margin-bottom:1.5rem;letter-spacing:.5px}
textarea{width:100%;min-height:90px;background:#0d0b06;border:1px solid #3a3020;border-radius:8px;padding:14px 16px;font-family:'IM Fell English',serif;font-size:16px;color:#d4c9a8;resize:vertical;line-height:1.6;outline:none;margin-bottom:.85rem;transition:border-color .2s}
textarea:focus{border-color:#6b5230}
textarea::placeholder{color:#3d3525;font-style:italic}
[contenteditable="true"]{outline:none}
[contenteditable="true"]:focus{border-color:#6b5230}
.on-output[contenteditable="true"],.rune-output[contenteditable="true"]{background:#0d0b06;border:1px solid #3a3020;border-radius:8px;padding:14px 16px;margin-bottom:.85rem;transition:border-color .2s;cursor:text;min-height:90px}
.rune-output[contenteditable="true"]:focus .tip{opacity:0}
.step-block{background:#0a0804;border:1px solid #2e2516;border-radius:8px;padding:14px 16px;margin-bottom:.85rem;position:relative}
.step-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#4a3e28;margin-bottom:8px}
.on-output{font-family:'IM Fell English',serif;font-size:18px;color:#a08840;line-height:1.6;min-height:28px;word-break:break-word}
.on-output .unknown{color:#5c4e2a;font-style:italic;text-decoration:underline;text-decoration-style:dotted;cursor:help}
.rune-output{font-family:'IM Fell English',serif;font-size:30px;letter-spacing:7px;color:#c9a84c;line-height:1.5;word-break:break-all;display:flex;flex-wrap:wrap;align-items:center;min-height:44px}
.rune-char{display:inline-block;cursor:default;transition:color .12s,transform .1s}
.rune-char:hover{color:#e8c76a;transform:scale(1.18)}
.rune-char.space{width:14px}
.tooltip-wrap{position:relative;display:inline-block}
.tooltip-wrap:hover .tip{opacity:1;transform:translateX(-50%) translateY(-4px)}
.tip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%) translateY(0);background:#1a1408;border:1px solid #4a3e20;border-radius:5px;padding:4px 9px;font-size:10px;font-family:'Cinzel',serif;color:#a08840;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;z-index:20;letter-spacing:.5px}
.copy-btn{position:absolute;top:10px;right:10px;background:transparent;border:1px solid #2e2516;border-radius:5px;padding:4px 10px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#4a3e28;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:#8a6d2f;color:#c9a84c}
.placeholder-text{font-family:'IM Fell English',serif;font-size:14px;color:#3d3525;font-style:italic}

.ref-toggle .label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#4a3e28;transition:color .15s}
.ref-toggle:hover .label{color:#8a6d2f}
.ref-toggle .arrow{font-size:9px;color:#3d3220;transition:transform .2s}

.futhark-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px;margin-top:1rem}
.rune-card{display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;border:1px solid #2a2010;border-radius:7px;background:#0a0804}
.rune-card .r{font-size:22px;color:#c9a84c;margin-bottom:3px;line-height:1}
.rune-card .l{font-size:9px;color:#7a6e52;font-family:'Cinzel',serif;letter-spacing:1px;text-transform:uppercase}
.rune-card .n{font-size:8px;color:#4a3e28;font-family:'IM Fell English',serif;font-style:italic;margin-top:2px}
</style>
</head>
<body>

<div class="title-rune">ᚠᚢᚦᚬᚱᚴᚼᚾᛁᛋᛏᛒᛚᛘ</div>
<h1>Rune Translator</h1>
<p class="subtitle">English ↔ Old Norse ↔ Younger Futhark</p>

<textarea id="inp" placeholder="Enter English text..." onfocus="activeInput='english'" oninput="if(activeInput==='english') performTranslation()"></textarea>

<div class="step-block">
  <div class="step-label">Old Norse</div>
  <div class="on-output" id="onOut" contenteditable="true" spellcheck="false" onfocus="activeInput='oldnorse'; clearOtherFields('oldnorse')" oninput="if(activeInput==='oldnorse') performTranslation()"><span class="placeholder-text">Old Norse will appear here</span></div>
  <div class="unknown-key" id="unknownKey" style="display:none"></div>
  <button class="copy-btn" onclick="copyON()">Copy</button>
</div>

<div class="step-block">
  <div class="step-label">Younger Futhark</div>
  <div class="rune-output" id="runeOut" contenteditable="true" spellcheck="false" onfocus="activeInput='runes'; clearOtherFields('runes')" oninput="if(activeInput==='runes') performTranslation()"><span class="placeholder-text">Runes will appear here</span></div>
  <button class="copy-btn" onclick="copyRunes()">Copy</button>
</div>

<div class="ref-toggle" id="refToggle" onclick="toggleRef()">
  <span class="arrow">▶</span>
  <span class="label">Younger Futhark Reference</span>
</div>
<div id="refSection" style="display:none">
  <div class="divider"></div>
  <div class="futhark-grid" id="futharkGrid"></div>
</div>

<script>
// ─── YOUNGER FUTHARK — 16 runes, Viking Age ─────────────────────────────────
// Historically correct: Younger Futhark intentionally collapses distinctions.
// One rune covers multiple sounds — ambiguity is a feature, not a bug.
const FUTHARK = [
  {r:'ᚠ', sounds:['f','v'],        name:'Fé'},
  {r:'ᚢ', sounds:['u','w'],        name:'Úr'},
  {r:'ᚦ', sounds:['th','dh'],      name:'Þurs'},
  {r:'ᛅ', sounds:['a'],            name:'Ár'},
  {r:'ᚬ', sounds:['o'],            name:'Óss'},
  {r:'ᚱ', sounds:['r'],            name:'Reið'},
  {r:'ᛦ', sounds:['r_final'],      name:'Ýr'},
  {r:'ᚴ', sounds:['k','g'],        name:'Kaun'},
  {r:'ᚼ', sounds:['h'],            name:'Hagall'},
  {r:'ᚾ', sounds:['n'],            name:'Nauðr'},
  {r:'ᛁ', sounds:['i','e','j','y'],name:'Íss'},
  {r:'ᛋ', sounds:['s','z'],        name:'Sól'},
  {r:'ᛏ', sounds:['t','d'],        name:'Týr'},
  {r:'ᛒ', sounds:['b','p'],        name:'Bjarkan'},
  {r:'ᛚ', sounds:['l'],            name:'Lögr'},
  {r:'ᛘ', sounds:['m'],            name:'Maðr'},
];

// Build sound → rune lookup (first assignment wins)
const soundToRune = {};
FUTHARK.forEach(f => {
  f.sounds.forEach(s => { if(!soundToRune[s]) soundToRune[s] = {r:f.r, name:f.name}; });
});

// Build rune → sounds mapping (for reverse translation)
const RUNE_TO_SOUNDS = {};
FUTHARK.forEach(f => {
  RUNE_TO_SOUNDS[f.r] = f.sounds;
});

// ─── ACTIVE INPUT TRACKING ────────────────────────────────────────────────────
let activeInput = 'english'; // 'english', 'oldnorse', 'runes'

// ─── OLD NORSE PHONEME RULES → YOUNGER FUTHARK SOUNDS ───────────────────────
// Sorted longest-first so digraphs match before single chars.
const ON_RULES = [
  // Digraphs & special sequences
  ['ng', 'nk'],   // ng → nk (historically more accurate for YF)
  ['nk', 'nk'],   // nk → nk (historically written as n+k)
  ['kk', 'k'], ['gg', 'k'],
  ['tt', 't'], ['dd', 't'],
  ['nn', 'n'], ['ll', 'l'], ['rr', 'r'],
  ['ff', 'f'], ['ss', 's'], ['mm', 'm'],
  ['bb', 'b'], ['pp', 'b'],
  ['ei', 'i'], ['ey', 'i'],
  ['au', 'u'],
  ['kv', 'k'],   // kv = k sound in YF
  // ON special characters
  ['þ',  'th'], ['ð',  'th'],
  ['æ',  'a'],  ['œ',  'i'],
  ['ø',  'o'],  ['ö',  'o'], ['ǫ', 'o'],
  ['á',  'a'],  ['é',  'i'], ['í', 'i'],
  ['ó',  'o'],  ['ú',  'u'], ['ý', 'i'],
  // Plain letters — YF collapses
  ['a','a'], ['b','b'], ['d','t'], ['e','i'], ['f','f'],
  ['g','k'], ['h','h'], ['i','i'], ['j','i'], ['k','k'],
  ['l','l'], ['m','m'], ['n','n'], ['o','o'], ['p','b'],
  ['r','r'], ['s','s'], ['t','t'], ['u','u'], ['v','f'],
  ['w','u'], ['y','i'], ['z','s'],
];
const ON_SORTED = [...ON_RULES].sort((a,b) => b[0].length - a[0].length);

// ─── PRE-COMPILED REGEX PATTERNS (Performance Optimization) ─────────────────
// Regex compilation is expensive - pre-compile once instead of on every call
const REGEX_WORD_SPLIT = /[a-záéíóúýæøöǫþðä'-]+|[^a-záéíóúýæøöǫþðä\s]+|\s+/g;
const REGEX_WHITESPACE = /\s+/;
const REGEX_SPACE_ONLY = /^\s+$/;
const REGEX_HAS_LETTER = /[a-záéíóúýæøöǫþðä]/;
const REGEX_NEWLINE = /\n/;
const REGEX_BRACKET_TEXT = /\[([^\]]*)\]/;

function onToRunes(text) {
  // Input validation
  if(!text || typeof text !== 'string') return [];
  if(text.length > 10000) text = text.substring(0, 10000);

  const lower = text.toLowerCase();
  let i = 0;
  const result = [];

  // Helper: check if position is a word boundary (end of word)
  const isWordBoundary = (pos) => {
    if(pos >= lower.length) return true;
    const ch = lower[pos];
    return /[\s\n\-.,;:!?\[\]]/.test(ch);
  };

  while(i < lower.length) {
    if(lower[i] === ' ') { result.push({space:true}); i++; continue; }
    if(lower[i] === '\n') { result.push({newline:true}); i++; continue; }
    // Handle brackets (pass through as marker text, not runes)
    if(lower[i] === '[') {
      let endIdx = lower.indexOf(']', i);
      if(endIdx !== -1) {
        const unknownText = lower.substring(i+1, endIdx);
        result.push({text:'['+unknownText+']', isUnknown:true});
        i = endIdx + 1;
        continue;
      }
    }
    // Skip true geminates (already handled by rules, catch any remaining)
    if(i > 0 && lower[i] === lower[i-1] && !'aeiouáéíóúýæøöǫ'.includes(lower[i])) { i++; continue; }
    let matched = false;
    for(const [pat, sound] of ON_SORTED) {
      if(lower.slice(i, i+pat.length) === pat) {
        // Special handling for 'r': use r_final if at end of word
        let finalSound = sound;
        if(pat === 'r' && isWordBoundary(i + pat.length)) {
          finalSound = 'r_final';
        }

        const entry = soundToRune[finalSound];
        if(entry) result.push({rune:entry.r, name:entry.name});
        i += pat.length; matched = true; break;
      }
    }
    if(!matched) i++;
  }
  return result;
}

// ─── REVERSE TRANSLATION: OLD NORSE → ENGLISH ────────────────────────────────
function onToEnglish(text) {
  // Input validation
  if(!text || typeof text !== 'string') return { text: '', unknowns: [] };
  if(text.length > 10000) text = text.substring(0, 10000);

  // Split by lines to preserve structure
  const lines = text.split('\n');
  const allResults = [];
  const allUnknowns = [];
  
  lines.forEach(line => {
    const words = line.toLowerCase().split(REGEX_WHITESPACE).filter(w => w.length > 0);
    const result = [];
    const unknowns = [];

    words.forEach(word => {
      // Handle bracketed unknowns (from marked unknowns)
      if(word.startsWith('[') && word.endsWith(']')) {
        const bracketed = word.slice(1, -1);
        result.push('[' + bracketed + ']');
        unknowns.push(bracketed);
        return;
      }

      // Remove punctuation for lookup
      const cleanWord = word.replace(/[.,!?;:\-'"]/g, '');
      const translation = ON_TO_EN[cleanWord];

      if(translation) {
        result.push(translation);
      } else {
        result.push(word);
        unknowns.push(cleanWord);
      }
    });

    allResults.push(result.join(' '));
    allUnknowns.push(...unknowns);
  });

  return {
    text: allResults.join('\n'),
    unknowns: allUnknowns
  };
}

// ─── REVERSE TRANSLATION: RUNES → OLD NORSE ───────────────────────────────────
// Converts rune characters to phoneme combinations, then matches against ON dictionary
function runesToOldNorse(runeText) {
  // Input validation
  if(!runeText || typeof runeText !== 'string') return { text: '', unknowns: [] };
  if(runeText.length > 10000) runeText = runeText.substring(0, 10000);

  // Split by lines to preserve structure
  const lines = runeText.split('\n');
  const allResults = [];
  const allUnknowns = [];
  
  lines.forEach(line => {
    // Extract rune characters and spaces for this line
    const runes = [];
    let currentWord = [];

    for(let char of line) {
      if(char === ' ') {
        if(currentWord.length > 0) {
          runes.push(currentWord);
          currentWord = [];
        }
      } else if(RUNE_TO_SOUNDS[char]) {
        currentWord.push(char);
      }
    }
    if(currentWord.length > 0) runes.push(currentWord);

    // Convert each rune word to phoneme sequences and find best matches
    const result = [];
    const unknowns = [];

    runes.forEach(runeWord => {
      const onWord = findBestOldNorseMatch(runeWord);
      if(onWord) {
        result.push(onWord);
      } else {
        const runeStr = runeWord.join('');
        result.push(runeStr);
        unknowns.push(runeStr);
      }
    });

    allResults.push(result.join(' '));
    allUnknowns.push(...unknowns);
  });

  return {
    text: allResults.join('\n'),
    unknowns: allUnknowns
  };
}

// Helper: Find best Old Norse word matching a rune sequence
// Uses phoneme combinations and scores by match quality
function findBestOldNorseMatch(runeWord) {
  const phonemeOptions = runeWord.map(r => RUNE_TO_SOUNDS[r] || []);

  // Generate all possible phoneme combinations (depth-first)
  const allCombinations = generatePhonemeSequences(phonemeOptions);

  // Try to match each combination against ON dictionary
  for(const phoneStr of allCombinations) {
    const onWord = matchPhonemeToOldNorse(phoneStr);
    if(onWord) return onWord;
  }

  return null;
}

// Generate all possible phoneme sequences from rune ambiguity
function generatePhonemeSequences(phonemeOptions) {
  if(phonemeOptions.length === 0) return [];
  if(phonemeOptions.length === 1) return phonemeOptions[0] || [];

  const sequences = [];
  const firstOptions = phonemeOptions[0];
  const restSequences = generatePhonemeSequences(phonemeOptions.slice(1));

  firstOptions.forEach(first => {
    restSequences.forEach(rest => {
      sequences.push(first + rest);
    });
  });

  return sequences;
}

// Try to match a phoneme string to an Old Norse word
// Uses fuzzy matching with priority for exact matches
function matchPhonemeToOldNorse(phoneStr) {
  // First, try exact match in ON_TO_EN keys
  for(const onWord of Object.keys(ON_TO_EN)) {
    const onPhones = onWord.toLowerCase();
    // Simple phoneme-to-text mapping check
    if(onPhones === phoneStr) return onWord;
  }

  // Second, try matching the phoneme string against ON words
  // Convert ON text to rough phoneme representation and compare
  for(const onWord of Object.keys(ON_TO_EN)) {
    const normalized = normalizeToPhonemes(onWord);
    if(normalized === phoneStr) return onWord;
  }

  return null;
}

// Normalize Old Norse word to approximate phoneme string
function normalizeToPhonemes(onWord) {
  let phonemes = '';
  let i = 0;
  const lower = onWord.toLowerCase();

  while(i < lower.length) {
    let matched = false;
    for(const [pat, sound] of ON_SORTED) {
      if(lower.slice(i, i + pat.length) === pat) {
        phonemes += sound;
        i += pat.length;
        matched = true;
        break;
      }
    }
    if(!matched) i++;
  }

  return phonemes;
}

// ─── PRONOUN CASE TABLE ──────────────────────────────────────────────────────
// Each personal pronoun has nominative (subject) and accusative (object) forms.
// Dative included for prepositional contexts (to me, with him, etc.)
const PRONOUNS = {
  'i':    { nom:'ek',   acc:'mik',   dat:'mér' },
  'you':  { nom:'þú',   acc:'þik',   dat:'þér' },
  'he':   { nom:'hann', acc:'hann',  dat:'honum' },
  'she':  { nom:'hon',  acc:'hana',  dat:'henni' },
  'it':   { nom:'þat',  acc:'þat',   dat:'því' },
  'we':   { nom:'vér',  acc:'oss',   dat:'oss' },
  'they': { nom:'þeir', acc:'þá',    dat:'þeim' },
};

// English subject pronouns — used to detect nominative position
const SUBJECT_PRONOUNS = new Set(['i','you','he','she','it','we','they','who']);

// English object/preposition pronouns — used to detect accusative position
const OBJECT_PRONOUNS  = new Set(['me','you','him','her','it','us','them','whom']);

// Prepositions that trigger dative in ON
// Note: 'to' is genitive in Old Norse, not dative — removed for accuracy
const DATIVE_PREPS = new Set(['with','at','from','by','beside','between','against','within','after','before']);
// "to" is dative EXCEPT after motion verbs (where it's accusative)
// Motion verbs handle "to" separately in Step 5b
const DATIVE_PREPS_WITH_TO = new Set([...DATIVE_PREPS, 'to']);

// V2 (Verb-Second) adverbs that trigger reordering
// Only these specific adverbs consistently trigger V2 in Old Norse
const V2_ADVERBS = new Set(['then','now','so']);

// Motion verbs that take accusative object without preposition
// For these, "to" means motion → remove preposition, use accusative
const MOTION_VERBS = new Set(['go','come','travel','walk','ride','sail','fly','move','run','return','drive']);

// Auxiliary/modal verbs (tense-bearers in compound forms)
// For V2, prefer to move the MAIN verb, not the auxiliary
// However, in present tense system, these are finite forms themselves
// Strategy: if only auxiliary present, move it; if main verb after, move main verb
const AUXILIARY_VERBS = new Set(['be','have','will','shall','can','may','must','need','want']);

// ─── VERB CONJUGATION TABLE ──────────────────────────────────────────────────
// Present tense, indicative. Keyed by English infinitive → forms by ON subject pronoun.
// Pronouns: ek, þú, hann/hon/þat, vér, þér (plural you), þeir
// Structure: [ek, þú, hann, vér, þér, þeir]
const CONJ = {
  // vera — to be (irregular)
  'be':     ['em',    'ert',   'er',    'erum',   'eruð',   'eru'],
  // hafa — to have (weak)
  'have':   ['hefi',  'hefir', 'hefir', 'höfum',  'hafið',  'hafa'],
  // elska — to love (weak class 2)
  'love':   ['elska', 'elskar','elskar','elskum',  'elskið', 'elska'],
  // sjá — to see (strong class 5)
  'see':    ['sé',    'sér',   'sér',   'séum',   'séið',   'sjá'],
  // fara — to go (strong class 6)
  'go':     ['fer',   'ferr',  'ferr',  'förum',  'farið',  'fara'],
  // koma — to come (strong class 4)
  'come':   ['kem',   'kemr',  'kemr',  'komum',  'komið',  'koma'],
  // vita — to know (preterite-present)
  'know':   ['veit',  'veizt', 'veit',  'vitum',  'vitið',  'vitu'],
  // gefa — to give (strong class 5)
  'give':   ['gef',   'gefr',  'gefr',  'gefum',  'gefið',  'gefa'],
  // taka — to take (strong class 6)
  'take':   ['tek',   'tekr',  'tekr',  'tökum',  'takið',  'taka'],
  // segja — to say (weak)
  'say':    ['segi',  'segir', 'segir', 'segjum', 'segið',  'segja'],
  // gera — to do/make (weak)
  'do':     ['geri',  'gerir', 'gerir', 'gerum',  'gerið',  'gera'],
  'make':   ['geri',  'gerir', 'gerir', 'gerum',  'gerið',  'gera'],
  // vilja — to want (preterite-present)
  'want':   ['vil',   'vilt',  'vill',  'viljum', 'vilið',  'vilja'],
  // munu — will (modal)
  'will':   ['mun',   'munt',  'mun',   'munum',  'munuð',  'munu'],
  // skulu — shall (modal)
  'shall':  ['skal',  'skalt', 'skal',  'skulum', 'skuluð', 'skulu'],
  // mega — may (preterite-present)
  'may':    ['má',    'mátt',  'má',    'megum',  'megið',  'mega'],
  // kunna — can (preterite-present)
  'can':    ['kann',  'kannt', 'kann',  'kunnum', 'kunnið', 'kunna'],
  // þurfa — must/need (preterite-present)
  'must':   ['þarf',  'þarft', 'þarf',  'þurfum', 'þurfið', 'þurfa'],
  'need':   ['þarf',  'þarft', 'þarf',  'þurfum', 'þurfið', 'þurfa'],
  // finna — to find/feel (strong class 3)
  'find':   ['finn',  'finnr', 'finnr', 'finnum', 'finnið', 'finna'],
  'feel':   ['finn',  'finnr', 'finnr', 'finnum', 'finnið', 'finna'],
  // halda — to hold/keep (strong class 7)
  'hold':   ['held',  'heldr', 'heldr', 'höldum', 'haldið', 'halda'],
  'keep':   ['held',  'heldr', 'heldr', 'höldum', 'haldið', 'halda'],
  // standa — to stand (strong class 6)
  'stand':  ['stend', 'stendr','stendr','stöndum','standið','standa'],
  // ganga — to walk/go (strong class 7)
  'walk':   ['geng',  'gengr', 'gengr', 'göngum', 'gangið', 'ganga'],
  // ríða — to ride (strong class 1)

// Smart pattern-based system to detect multiple meanings of words
const CONTEXT_PATTERNS = {
  // Adjective patterns - word modifies a noun
  adjective: [
    // Direct noun modification: "yellow flower", "sweet rose"
    {
      test: (word, prev, next, tokens, idx) => {
        return next && NOUN_GENDER[next] && !ADJECTIVES[next];
      }
    },
    // Modifies another adjective: "bright yellow", "deep yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return next && ADJECTIVES[next];
      }
    }
  ],
  
  // Noun patterns - word is used as a noun
  noun: [
    // After color words: "the color yellow", "a shade of yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return prev && ['color', 'hue', 'shade', 'tint'].includes(prev);
      }
    },
    // After determiners as standalone: "the yellow", "a yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return prev && ['the', 'a', 'an'].includes(prev) && (!next || !NOUN_GENDER[next]);
      }
    },
    // In color lists: "red, yellow, and blue"
    {
      test: (word, prev, next, tokens, idx) => {
        return (prev === ',' || (prev && ADJECTIVES[prev])) && 
               (next === ',' || next === 'and' || (next && ADJECTIVES[next]));
      }
    }
  ],
  
  // Verb patterns - word is used as a verb
  verb: [
    // With verb endings: "yellows", "yellowed", "yellowing"
    {
      test: (word, prev, next, tokens, idx) => {
        return ['yellows', 'yellowed', 'yellowing'].includes(word);
      }
    },
    // After subject noun: "pages yellow", "leaves yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return prev && NOUN_GENDER[prev] && 
               (!next || ['with', 'in', 'over', 'under'].includes(next) || 
                next.startsWith('year') || next.startsWith('age'));
      }
    },
    // With modal verbs: "will yellow", "can yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return prev && ['will', 'would', 'can', 'could', 'may', 'might', 'shall', 'should'].includes(prev);
      }
    }
  ]
};

// Smart word sense detection function
function detectWordSense(word, context) {
  const senses = MULTI_SENSE_WORDS[word.toLowerCase()];
  if (!senses) return null; // Word has single meaning
  
  // Check patterns in priority order: adjective > noun > verb
  const priorityOrder = ['adjective', 'noun', 'verb'];
  
  for (const wordType of priorityOrder) {
    if (!senses[wordType]) continue;
    
    const patterns = CONTEXT_PATTERNS[wordType];
    for (const pattern of patterns) {
      if (pattern.test(word, context.prev, context.next, context.tokens, context.idx)) {
        return wordType;
      }
    }
  }
  
  // Fallback to most common usage (for colors, it's usually adjective)
  return senses.adjective ? 'adjective' : senses.noun ? 'noun' : 'verb';
}

// ─── TOKENIZER COMPONENT ─────────────────────────────────────────────────────────────
// Breaks input into meaningful units: words, phrases, punctuation, spaces
function tokenize(input) {
  // Enhanced tokenization that preserves multi-word expressions and handles punctuation
  const tokens = [];
  let i = 0;
  
  while (i < input.length) {
    // Skip whitespace but record as space token
    if (/\s/.test(input[i])) {
      let space = '';
      while (i < input.length && /\s/.test(input[i])) {
        space += input[i++];
      }
      tokens.push({ type: 'space', value: space });
      continue;
    }
    
    // Handle punctuation
    if (/[.,!?;:()[\]"']/.test(input[i])) {
      tokens.push({ type: 'punctuation', value: input[i] });
      i++;
      continue;
    }
    
    // Extract word/phrase
    let word = '';
    while (i < input.length && /[a-zA-Záéíóúýæøöǫþðä'-]/.test(input[i])) {
      word += input[i++];
    }
    
    if (word) {
      tokens.push({ 
        type: 'word', 
        value: word.toLowerCase(),
        original: word
      });
    }
  }
  
  return tokens;
}

// ─── PHRASE PARSER COMPONENT ───────────────────────────────────────────────────────
// Identifies phrases, compounds, and grammatical structures
function parsePhrases(tokens) {
  const phrases = [];
  let i = 0;
  
  while (i < tokens.length) {
    const token = tokens[i];
    
    if (token.type === 'space' || token.type === 'punctuation') {
      phrases.push(token);
      i++;
      continue;
    }
    
    // Look for multi-word phrases and compounds (including possessives)
    const phrase = detectPhrase(tokens, i);
    if (phrase) {
      phrases.push(phrase);
      i += phrase.length;
    } else {
      // Single word
      phrases.push({
        type: 'word',
        value: token.value,
        original: token.original,
        length: 1
      });
      i++;
    }
  }
  
  return phrases;
}

// Detect multi-word phrases, compounds, and expressions
function detectPhrase(tokens, startIndex) {
  const maxPhraseLength = 4; // Look ahead up to 4 words
  let bestPhrase = null;
  
  for (let length = maxPhraseLength; length >= 2; length--) {
    const phraseTokens = [];
    let phraseString = '';
    let actualLength = 0;
    
    for (let j = startIndex; j < Math.min(tokens.length, startIndex + length * 2); j++) {
      const token = tokens[j];
      
      if (token.type === 'space') {
        phraseString += ' ';
        continue;
      }
      
      if (token.type === 'word') {
        phraseString += token.value;
        phraseTokens.push(token);
        actualLength++;
      } else {
        break; // Stop at non-word, non-space
      }
      
      if (actualLength === length) break;
    }
    
    if (actualLength === length) {
      // Check if this phrase exists in dictionary or can be formed as compound
      const translation = EN_TO_ON[phraseString];
      if (translation) {
        bestPhrase = {
          type: 'phrase',
          value: phraseString,
          translation: translation,
          tokens: phraseTokens,
          length: phraseTokens.length + (phraseTokens.length - 1), // words + spaces
          confidence: 1.0
        };
        break; // Found exact match, use longest possible
      } else {
        // Try compound formation for different patterns FIRST
        let compound = null;
        
        if (length === 2) {
          // Simple 2-word compound
          compound = trySmartCompound(phraseTokens[0]?.value, phraseTokens[1]?.value);
        } else if (length === 3) {
          // Try 3-word patterns: possessive + compound, adjective + noun + noun, etc.
          const word1 = phraseTokens[0]?.value;
          const word2 = phraseTokens[1]?.value;
          const word3 = phraseTokens[2]?.value;
          
          if (word1 && word2 && word3) {
            // Check for possessive + compound pattern (e.g., "my shield maiden")
            if (POSSESSIVES[word1]) {
              const innerCompound = trySmartCompound(word2, word3);
              if (innerCompound) {
                const gender = innerCompound.gender || 'm';
                const possForm = POSSESSIVES[word1];
                const form = gender === 'f' ? possForm.fem_sg
                           : gender === 'n' ? possForm.neut_sg
                           : possForm.masc_sg;

                compound = { 
                  on: `${form} ${innerCompound.on}`, 
                  gender: gender,
                  type: 'possessive-compound'
                };
              }
            }
            
            // If not possessive + compound, check for known special compounds
            if (!compound) {
              if (SPECIAL_COMPOUNDS[phraseString]) {
                compound = SPECIAL_COMPOUNDS[phraseString];
            } else {
              // Try adjective + (noun1 + noun2 compound)
              const innerCompound = trySmartCompound(word2, word3);
              if (innerCompound) {
                // Check if first word is a color
                const colors = {
                  'yellow': 'gull',
                  'red': 'rauð',
                  'blue': 'blá',
                  'green': 'græn',
                  'white': 'hvít',
                  'black': 'svart',
                };
                
                // Check if first word is a color OR if we have a known color compound
                if (colors[word1] || (word1 === 'sweet' && colors[word2])) {
                  const actualColor = colors[word2] || colors[word1];
                  compound = { on: actualColor + innerCompound.on, gender: innerCompound.gender };
                }
              }
            }
            }
          }
        } else if (length === 4) {
          // Try 4-word patterns: possessive + known 3-word compound
          const word1 = phraseTokens[0]?.value;
          const remainingWords = phraseTokens.slice(1).map(t => t.value).join(' ');
          
          if (word1 && POSSESSIVES[word1]) {
            if (SPECIAL_COMPOUNDS[remainingWords]) {
              const knownCompound = SPECIAL_COMPOUNDS[remainingWords];
              const gender = knownCompound.gender;
              const possForm = POSSESSIVES[word1];
              const form = gender === 'f' ? possForm.fem_sg
                         : gender === 'n' ? possForm.neut_sg
                         : possForm.masc_sg;

              compound = { 
                on: `${form} ${knownCompound.on}`, 
                gender: gender,
                type: 'possessive-compound'
              };
            }
          }
        }
        
        if (compound) {
          bestPhrase = {
            type: compound.type === 'possessive-compound' ? 'possessive-compound' : 'compound',
            value: phraseString,
            translation: compound.on,
            tokens: phraseTokens,
            length: phraseTokens.length + (phraseTokens.length - 1),
            confidence: 0.8,
            gender: compound.gender
          };
          break;
        }
        
        // Fallback: Check for simple possessive + noun pattern (e.g., "my shield")
        if (length === 2 && POSSESSIVES[phraseTokens[0]?.value]) {
          const possessive = phraseTokens[0]?.value;
          const noun = phraseTokens[1]?.value;
          const nounTranslation = EN_TO_ON[noun] || EN_TO_ON[LEMMAS[noun]];
          
          if (nounTranslation) {
            const gender = NOUN_GENDER[noun] || NOUN_GENDER[LEMMAS[noun]] || 'm';
            const possForm = POSSESSIVES[possessive];
            const form = gender === 'f' ? possForm.fem_sg
                       : gender === 'n' ? possForm.neut_sg
                       : possForm.masc_sg;

            bestPhrase = {
              type: 'possessive-phrase',
              value: phraseString,
              translation: `${form} ${nounTranslation}`,
              tokens: phraseTokens,
              length: phraseTokens.length + (phraseTokens.length - 1),
              confidence: 0.9,
              gender: gender,
              possessive: possessive,
              noun: noun
            };
            break;
          }
        }
      }
    }
  }

  return bestPhrase;
}

// ─── GRAMMAR ENGINE COMPONENT ───────────────────────────────────────────────────────
// Handles agreement, case, conjugation, and grammatical rules
class GrammarEngine {
  constructor() {
    this.context = {
      subject: null,
      verb: null,
      objects: [],
      prepositions: [],
      case: 'nominative'
    };
  }
  
  // Analyze grammatical structure of a phrase
  analyzePhrase(phrases) {
    const analysis = [];
    
    for (let i = 0; i < phrases.length; i++) {
      const phrase = phrases[i];
      
      if (phrase.type === 'space' || phrase.type === 'punctuation') {
        analysis.push(phrase);
        continue;
      }
      
      const wordAnalysis = this.analyzeWord(phrase, i, phrases);
      analysis.push(wordAnalysis);
    }
    
    return analysis;
  }
  
  // Analyze individual word/phrase grammatical properties
  analyzeWord(phrase, index, context) {
    const value = phrase.value;
    const analysis = { ...phrase };
    
    // Determine word type and grammatical properties
    if (PRONOUNS[value]) {
      analysis.wordType = 'pronoun';
      analysis.pronounData = PRONOUNS[value];
      analysis.case = this.determinePronounCase(index, context);
    } else if (CONJ[value]) {
      analysis.wordType = 'verb';
      analysis.verbData = CONJ[value];
      analysis.conjugation = 'base';
    } else if (ADJECTIVES[value]) {
      analysis.wordType = 'adjective';
      analysis.adjectiveData = ADJECTIVES[value];
    } else if (POSSESSIVES[value]) {
      analysis.wordType = 'possessive';
      analysis.possessiveData = POSSESSIVES[value];
    } else if (NOUN_GENDER[value]) {
      analysis.wordType = 'noun';
      analysis.gender = NOUN_GENDER[value];
      analysis.nounData = { gender: NOUN_GENDER[value] };
    } else if (phrase.translation) {
      // Pre-translated phrase or compound
      if (phrase.type === 'possessive-phrase') {
        analysis.wordType = 'possessive-phrase';
        analysis.translation = phrase.translation;
        analysis.gender = phrase.gender;
        analysis.possessive = phrase.possessive;
        analysis.noun = phrase.noun;
      } else if (phrase.type === 'possessive-compound') {
        analysis.wordType = 'possessive-compound';
        analysis.translation = phrase.translation;
        analysis.gender = phrase.gender;
      } else {
        analysis.wordType = 'translated';
        analysis.translation = phrase.translation;
        if (phrase.gender) analysis.gender = phrase.gender;
      }
    } else {
      // Try lemmatization and dictionary lookup
      const lemma = LEMMAS[value] || value;
      if (EN_TO_ON[lemma]) {
        analysis.wordType = 'dictionary';
        analysis.translation = EN_TO_ON[lemma];
        analysis.gender = NOUN_GENDER[lemma] || 'm';
      } else {
        analysis.wordType = 'unknown';
      }
    }
    
    return analysis;
  }
  
  // Determine pronoun case based on context
  determinePronounCase(index, context) {
    // Look for preceding prepositions
    for (let i = index - 1; i >= 0; i--) {
      const item = context[i];
      if (item.type === 'word' && DATIVE_PREPS.has(item.value)) {
        return 'dat';
      }
      if (item.type === 'word' && ['and', 'but', 'or'].includes(item.value)) {
        break; // New clause
      }
      if (item.type === 'punctuation') {
        break; // New sentence
      }
    }
    
    // Look for verbs to determine subject vs object
    let seenVerb = false;
    for (let i = 0; i < index; i++) {
      const item = context[i];
      if (item.type === 'word' && (CONJ[item.value] || item.wordType === 'verb')) {
        seenVerb = true;
        break;
      }
    }
    
    return seenVerb ? 'acc' : 'nom';
  }
  
  // Apply grammatical inflections and agreements
  applyInflections(analysis) {
    const inflected = [];
    let currentSubject = null;
    let currentGender = 'm';
    let currentNumber = 'singular';
    let currentCase = 'nom';
    
    for (let i = 0; i < analysis.length; i++) {
      const item = analysis[i];
      
      if (item.type === 'space' || item.type === 'punctuation') {
        inflected.push(item);
        continue;
      }
      
      switch (item.wordType) {
        case 'pronoun':
          const pronounForm = item.pronounData[item.case] || item.pronounData.nom;
          inflected.push({
            ...item,
            inflected: pronounForm,
            case: item.case
          });
          if (item.case === 'nom') {
            currentSubject = pronounForm;
            currentNumber = ['vér', 'þeir', 'þær', 'þau'].includes(pronounForm) ? 'plural' : 'singular';
          }
          break;
          
        case 'verb':
          if (currentSubject && item.verbData) {
            const conjugationIndex = this.getConjugationIndex(currentSubject, currentNumber);
            inflected.push({
              ...item,
              inflected: item.verbData[conjugationIndex] || item.verbData[2], // Default to 3rd person
              conjugation: conjugationIndex
            });
          } else {
            inflected.push({
              ...item,
              inflected: item.translation || item.value
            });
          }
          break;
          
        case 'adjective':
          const adjectiveForm = this.getAdjectiveForm(item.adjectiveData, currentGender, currentCase, currentNumber);
          inflected.push({
            ...item,
            inflected: adjectiveForm
          });
          break;
          
        case 'possessive-phrase':
          // Already translated with correct possessive form, just pass through
          inflected.push({
            ...item,
            inflected: item.translation
          });
          currentGender = item.gender || 'm';
          break;
          
        case 'possessive-compound':
          // Already translated possessive + compound, just pass through
          inflected.push({
            ...item,
            inflected: item.translation
          });
          currentGender = item.gender || 'm';
          break;
          
        case 'possessive':
          // Look ahead to find the noun this possessive modifies
          let targetGender = currentGender; // fallback to current
          for (let j = i + 1; j < analysis.length; j++) {
            const nextItem = analysis[j];
            if (nextItem.type === 'space' || nextItem.type === 'punctuation') continue;
            if (nextItem.wordType === 'noun') {
              targetGender = nextItem.gender;
              break;
            } else if (nextItem.type === 'compound' || nextItem.type === 'translated' || nextItem.type === 'phrase') {
              targetGender = nextItem.gender || 'm';
              break;
            } else if (nextItem.wordType === 'adjective') {
              // Skip adjectives, keep looking for the noun
              continue;
            } else {
              break; // Hit different type of word
            }
          }

          const possessiveForm = this.getPossessiveForm(item.possessiveData, targetGender);
          inflected.push({
            ...item,
            inflected: possessiveForm
          });
          break;
          
        case 'noun':
          const nounForm = this.getNounForm(item, currentCase, currentNumber);
          inflected.push({
            ...item,
            inflected: nounForm,
            gender: item.gender,
            case: currentCase
          });
          currentGender = item.gender;
          break;
          
        case 'translated':
        case 'compound':
          inflected.push({
            ...item,
            inflected: item.translation
          });
          if (item.gender) currentGender = item.gender;
          break;
          
        default:
          inflected.push({
            ...item,
            inflected: item.translation || item.original || item.value
          });
      }
    }
    
    return inflected;
  }
  
  // Get conjugation index for pronouns
  getConjugationIndex(subject, number) {
    const pronounIndex = PRON_TO_IDX[subject];
    if (pronounIndex !== undefined) return pronounIndex;
    return number === 'plural' ? 5 : 2; // 3rd person plural or singular
  }
  
  // Get appropriate adjective form
  getAdjectiveForm(adjectiveData, gender, case_, number) {
    const genderKey = gender === 'f' ? 'fem' : gender === 'n' ? 'neut' : 'masc';
    const caseKey = case_ || 'nom';
    const numberKey = number === 'plural' ? 'pl' : 'sg';
    const key = `${genderKey}_${caseKey}_${numberKey}`;
    return adjectiveData[key] || adjectiveData.base;
  }
  
  // Get appropriate possessive form
  getPossessiveForm(possessiveData, gender) {
    return gender === 'f' ? possessiveData.fem_sg :
           gender === 'n' ? possessiveData.neut_sg :
           possessiveData.masc_sg;
  }
  
  // Get appropriate noun form
  getNounForm(noun, case_, number) {
    if (noun.wordType === 'translated' && noun.translation) {
      return noun.translation; // Already translated phrase
    }
    
    const declension = NOUN_DECLENSION[noun.value];
    if (declension) {
      const caseKey = case_ || 'nom';
      const numberKey = number === 'plural' ? 'pl' : 'sg';
      const key = `${caseKey}_${numberKey}`;
      return declension[key] || noun.translation || noun.value;
    }
    
    return noun.translation || noun.value;
  }
}

// ─── MAIN TRANSLATION ORCHESTRATOR ────────────────────────────────────────────
function performTranslation() {
  const enInp   = document.getElementById('inp').value.trim();
  const onInp   = document.getElementById('onOut').textContent.trim();
  const runesInp = document.getElementById('runeOut').textContent.trim();
  const ukEl    = document.getElementById('unknownKey');

  // Enforce input length limits for security and performance
  const MAX_INPUT_LENGTH = 5000;
  if(enInp.length > MAX_INPUT_LENGTH || onInp.length > MAX_INPUT_LENGTH || runesInp.length > MAX_INPUT_LENGTH) {
    alert(`Input exceeds maximum length of ${MAX_INPUT_LENGTH} characters`);
    return;
  }

  // If active field is empty, clear other fields
  if((activeInput === 'english' && !enInp) || 
     (activeInput === 'oldnorse' && !onInp) || 
     (activeInput === 'runes' && !runesInp)) {
    clearOtherFields(activeInput);
    ukEl.style.display = 'none';
    return;
  }

  // If all fields are empty, clear everything
  if(!enInp && !onInp && !runesInp) {
    document.getElementById('onOut').textContent = '';
    document.getElementById('runeOut').textContent = '';
    ukEl.style.display = 'none';
    return;
  }

  let enStr = enInp;
  let onStr = onInp;
  let runesStr = runesInp;
  let allUnknowns = [];

  // Route based on active input
  if(activeInput === 'english' && enStr) {
    // NEW PHRASE-BASED PIPELINE: English → Old Norse → Runes
    const result = translateWithPhraseParser(enStr);
    onStr = result.oldNorse;
    allUnknowns = result.unknowns;
    runesStr = renderRunes(onStr);

  } else if(activeInput === 'oldnorse' && onStr) {
    // Old Norse → English + Runes (existing logic)
    const enResult = onToEnglish(onStr);
    enStr = enResult.text;
    allUnknowns = enResult.unknowns;
    runesStr = renderRunes(onStr);

  } else if(activeInput === 'runes' && runesInp) {
    // Runes → Old Norse → English (existing logic)
    const onResult = runesToOldNorse(runesInp);
    onStr = onResult.text;
    allUnknowns = onResult.unknowns;

    const enResult = onToEnglish(onStr.replace(/<[^>]*>/g, ''));
    enStr = enResult.text;
    allUnknowns.push(...enResult.unknowns);
  }

  // Update outputs (but don't update active input field to preserve cursor)
  updateAllOutputs(enStr, onStr, runesStr, allUnknowns, ukEl, activeInput);
}

// ─── NEW PHRASE-BASED TRANSLATION FUNCTION ────────────────────────────────────────
function translateWithPhraseParser(input) {
  const grammarEngine = new GrammarEngine();
  const unknowns = [];
  
  // Split by lines to preserve structure
  const lines = input.split('\n');
  const translatedLines = [];
  
  lines.forEach(line => {
    if (!line.trim()) {
      translatedLines.push('');
      return;
    }
    
    // Step 1: Tokenize
    const tokens = tokenize(line);

    // Step 2: Parse phrases
    const phrases = parsePhrases(tokens);

    // Step 3: Grammar analysis
    const analysis = grammarEngine.analyzePhrase(phrases);

    // Step 4: Apply inflections
    const inflected = grammarEngine.applyInflections(analysis);
    
    // Step 5: Build output string
    let oldNorseLine = '';
    inflected.forEach(item => {
      if (item.type === 'space') {
        oldNorseLine += item.value;
      } else if (item.type === 'punctuation') {
        oldNorseLine += item.value;
      } else if (item.wordType === 'unknown') {
        oldNorseLine += '[' + item.value + '] ';
        if (!unknowns.includes(item.value)) unknowns.push(item.value);
      } else {
        oldNorseLine += (item.inflected || item.translation || item.value) + ' ';
      }
    });
    
    translatedLines.push(oldNorseLine.trim());
  });
  
  return {
    oldNorse: translatedLines.join('\n'),
    unknowns: unknowns
  };
}

// ─── RENDER RUNES WITH TOOLTIPS ──────────────────────────────────────────────
function renderRunes(onStr) {
  const fragment = document.createDocumentFragment();

  if(!onStr) {
    const span = document.createElement('span');
    span.className = 'placeholder-text';
    span.textContent = '—';
    fragment.appendChild(span);
    return fragment;
  }

  const runes = onToRunes(onStr);
  if(!runes.length) {
    const span = document.createElement('span');
    span.className = 'placeholder-text';
    span.textContent = '—';
    fragment.appendChild(span);
    return fragment;
  }

  runes.forEach(r => {
    if(r.space) {
      const span = document.createElement('span');
      span.className = 'rune-char space';
      span.textContent = ' ';
      fragment.appendChild(span);
    } else if(r.newline) {
      fragment.appendChild(document.createElement('br'));
    } else if(r.isUnknown) {
      const span = document.createElement('span');
      span.className = 'unknown';
      span.title = 'No match';
      span.textContent = r.text;
      fragment.appendChild(span);
    } else {
      const wrapper = document.createElement('span');
      wrapper.className = 'tooltip-wrap';
      const runeSpan = document.createElement('span');
      runeSpan.className = 'rune-char';
      runeSpan.textContent = r.rune;
      const tipSpan = document.createElement('span');
      tipSpan.className = 'tip';
      tipSpan.textContent = r.name;
      wrapper.appendChild(runeSpan);
      wrapper.appendChild(tipSpan);
      fragment.appendChild(wrapper);
    }
  });

  return fragment;
}

// ─── UPDATE ALL OUTPUT FIELDS ────────────────────────────────────────────────
// Skip updating the active input field to preserve cursor position
function updateAllOutputs(enStr, onStr, runesStr, unknowns, ukEl, activeType) {
  // Update English textarea (unless it's the active input)
  if(activeType !== 'english') {
    document.getElementById('inp').value = enStr;
  }

  // Update Old Norse with unknowns highlighted (unless it's the active input)
  if(activeType !== 'oldnorse') {
    const onOutEl = document.getElementById('onOut');
    onOutEl.innerHTML = '';

    if(!onStr || onStr.trim().length === 0) {
      const span = document.createElement('span');
      span.className = 'placeholder-text';
      span.textContent = 'Old Norse will appear here';
      onOutEl.appendChild(span);
    } else {
      const onWords = onStr.trim().split(' ');
      onWords.forEach((word, idx) => {
        // Check if word is already bracketed (marked unknown)
        if(word.startsWith('[') && word.endsWith(']')) {
          const span = document.createElement('span');
          span.className = 'unknown';
          span.title = 'No match';
          span.textContent = word;
          onOutEl.appendChild(span);
        } else if(unknowns && unknowns.some(u => word.toLowerCase().includes(u.toLowerCase()))) {
          const span = document.createElement('span');
          span.className = 'unknown';
          span.title = 'No match';
          span.textContent = word;
          onOutEl.appendChild(span);
        } else {
          const textNode = document.createTextNode(word);
          onOutEl.appendChild(textNode);
        }
        // Add space after word (except for last word)
        if(idx < onWords.length - 1) {
          onOutEl.appendChild(document.createTextNode(' '));
        }
      });
    }
  }

  // Update Runes (unless it's the active input)
  if(activeType !== 'runes') {
    const runeOutEl = document.getElementById('runeOut');
    runeOutEl.innerHTML = '';
    runeOutEl.appendChild(runesStr);
  }

  // Always update unknowns display
  if(unknowns && unknowns.length) {
    ukEl.textContent = `Dotted underline = no dictionary match: ${[...new Set(unknowns)].join(', ')}`;
    ukEl.style.display = 'block';
  } else {
    ukEl.style.display = 'none';
  }
}

function processSentence(sentence) {
  // Input validation
  if(!sentence || typeof sentence !== 'string') return { translations: [] };
  if(sentence.length > 10000) sentence = sentence.substring(0, 10000);

  // Step 1: raw tokenise (using pre-compiled regex)
  const raw = sentence.toLowerCase().match(REGEX_WORD_SPLIT) || [];

  // Step 2: classify each word token
  // types: 'space', 'punct', 'subj_pron', 'obj_pron', 'verb', 'word', 'adjective', 'possessive', 'noun', 'unknown'
  const classified = [];
  let i = 0;
  while(i < raw.length) {

    if(tok.type === 'word' && tok.en === 'to' &&
       next && next.type === 'space' &&
       next2 && (next2.type === 'noun' || next2.type === 'word')) {
      // Check if there's a motion verb before this "to"
      let hasMotionVerbBefore = false;
      for(let j = i - 1; j >= 0; j--) {
        if(withAgreement[j].type === 'verb') {
          // Check if this verb is a motion verb
          if(MOTION_VERBS.has(withAgreement[j].en)) {
            hasMotionVerbBefore = true;
          }
          break; // Stop at first verb
        }
        if(withAgreement[j].type === 'punct') {
          break; // Stop at punctuation
        }
      }

      if(hasMotionVerbBefore) {
        // Skip the "to" for motion verbs (use accusative)
        continue;
      }
    }
    withoutToPrep.push(tok);
  }

  // Step 6: fix word order (negation: do + not + verb → verb + eigi)
  const reorderedTokens = [];
  for(let i = 0; i < withoutToPrep.length; i++) {
    const tok = withoutToPrep[i];
    const next = withoutToPrep[i + 1];
    const next2 = withoutToPrep[i + 2];

    // Pattern: "do" + (space) + "not" + (space) + verb
    if(tok.type === 'word' && tok.en === 'do' &&
       next && next.type === 'space' &&
       next2 && next2.type === 'word' && next2.en === 'not') {
      // Look for the verb after "not"
      let verbIdx = i + 3;
      while(verbIdx < withoutToPrep.length &&
            (withoutToPrep[verbIdx].type === 'space' ||
             withoutToPrep[verbIdx].type === 'punct')) {
        verbIdx++;
      }
      if(verbIdx < withoutToPrep.length && withoutToPrep[verbIdx].type === 'verb') {
        // Skip "do" and "not", output verb then "eigi"
        i += 2; // skip to "not"
        continue;
      }
    }

    // Pattern: "not" after a verb → output verb first, then eigi
    if(tok.type === 'word' && tok.en === 'not') {
      // Check if previous word was a verb
      let prevVerb = null;
      for(let j = reorderedTokens.length - 1; j >= 0; j--) {
        if(reorderedTokens[j].type !== 'space' && reorderedTokens[j].type !== 'punct') {
          if(reorderedTokens[j].type === 'verb') {
            prevVerb = reorderedTokens[j];
          }
          break;
        }
      }
      if(prevVerb) {
        // Output "eigi" instead of "not"
        reorderedTokens.push({type: 'word', en: 'not', on: 'eigi'});
        continue;
      }
    }

    reorderedTokens.push(tok);
  }

  // Step 8: apply Old Norse word order patterns (before V2)
  // Transform English-like word order to more natural Old Norse patterns
  const oldNorseOrderTokens = [];
  for(let i = 0; i < withoutToPrep.length; i++) {
    const tok = withoutToPrep[i];
    const next = withoutToPrep[i + 1];
    const next2 = withoutToPrep[i + 2];
    const next3 = withoutToPrep[i + 3];

    // Pattern 1: Adjective + Noun → Noun + Adjective (for poetry/emphasis)
    // In some contexts, Old Norse places adjectives after nouns for emphasis
    if(tok.type === 'adjective' && next && next.type === 'space' && 
       next2 && (next2.type === 'noun' || next2.type === 'word')) {
      
      // Skip poetic inversion - use deterministic order
    }

    // Pattern 2: Possessive + Adjective + Noun → Noun + Possessive + Adjective
    // More natural Old Norse order: noun with its modifiers
    if(tok.type === 'possessive' && next && next.type === 'space' &&
       next2 && next2.type === 'adjective' && next3 && next3.type === 'space') {
       
      const nounIdx = i + 4;
      if(nounIdx < withoutToPrep.length && 
         (withoutToPrep[nounIdx].type === 'noun' || withoutToPrep[nounIdx].type === 'word')) {
        
        // Reorder to: Noun + space + Possessive + space + Adjective
        oldNorseOrderTokens.push(withoutToPrep[nounIdx]);     // noun
        oldNorseOrderTokens.push(withoutToPrep[nounIdx - 1]); // space before noun
        oldNorseOrderTokens.push(tok);                        // possessive
        oldNorseOrderTokens.push(next);                       // space
        oldNorseOrderTokens.push(next2);                      // adjective
        i = nounIdx; // skip to after the noun
        continue;
      }
    }

    // Pattern 3: Simple Adjective + Noun reordering for common poetic phrases
    if(tok.type === 'adjective' && next && next.type === 'space' && 
       next2 && (next2.type === 'noun' || next2.type === 'word')) {
      
      const adjective = tok.en.toLowerCase();
      const noun = next2.en ? next2.en.toLowerCase() : '';
      
      // Check for common poetic pairs that sound better inverted in Old Norse
      const poeticPairs = [
        { adj: 'sweet', noun: 'rose' },
        { adj: 'fair', noun: 'maiden' },
        { adj: 'bright', noun: 'sun' },
        { adj: 'dark', noun: 'night' },
        { adj: 'old', noun: 'man' },
        { adj: 'young', noun: 'maiden' },
      ];
      
      const isPoeticPair = poeticPairs.some(pair => 
        (pair.adj === adjective && pair.noun === noun) ||
        (pair.noun === adjective && pair.adj === noun)
      );
      
      // Skip poetic inversion - use deterministic order
    }

    // Default: keep original order
    oldNorseOrderTokens.push(tok);
  }

  // Replace reorderedTokens content with the Old Norse ordered tokens
  reorderedTokens.length = 0; // Clear existing array
  reorderedTokens.push(...oldNorseOrderTokens); // Fill with new order

  // Step 9: apply V2 (Verb-Second) word order for fronted adverbs
  // Only applies to restricted set: þá, nú, svá (then, now, so)
  // Pattern: [Adverb] [Finite Verb] [Subject] [Rest]
  // Re-triggers after conjunctions (and, but, or) for each clause
  {
    // Find all potential V2 adverb positions (including after conjunctions)
    let searchStartIdx = 0;

    while(searchStartIdx < reorderedTokens.length) {
      // Find first content token from searchStartIdx (non-space, non-punct)
      let firstContentIdx = -1;
      let firstContentTok = null;
      for(let i = searchStartIdx; i < reorderedTokens.length; i++) {
        if(reorderedTokens[i].type !== 'space' && reorderedTokens[i].type !== 'punct') {
          firstContentIdx = i;
          firstContentTok = reorderedTokens[i];
          break;
        }
      }

      if(firstContentIdx === -1) break; // No more content

      // Check if this content token is a V2 adverb
      if(firstContentTok && firstContentTok.type === 'word' && V2_ADVERBS.has(firstContentTok.en)) {
        // Find the adverb's trailing space
        let adverbSpaceIdx = -1;
        for(let i = firstContentIdx + 1; i < reorderedTokens.length; i++) {
          if(reorderedTokens[i].type === 'space') {
            adverbSpaceIdx = i;
            break;
          }
        }

        if(adverbSpaceIdx !== -1) {
          // Find the main verb after the adverb+space (stop at conjunction or punctuation)
          // Strategy: Skip auxiliaries and find the main content verb
          // If only auxiliary present, use it; if main verb follows, use main verb
          let verbIdx = -1;
          let firstVerbIdx = -1;
          let firstVerbIsAuxiliary = false;

          for(let i = adverbSpaceIdx + 1; i < reorderedTokens.length; i++) {
            if(reorderedTokens[i].type === 'verb') {
              if(firstVerbIdx === -1) {
                firstVerbIdx = i;
                firstVerbIsAuxiliary = AUXILIARY_VERBS.has(reorderedTokens[i].en);
              } else if(firstVerbIsAuxiliary && !AUXILIARY_VERBS.has(reorderedTokens[i].en)) {
                // Found a main verb after an auxiliary - prefer the main verb
                verbIdx = i;
                break;
              } else if(!firstVerbIsAuxiliary) {
                // Already found a main verb, no need to continue
                verbIdx = firstVerbIdx;
                break;
              }
            }
            // Stop at clause boundaries
            if(reorderedTokens[i].type === 'punct' ||
               (reorderedTokens[i].type === 'word' && ['and','but','or'].includes(reorderedTokens[i].en))) {
              // If we only found an auxiliary, use it
              if(firstVerbIdx !== -1 && verbIdx === -1) {
                verbIdx = firstVerbIdx;
              }
              break;
            }
          }

          // If no main verb found, use first verb
          if(verbIdx === -1 && firstVerbIdx !== -1) {
            verbIdx = firstVerbIdx;
          }

          // If verb found and not already in position 2 (adverb + space + verb)
          if(verbIdx !== -1 && verbIdx !== adverbSpaceIdx + 1) {
            // Extract verb token and check for trailing space
            const verbTok = reorderedTokens[verbIdx];
            let trailingSpace = null;

            if(verbIdx + 1 < reorderedTokens.length &&
               reorderedTokens[verbIdx + 1].type === 'space') {
              trailingSpace = reorderedTokens[verbIdx + 1];
            }

            // Remove verb (and trailing space if exists) from original position
            const removeCount = trailingSpace ? 2 : 1;
            reorderedTokens.splice(verbIdx, removeCount);

            // Insert verb right after adverb+space
            const insertPos = adverbSpaceIdx + 1;
            if(trailingSpace) {
              reorderedTokens.splice(insertPos, 0, verbTok, trailingSpace);
            } else {
              reorderedTokens.splice(insertPos, 0, verbTok);
            }

            // Update searchStartIdx to continue searching after this verb position
            searchStartIdx = insertPos + (trailingSpace ? 2 : 1);
          } else {
            // No suitable verb found, move past this adverb
            searchStartIdx = adverbSpaceIdx + 2;
          }
        } else {
          // No space after adverb, move on
          searchStartIdx = firstContentIdx + 1;
        }
      } else {
        // Not a V2 adverb. If it's a conjunction, continue from next position
        // Otherwise, skip to next sentence boundary
        if(firstContentTok && firstContentTok.type === 'word' &&
           ['and','but','or'].includes(firstContentTok.en)) {
          // Found conjunction, continue searching from after it
          searchStartIdx = firstContentIdx + 1;
        } else {
          // Not a V2 adverb and not a conjunction, stop searching
          break;
        }
      }
    }
  }

  // Step 10: collect unknowns and build strings
  const unknowns = [];
  reorderedTokens.forEach(t => {
    if(t.type === 'unknown' && !unknowns.includes(t.en)) unknowns.push(t.en);
  });

  // Step 11: Build noun phrases AFTER all word order manipulations
// Simple approach: scan through tokens and reorganize adjective-noun-possessive patterns
const phraseBuiltTokens = [];
let idx = 0;

while(idx < reorderedTokens.length) {
  const token = reorderedTokens[idx];
  
  // Skip spaces and punctuation
  if(token.type === 'space' || token.type === 'punct') {
    phraseBuiltTokens.push(token);
    idx++;
    continue;
  }
  
  // Look for noun phrase patterns
  // Check if current token is part of a noun phrase
  if(token.type === 'noun' || token.type === 'word' || token.type === 'synonym') {
    const phrase = [];
    let phraseStart = idx;
    let phraseEnd = idx;
    
    // Look backward for adjective
    let adjToken = null;
    for(let j = idx - 1; j >= 0; j--) {
      const prevToken = reorderedTokens[j];
      if(prevToken.type === 'space') continue;
      if(prevToken.type === 'adjective') {
        adjToken = prevToken;
        phraseStart = j;
        break;
      }
      break; // Stop at first non-space token that's not an adjective
    }
    
    // Look forward for possessive
    let possToken = null;
    for(let j = idx + 1; j < reorderedTokens.length; j++) {
      const nextToken = reorderedTokens[j];
      if(nextToken.type === 'space') continue;
      if(nextToken.type === 'possessive') {
        possToken = nextToken;
        phraseEnd = j;
        break;
      }
      break; // Stop at first non-space token that's not a possessive
    }
    
    // Build the phrase in correct Old Norse order: [adjective] + [noun] + [possessive]
    if(adjToken) {
      phraseBuiltTokens.push(adjToken);
      // Add space if needed
      if(reorderedTokens[phraseStart + 1]?.type === 'space') {
        phraseBuiltTokens.push(reorderedTokens[phraseStart + 1]);
      } else {
        phraseBuiltTokens.push({type: 'space'});
      }
    }
    
    // Add the noun
    phraseBuiltTokens.push(token);
    
    // Add possessive if found
    if(possToken) {
      // Add space if needed
      if(phraseBuiltTokens[phraseBuiltTokens.length - 1].type !== 'space') {
        phraseBuiltTokens.push({type: 'space'});
      }
      phraseBuiltTokens.push(possToken);
      idx = phraseEnd + 1; // Skip past the possessive
    } else {
      idx++; // Just move past the noun
    }
    
  } else {
    // Not a noun, add as-is
    phraseBuiltTokens.push(token);
    idx++;
  }
}

  // Step 12: apply interjection vocative formatting
  // Build final string with interjection formatting and bracket marking
  let onStr = '';
  for(let i = 0; i < phraseBuiltTokens.length; i++) {
    const t = phraseBuiltTokens[i];

    if(t.type === 'space') {
      onStr += ' ';
    } else if(t.type === 'interjection') {
      // Add interjection and check if followed by content
      onStr += (t.on || t.en);

      // Check if interjection is followed by non-space/non-punct content
      let hasFollowingContent = false;
      for(let j = i + 1; j < phraseBuiltTokens.length; j++) {
        if(phraseBuiltTokens[j].type !== 'space' && phraseBuiltTokens[j].type !== 'punct') {
          hasFollowingContent = true;
          break;
        }
      }

      if(hasFollowingContent) {
        onStr += ', ';
      } else {
        onStr += ' ';
      }
    } else if(t.type === 'word' || t.type === 'pronoun' || t.type === 'verb' || t.type === 'noun' ||
              t.type === 'adjective' || t.type === 'possessive' || t.type === 'synonym') {
      onStr += (t.on || t.en) + ' ';
    } else if(t.type === 'unknown') {
      // Mark unknown words with brackets
      onStr += '[' + t.en + '] ';
    }
    // punct skipped
  }
  onStr = onStr.trim();

  return { onStr, unknowns };
}

// ─── SMART AUTO-COMPOUNDER ─────────────────────────────────────────────────────
// Intelligently forms Old Norse compounds following linguistic patterns
function trySmartCompound(word1_en, word2_en) {
  const word1_on = EN_TO_ON[word1_en];
  const word2_on = EN_TO_ON[word2_en];

  if(!word1_on || !word2_on) return null;
  
  // Get gender from the head noun (second word)
  const gender = NOUN_GENDER[word2_en] || NOUN_GENDER[LEMMAS[word2_en]] || 'm';
  
  // Apply Old Norse compound formation rules
  
  // Rule 1: Nature compounds (heather + rose, mountain + peak, etc.)
  const natureCompounds = {
    'heather': { pattern: 'lyng', connector: '' },
    'mountain': { pattern: 'fjall', connector: '' },
    'river': { pattern: 'á', connector: '' },
    'water': { pattern: 'vatn', connector: '' },
    'stone': { pattern: 'steinn', connector: '' },
    'wood': { pattern: 'viðr', connector: '' },
    'sea': { pattern: 'haf', connector: '' },
    'land': { pattern: 'land', connector: '' },
    'field': { pattern: 'akr', connector: '' },
    'forest': { pattern: 'skógr', connector: '' },
  };
  
  const natureSecondaries = {
    'rose': { pattern: 'rós', connector: '' },
    'flower': { pattern: 'blóm', connector: '' },
    'tree': { pattern: 'tré', connector: '' },
    'stone': { pattern: 'steinn', connector: '' },
    'peak': { pattern: 'topp', connector: '' },
    'hill': { pattern: 'hóll', connector: '' },
    'dale': { pattern: 'dalr', connector: '' },
    'valley': { pattern: 'dalr', connector: '' },
    'wood': { pattern: 'viðr', connector: '' },
    'land': { pattern: 'land', connector: '' },
  };
  
  // Check for nature compounds
  if(natureCompounds[word1_en] && natureSecondaries[word2_en]) {
    const first = natureCompounds[word1_en];
    const second = natureSecondaries[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 2: People/Role compounds (shield + maiden, sword + bearer, etc.)
  const roleFirsts = {
    'shield': { pattern: 'skjald', connector: '' },
    'sword': { pattern: 'sverð', connector: '' },
    'war': { pattern: 'orrust', connector: '' },
    'horse': { pattern: 'hross', connector: '' },
    'ship': { pattern: 'skip', connector: '' },
    'book': { pattern: 'bók', connector: '' },
    'hall': { pattern: 'höll', connector: '' },
    'gate': { pattern: 'hlið', connector: '' },
  };
  
  const roleSeconds = {
    'maiden': { pattern: 'mær', connector: '' },
    'bearer': { pattern: 'beri', connector: '' },
    'holder': { pattern: 'hald', connector: '' },
    'keeper': { pattern: 'vörðr', connector: '' },
    'lord': { pattern: 'dróttinn', connector: '' },
    'master': { pattern: 'meistari', connector: '' },
    'guard': { pattern: 'vörðr', connector: '' },
  };
  
  if(roleFirsts[word1_en] && roleSeconds[word2_en]) {
    const first = roleFirsts[word1_en];
    const second = roleSeconds[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 3: Material compounds (gold + smith, silver + smith, etc.)
  const materials = {
    'gold': { pattern: 'gull', connector: '' },
    'silver': { pattern: 'silfr', connector: '' },
    'iron': { pattern: 'járn', connector: '' },
    'steel': { pattern: 'stál', connector: '' },
    'wood': { pattern: 'við', connector: '' },
    'stone': { pattern: 'steinn', connector: '' },
    'yellow': { pattern: 'gul', connector: '' },
  };
  
  const craftsmen = {
    'smith': { pattern: 'smiðr', connector: '' },
    'worker': { pattern: 'verkmaðr', connector: '' },
    'crafter': { pattern: 'smíðamaðr', connector: '' },
  };
  
  if(materials[word1_en] && craftsmen[word2_en]) {
    const first = materials[word1_en];
    const second = craftsmen[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 3b: Color + Nature compounds (yellow + heather, etc.)
  const colors = {
    'yellow': { pattern: 'gull', connector: '' }, // Fixed: use 'gull' not 'gul' for compounds
    'red': { pattern: 'rauð', connector: '' },
    'blue': { pattern: 'blá', connector: '' },
    'green': { pattern: 'græn', connector: '' },
    'white': { pattern: 'hvít', connector: '' },
    'black': { pattern: 'svart', connector: '' },
    'gold': { pattern: 'gull', connector: '' },
    'silver': { pattern: 'silfr', connector: '' },
  };
  
  if(colors[word1_en] && (natureCompounds[word2_en] || natureSecondaries[word2_en])) {
    const first = colors[word1_en];
    const second = natureCompounds[word2_en] || natureSecondaries[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 4: Animal compounds (wolf + hound, sea + wolf, etc.)
  const animals = {
    'wolf': { pattern: 'úlfr', connector: '' },
    'hound': { pattern: 'hundr', connector: '' },
    'eagle': { pattern: 'örn', connector: '' },
    'bear': { pattern: 'björn', connector: '' },
    'horse': { pattern: 'hestr', connector: '' },
    'snake': { pattern: 'ormr', connector: '' },
    'dragon': { pattern: 'dreki', connector: '' },
  };
  
  const places = {
    'sea': { pattern: 'haf', connector: '' },
    'mountain': { pattern: 'fjall', connector: '' },
    'forest': { pattern: 'skógr', connector: '' },
    'river': { pattern: 'á', connector: '' },
  };
  
  if(animals[word1_en] && animals[word2_en]) {
    const first = animals[word1_en];
    const second = animals[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  if(places[word1_en] && animals[word2_en]) {
    const first = places[word1_en];
    const second = animals[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 5: Generic compound with phonetic adaptation
  // Apply common Old Norse compound sound changes
  let firstWord = word1_on;
  let secondWord = word2_on;
  
  // Common sound changes in compounds:
  // 1. Final consonant often assimilates
  if(firstWord.endsWith('r') && secondWord.startsWith('r')) {
    firstWord = firstWord.slice(0, -1); // Remove final r before r
  }
  
  // 2. Final -n often drops before consonants
  if(firstWord.endsWith('n') && !'aeiouáéíóúýæøöǫ'.includes(secondWord[0])) {
    firstWord = firstWord.slice(0, -1);
  }
  
  // 3. Final -t often drops before consonants  
  if(firstWord.endsWith('t') && !'aeiouáéíóúýæøöǫ'.includes(secondWord[0])) {
    firstWord = firstWord.slice(0, -1);
  }
  
  // 4. Connecting vowel insertion for difficult consonant clusters
  const difficultClusters = [
    { pattern: /([lrndm])([lrndm])$/, insert: 'a' },
    { pattern: /([kgpt])([kgpt])$/, insert: 'a' },
    { pattern: /([st])([st])$/, insert: 'i' }
  ];
  
  for(const cluster of difficultClusters) {
    if(firstWord.match(cluster.pattern)) {
      firstWord += cluster.insert;
      break;
    }
  }
  
  return { on: firstWord + secondWord, gender: gender };
}

(function buildGrid(){
  const grid = document.getElementById('futharkGrid');
  FUTHARK.forEach(({r, sounds, name}) => {
    const card = document.createElement('div');
    card.className = 'rune-card';

    const rDiv = document.createElement('div');
    rDiv.className = 'r';
    rDiv.textContent = r;
    card.appendChild(rDiv);

    const lDiv = document.createElement('div');
    lDiv.className = 'l';
    lDiv.textContent = sounds.join('/');
    card.appendChild(lDiv);

    const nDiv = document.createElement('div');
    nDiv.className = 'n';
    nDiv.textContent = name;
    card.appendChild(nDiv);

    grid.appendChild(card);
  });
})();
