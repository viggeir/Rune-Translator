<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rune Translator — Endrborninn</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#d4c9a8;font-family:'Cinzel',serif;padding:2rem 1.5rem 3rem;min-height:100vh}
.title-rune{font-size:22px;color:#c9a84c;letter-spacing:5px;margin-bottom:6px}
h1{font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:#e8dfc0;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.subtitle{font-family:'IM Fell English',serif;font-size:13px;color:#7a6e52;font-style:italic;margin-bottom:1.5rem;letter-spacing:.5px}
textarea{width:100%;min-height:90px;background:#0d0b06;border:1px solid #3a3020;border-radius:8px;padding:14px 16px;font-family:'IM Fell English',serif;font-size:16px;color:#d4c9a8;resize:vertical;line-height:1.6;outline:none;margin-bottom:.85rem;transition:border-color .2s}
textarea:focus{border-color:#6b5230}
textarea::placeholder{color:#3d3525;font-style:italic}
[contenteditable="true"]{outline:none}
[contenteditable="true"]:focus{border-color:#6b5230}
.on-output[contenteditable="true"],.rune-output[contenteditable="true"]{background:#0d0b06;border:1px solid #3a3020;border-radius:8px;padding:14px 16px;margin-bottom:.85rem;transition:border-color .2s;cursor:text;min-height:90px}
.rune-output[contenteditable="true"]:focus .tip{opacity:0}
.step-block{background:#0a0804;border:1px solid #2e2516;border-radius:8px;padding:14px 16px;margin-bottom:.85rem;position:relative}
.step-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#4a3e28;margin-bottom:8px}
.on-output{font-family:'IM Fell English',serif;font-size:18px;color:#a08840;line-height:1.6;min-height:28px;word-break:break-word}
.on-output .unknown{color:#5c4e2a;font-style:italic;text-decoration:underline;text-decoration-style:dotted;cursor:help}
.rune-output{font-family:'IM Fell English',serif;font-size:30px;letter-spacing:7px;color:#c9a84c;line-height:1.5;word-break:break-all;display:flex;flex-wrap:wrap;align-items:center;min-height:44px}
.rune-char{display:inline-block;cursor:default;transition:color .12s,transform .1s}
.rune-char:hover{color:#e8c76a;transform:scale(1.18)}
.rune-char.space{width:14px}
.tooltip-wrap{position:relative;display:inline-block}
.tooltip-wrap:hover .tip{opacity:1;transform:translateX(-50%) translateY(-4px)}
.tip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%) translateY(0);background:#1a1408;border:1px solid #4a3e20;border-radius:5px;padding:4px 9px;font-size:10px;font-family:'Cinzel',serif;color:#a08840;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;z-index:20;letter-spacing:.5px}
.copy-btn{position:absolute;top:10px;right:10px;background:transparent;border:1px solid #2e2516;border-radius:5px;padding:4px 10px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#4a3e28;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:#8a6d2f;color:#c9a84c}
.placeholder-text{font-family:'IM Fell English',serif;font-size:14px;color:#3d3525;font-style:italic}

.ref-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.ref-toggle .label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#4a3e28;transition:color .15s}
.ref-toggle:hover .label{color:#8a6d2f}
.ref-toggle .arrow{font-size:9px;color:#3d3220;transition:transform .2s}

.futhark-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px;margin-top:1rem}
.rune-card{display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;border:1px solid #2a2010;border-radius:7px;background:#0a0804}
.rune-card .r{font-size:22px;color:#c9a84c;margin-bottom:3px;line-height:1}
.rune-card .l{font-size:9px;color:#7a6e52;font-family:'Cinzel',serif;letter-spacing:1px;text-transform:uppercase}
.rune-card .n{font-size:8px;color:#4a3e28;font-family:'IM Fell English',serif;font-style:italic;margin-top:2px}
</style>
</head>
<body>

<div class="title-rune">ᚠᚢᚦᚬᚱᚴᚼᚾᛁᛋᛏᛒᛚᛘ</div>
<h1>Rune Translator</h1>
<p class="subtitle">English ↔ Old Norse ↔ Younger Futhark</p>

<textarea id="inp" placeholder="Enter English text..." onfocus="activeInput='english'" oninput="if(activeInput==='english') translate()"></textarea>

<div class="step-block">
  <div class="step-label">Old Norse</div>
  <div class="on-output" id="onOut" contenteditable="true" spellcheck="false" onfocus="activeInput='oldnorse'; clearOtherFields('oldnorse')" oninput="if(activeInput==='oldnorse') translate()"><span class="placeholder-text">Old Norse will appear here</span></div>
  <div class="unknown-key" id="unknownKey" style="display:none"></div>
  <button class="copy-btn" onclick="copyON()">Copy</button>
</div>

<div class="step-block">
  <div class="step-label">Younger Futhark</div>
  <div class="rune-output" id="runeOut" contenteditable="true" spellcheck="false" onfocus="activeInput='runes'; clearOtherFields('runes')" oninput="if(activeInput==='runes') translate()"><span class="placeholder-text">Runes will appear here</span></div>
  <button class="copy-btn" onclick="copyRunes()">Copy</button>
</div>

<div class="ref-toggle" id="refToggle" onclick="toggleRef()">
  <span class="arrow">▶</span>
  <span class="label">Younger Futhark Reference</span>
</div>
<div id="refSection" style="display:none">
  <div class="divider"></div>
  <div class="futhark-grid" id="futharkGrid"></div>
</div>

<script>
// ─── YOUNGER FUTHARK — 16 runes, Viking Age ─────────────────────────────────
// Historically correct: Younger Futhark intentionally collapses distinctions.
// One rune covers multiple sounds — ambiguity is a feature, not a bug.
const FUTHARK = [
  {r:'ᚠ', sounds:['f','v'],        name:'Fé'},
  {r:'ᚢ', sounds:['u','o','w'],    name:'Úr'},
  {r:'ᚦ', sounds:['th','dh'],      name:'Þurs'},
  {r:'ᚬ', sounds:['a','æ','o2'],   name:'Óss'},
  {r:'ᚱ', sounds:['r'],            name:'Reið'},
  {r:'ᚴ', sounds:['k','g'],        name:'Kaun'},
  {r:'ᚼ', sounds:['h'],            name:'Hagall'},
  {r:'ᚾ', sounds:['n'],            name:'Nauðr'},
  {r:'ᛁ', sounds:['i','e','j','y'],name:'Íss'},
  {r:'ᛋ', sounds:['s','z'],        name:'Sól'},
  {r:'ᛏ', sounds:['t','d'],        name:'Týr'},
  {r:'ᛒ', sounds:['b','p'],        name:'Bjarkan'},
  {r:'ᛚ', sounds:['l'],            name:'Lögr'},
  {r:'ᛘ', sounds:['m'],            name:'Maðr'},
];

// Build sound → rune lookup (first assignment wins)
const soundToRune = {};
FUTHARK.forEach(f => {
  f.sounds.forEach(s => { if(!soundToRune[s]) soundToRune[s] = {r:f.r, name:f.name}; });
});

// Build rune → sounds mapping (for reverse translation)
const RUNE_TO_SOUNDS = {};
FUTHARK.forEach(f => {
  RUNE_TO_SOUNDS[f.r] = f.sounds;
});

// ─── ACTIVE INPUT TRACKING ────────────────────────────────────────────────────
let activeInput = 'english'; // 'english', 'oldnorse', 'runes'

// ─── OLD NORSE PHONEME RULES → YOUNGER FUTHARK SOUNDS ───────────────────────
// Sorted longest-first so digraphs match before single chars.
const ON_RULES = [
  // Digraphs & special sequences
  ['ng', 'nk'],   // ng → nk (historically more accurate for YF)
  ['nk', 'nk'],   // nk → nk (historically written as n+k)
  ['kk', 'k'], ['gg', 'k'],
  ['tt', 't'], ['dd', 't'],
  ['nn', 'n'], ['ll', 'l'], ['rr', 'r'],
  ['ff', 'f'], ['ss', 's'], ['mm', 'm'],
  ['bb', 'b'], ['pp', 'b'],
  ['ei', 'i'], ['ey', 'i'],
  ['au', 'u'],
  ['kv', 'k'],   // kv = k sound in YF
  // ON special characters
  ['þ',  'th'], ['ð',  'th'],
  ['æ',  'a'],  ['œ',  'i'],
  ['ø',  'u'],  ['ö',  'u'], ['ǫ', 'u'],
  ['á',  'a'],  ['é',  'i'], ['í', 'i'],
  ['ó',  'u'],  ['ú',  'u'], ['ý', 'i'],
  // Plain letters — YF collapses
  ['a','a'], ['b','b'], ['d','t'], ['e','i'], ['f','f'],
  ['g','k'], ['h','h'], ['i','i'], ['j','i'], ['k','k'],
  ['l','l'], ['m','m'], ['n','n'], ['o','u'], ['p','b'],
  ['r','r'], ['s','s'], ['t','t'], ['u','u'], ['v','f'],
  ['w','u'], ['y','i'], ['z','s'],
];
const ON_SORTED = [...ON_RULES].sort((a,b) => b[0].length - a[0].length);

function onToRunes(text) {
  const lower = text.toLowerCase();
  let i = 0;
  const result = [];
  while(i < lower.length) {
    if(lower[i] === ' ') { result.push({space:true}); i++; continue; }
    // Skip true geminates (already handled by rules, catch any remaining)
    if(i > 0 && lower[i] === lower[i-1] && !'aeiouáéíóúýæøöǫ'.includes(lower[i])) { i++; continue; }
    let matched = false;
    for(const [pat, sound] of ON_SORTED) {
      if(lower.slice(i, i+pat.length) === pat) {
        const entry = soundToRune[sound];
        if(entry) result.push({rune:entry.r, name:entry.name});
        i += pat.length; matched = true; break;
      }
    }
    if(!matched) i++;
  }
  return result;
}

// ─── REVERSE TRANSLATION: OLD NORSE → ENGLISH ────────────────────────────────
function onToEnglish(text) {
  const words = text.toLowerCase().split(/\s+/).filter(w => w.length > 0);
  const result = [];
  const unknowns = [];

  words.forEach(word => {
    // Remove punctuation for lookup
    const cleanWord = word.replace(/[.,!?;:\-'"]/g, '');
    const translation = ON_TO_EN[cleanWord];

    if(translation) {
      result.push(translation);
    } else {
      result.push(word);
      unknowns.push(cleanWord);
    }
  });

  return {
    text: result.join(' '),
    unknowns: unknowns
  };
}

// ─── REVERSE TRANSLATION: RUNES → OLD NORSE ───────────────────────────────────
// Converts rune characters to phoneme combinations, then matches against ON dictionary
function runesToOldNorse(runeText) {
  // Extract rune characters and spaces
  const runes = [];
  let currentWord = [];

  for(let char of runeText) {
    if(char === ' ' || char === '\n') {
      if(currentWord.length > 0) {
        runes.push(currentWord);
        currentWord = [];
      }
    } else if(RUNE_TO_SOUNDS[char]) {
      currentWord.push(char);
    }
  }
  if(currentWord.length > 0) runes.push(currentWord);

  // Convert each rune word to phoneme sequences and find best matches
  const result = [];
  const unknowns = [];

  runes.forEach(runeWord => {
    const onWord = findBestOldNorseMatch(runeWord);
    if(onWord) {
      result.push(onWord);
    } else {
      const runeStr = runeWord.join('');
      result.push(runeStr);
      unknowns.push(runeStr);
    }
  });

  return {
    text: result.join(' '),
    unknowns: unknowns
  };
}

// Helper: Find best Old Norse word matching a rune sequence
// Uses phoneme combinations and scores by match quality
function findBestOldNorseMatch(runeWord) {
  const phonemeOptions = runeWord.map(r => RUNE_TO_SOUNDS[r] || []);

  // Generate all possible phoneme combinations (depth-first)
  const allCombinations = generatePhonemeSequences(phonemeOptions);

  // Try to match each combination against ON dictionary
  for(const phoneStr of allCombinations) {
    const onWord = matchPhonemeToOldNorse(phoneStr);
    if(onWord) return onWord;
  }

  return null;
}

// Generate all possible phoneme sequences from rune ambiguity
function generatePhonemeSequences(phonemeOptions) {
  if(phonemeOptions.length === 0) return [];
  if(phonemeOptions.length === 1) return phonemeOptions[0] || [];

  const sequences = [];
  const firstOptions = phonemeOptions[0];
  const restSequences = generatePhonemeSequences(phonemeOptions.slice(1));

  firstOptions.forEach(first => {
    restSequences.forEach(rest => {
      sequences.push(first + rest);
    });
  });

  return sequences;
}

// Try to match a phoneme string to an Old Norse word
// Uses fuzzy matching with priority for exact matches
function matchPhonemeToOldNorse(phoneStr) {
  // First, try exact match in ON_TO_EN keys
  for(const onWord of Object.keys(ON_TO_EN)) {
    const onPhones = onWord.toLowerCase();
    // Simple phoneme-to-text mapping check
    if(onPhones === phoneStr) return onWord;
  }

  // Second, try matching the phoneme string against ON words
  // Convert ON text to rough phoneme representation and compare
  for(const onWord of Object.keys(ON_TO_EN)) {
    const normalized = normalizeToPhonemes(onWord);
    if(normalized === phoneStr) return onWord;
  }

  return null;
}

// Normalize Old Norse word to approximate phoneme string
function normalizeToPhonemes(onWord) {
  let phonemes = '';
  let i = 0;
  const lower = onWord.toLowerCase();

  while(i < lower.length) {
    let matched = false;
    for(const [pat, sound] of ON_SORTED) {
      if(lower.slice(i, i + pat.length) === pat) {
        phonemes += sound;
        i += pat.length;
        matched = true;
        break;
      }
    }
    if(!matched) i++;
  }

  return phonemes;
}

// ─── PRONOUN CASE TABLE ──────────────────────────────────────────────────────
// Each personal pronoun has nominative (subject) and accusative (object) forms.
// Dative included for prepositional contexts (to me, with him, etc.)
const PRONOUNS = {
  'i':    { nom:'ek',   acc:'mik',   dat:'mér' },
  'you':  { nom:'þú',   acc:'þik',   dat:'þér' },
  'he':   { nom:'hann', acc:'hann',  dat:'honum' },
  'she':  { nom:'hon',  acc:'hana',  dat:'henni' },
  'it':   { nom:'þat',  acc:'þat',   dat:'því' },
  'we':   { nom:'vér',  acc:'oss',   dat:'oss' },
  'they': { nom:'þeir', acc:'þá',    dat:'þeim' },
};

// English subject pronouns — used to detect nominative position
const SUBJECT_PRONOUNS = new Set(['i','you','he','she','it','we','they','who']);

// English object/preposition pronouns — used to detect accusative position
const OBJECT_PRONOUNS  = new Set(['me','you','him','her','it','us','them','whom']);

// Prepositions that trigger dative in ON
// Note: 'to' is genitive in Old Norse, not dative — removed for accuracy
const DATIVE_PREPS = new Set(['with','at','from','by','beside','between','against','within']);
// "to" is dative EXCEPT after motion verbs (where it's accusative)
// Motion verbs handle "to" separately in Step 5b
const DATIVE_PREPS_WITH_TO = new Set([...DATIVE_PREPS, 'to']);

// V2 (Verb-Second) adverbs that trigger reordering
// Only these specific adverbs consistently trigger V2 in Old Norse
const V2_ADVERBS = new Set(['then','now','so']);

// Motion verbs that take accusative object without preposition
// For these, "to" means motion → remove preposition, use accusative
const MOTION_VERBS = new Set(['go','come','travel','walk','ride','sail','fly','move','run','return','drive']);

// Auxiliary/modal verbs (tense-bearers in compound forms)
// For V2, prefer to move the MAIN verb, not the auxiliary
// However, in present tense system, these are finite forms themselves
// Strategy: if only auxiliary present, move it; if main verb after, move main verb
const AUXILIARY_VERBS = new Set(['be','have','will','shall','can','may','must','need','want']);

// ─── VERB CONJUGATION TABLE ──────────────────────────────────────────────────
// Present tense, indicative. Keyed by English infinitive → forms by ON subject pronoun.
// Pronouns: ek, þú, hann/hon/þat, vér, þér (plural you), þeir
// Structure: [ek, þú, hann, vér, þér, þeir]
const CONJ = {
  // vera — to be (irregular)
  'be':     ['em',    'ert',   'er',    'erum',   'eruð',   'eru'],
  // hafa — to have (weak)
  'have':   ['hefi',  'hefir', 'hefir', 'höfum',  'hafið',  'hafa'],
  // elska — to love (weak class 2)
  'love':   ['elska', 'elskar','elskar','elskum',  'elskið', 'elska'],
  // sjá — to see (strong class 5)
  'see':    ['sé',    'sér',   'sér',   'séum',   'séið',   'sjá'],
  // fara — to go (strong class 6)
  'go':     ['fer',   'ferr',  'ferr',  'förum',  'farið',  'fara'],
  // koma — to come (strong class 4)
  'come':   ['kem',   'kemr',  'kemr',  'komum',  'komið',  'koma'],
  // vita — to know (preterite-present)
  'know':   ['veit',  'veizt', 'veit',  'vitum',  'vitið',  'vitu'],
  // gefa — to give (strong class 5)
  'give':   ['gef',   'gefr',  'gefr',  'gefum',  'gefið',  'gefa'],
  // taka — to take (strong class 6)
  'take':   ['tek',   'tekr',  'tekr',  'tökum',  'takið',  'taka'],
  // segja — to say (weak)
  'say':    ['segi',  'segir', 'segir', 'segjum', 'segið',  'segja'],
  // gera — to do/make (weak)
  'do':     ['geri',  'gerir', 'gerir', 'gerum',  'gerið',  'gera'],
  'make':   ['geri',  'gerir', 'gerir', 'gerum',  'gerið',  'gera'],
  // vilja — to want (preterite-present)
  'want':   ['vil',   'vilt',  'vill',  'viljum', 'vilið',  'vilja'],
  // munu — will (modal)
  'will':   ['mun',   'munt',  'mun',   'munum',  'munuð',  'munu'],
  // skulu — shall (modal)
  'shall':  ['skal',  'skalt', 'skal',  'skulum', 'skuluð', 'skulu'],
  // mega — may (preterite-present)
  'may':    ['má',    'mátt',  'má',    'megum',  'megið',  'mega'],
  // kunna — can (preterite-present)
  'can':    ['kann',  'kannt', 'kann',  'kunnum', 'kunnið', 'kunna'],
  // þurfa — must/need (preterite-present)
  'must':   ['þarf',  'þarft', 'þarf',  'þurfum', 'þurfið', 'þurfa'],
  'need':   ['þarf',  'þarft', 'þarf',  'þurfum', 'þurfið', 'þurfa'],
  // finna — to find/feel (strong class 3)
  'find':   ['finn',  'finnr', 'finnr', 'finnum', 'finnið', 'finna'],
  'feel':   ['finn',  'finnr', 'finnr', 'finnum', 'finnið', 'finna'],
  // halda — to hold/keep (strong class 7)
  'hold':   ['held',  'heldr', 'heldr', 'höldum', 'haldið', 'halda'],
  'keep':   ['held',  'heldr', 'heldr', 'höldum', 'haldið', 'halda'],
  // standa — to stand (strong class 6)
  'stand':  ['stend', 'stendr','stendr','stöndum','standið','standa'],
  // ganga — to walk/go (strong class 7)
  'walk':   ['geng',  'gengr', 'gengr', 'göngum', 'gangið', 'ganga'],
  // ríða — to ride (strong class 1)
  'ride':   ['ríð',   'ríðr',  'ríðr',  'ríðum',  'ríðið',  'ríða'],
  // berjast — to fight (mediopassive)
  'fight':  ['berjumk','bersk', 'bersk', 'berjumk','berjisk','berjask'],
  // vinna — to win (strong class 3)
  'win':    ['vinn',  'vinnr', 'vinnr', 'vinnum', 'vinnið', 'vinna'],
  // elska repeated entries for adore/cherish handled via alias
  'adore':  ['elska', 'elskar','elskar','elskum',  'elskið', 'elska'],
  'cherish':['elska', 'elskar','elskar','elskum',  'elskið', 'elska'],
  // mæla — to speak (weak)
  'speak':  ['mæli',  'mælir', 'mælir', 'mælum',  'mælið',  'mæla'],
  // heyra — to hear (weak)
  'hear':   ['heyri', 'heyrir','heyrir','heyrum',  'heyrið','heyra'],
  // lifa — to live (weak)
  'live':   ['lifi',  'lifir', 'lifir', 'lifum',  'lifið',  'lifa'],
  // sofa — to sleep (strong class 4)
  'sleep':  ['sef',   'sefr',  'sefr',  'sofum',  'sofið',  'sofa'],
  // drekka — to drink (strong class 3)
  'drink':  ['drekk', 'drekkr','drekkr','drekkum','drekkið','drekka'],
  // eta — to eat (strong class 5)
  'eat':    ['et',    'etr',   'etr',   'etum',   'etið',   'eta'],
  // trúa — to trust/believe (weak)
  'trust':  ['trúi',  'trúir', 'trúir', 'trúum',  'trúið',  'trúa'],
  'believe':['trúi',  'trúir', 'trúir', 'trúum',  'trúið',  'trúa'],
  // ótta — to fear (mediopassive)
  'fear':   ['óttumk','óttask','óttask','óttumsk','óttisk','óttask'],
  // sœkja — to seek (weak)
  'seek':   ['sœki',  'sœkir', 'sœkir', 'sœkjum','sœkið',  'sœkja'],
};

// Map ON nominative pronoun → conjugation index (for CONJ arrays)
const PRON_TO_IDX = {
  'ek':1, 'þú':2, 'hann':3, 'hon':3, 'þat':3, 'vér':4, 'þér':5, 'þeir':6,
};
// Adjust to 0-based
Object.keys(PRON_TO_IDX).forEach(k => PRON_TO_IDX[k]--);

// ─── NOUN GENDER SYSTEM (Phase 2 Grammar Engine) ────────────────────────────
// Each noun is marked with gender: m (masculine), f (feminine), n (neuter)
// This allows adjectives and possessives to agree properly.
const NOUN_GENDER = {
  // People (singular and plural)

// ─── REVERSE DICTIONARY: OLD NORSE → ENGLISH ──────────────────────────────────
// Built by inverting EN_TO_ON (first English match wins if multiple)
const ON_TO_EN = {};
Object.entries(EN_TO_ON).forEach(([en, on]) => {
  if(!ON_TO_EN[on]) ON_TO_EN[on] = en;
});

// ─── GRAMMAR-AWARE TOKENISER ─────────────────────────────────────────────────
// Strategy:
//   1. Split input into word tokens
//   2. Identify each word as: pronoun, verb (conjugable), or dictionary word
//   3. Resolve pronoun case based on position relative to verbs
//   4. Conjugate verbs based on nearest preceding subject pronoun

// ─── HELPER: Clear non-active fields when one becomes active ──────────────────
function clearOtherFields(activeType) {
  if(activeType !== 'english') document.getElementById('inp').value = '';
  if(activeType !== 'oldnorse') document.getElementById('onOut').textContent = '';
  if(activeType !== 'runes') document.getElementById('runeOut').textContent = '';
}

// ─── MAIN TRANSLATION ORCHESTRATOR ────────────────────────────────────────────
function translate() {
  const enInp   = document.getElementById('inp').value.trim();
  const onInp   = document.getElementById('onOut').textContent.trim();
  const runesInp = document.getElementById('runeOut').textContent.trim();
  const ukEl    = document.getElementById('unknownKey');

  if(!enInp && !onInp && !runesInp) {
    document.getElementById('onOut').textContent = '';
    document.getElementById('runeOut').textContent = '';
    ukEl.style.display = 'none';
    return;
  }

  let enStr = enInp;
  let onStr = onInp;
  let runesStr = runesInp;
  let allUnknowns = [];

  // Route based on active input
  if(activeInput === 'english' && enStr) {
    // English → Old Norse → Runes (original pipeline)
    const sentences = enStr.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 0);
    const allOnResults = [];

    sentences.forEach(sentence => {
      const result = processSentence(sentence);
      if(result.onStr) allOnResults.push(result.onStr);
      allUnknowns.push(...result.unknowns);
    });

    onStr = allOnResults.join(' ');
    runesStr = renderRunes(onStr);

  } else if(activeInput === 'oldnorse' && onStr) {
    // Old Norse → English + Runes
    const enResult = onToEnglish(onStr);
    enStr = enResult.text;
    allUnknowns = enResult.unknowns;
    runesStr = renderRunes(onStr);

  } else if(activeInput === 'runes' && runesInp) {
    // Runes → Old Norse → English
    const onResult = runesToOldNorse(runesInp);
    onStr = onResult.text;
    allUnknowns = onResult.unknowns;

    const enResult = onToEnglish(onStr.replace(/<[^>]*>/g, ''));
    enStr = enResult.text;
    allUnknowns.push(...enResult.unknowns);
  }

  // Update outputs (but don't update the active input field to preserve cursor)
  updateAllOutputs(enStr, onStr, runesStr, allUnknowns, ukEl, activeInput);
}

// ─── RENDER RUNES WITH TOOLTIPS ──────────────────────────────────────────────
function renderRunes(onStr) {
  if(!onStr) return '<span class="placeholder-text">—</span>';

  const runes = onToRunes(onStr);
  if(!runes.length) return '<span class="placeholder-text">—</span>';

  return runes.map(r => {
    if(r.space) return '<span class="rune-char space"> </span>';
    return `<span class="tooltip-wrap"><span class="rune-char">${r.rune}</span><span class="tip">${r.name}</span></span>`;
  }).join('');
}

// ─── UPDATE ALL OUTPUT FIELDS ────────────────────────────────────────────────
// Skip updating the active input field to preserve cursor position
function updateAllOutputs(enStr, onStr, runesStr, unknowns, ukEl, activeType) {
  // Update English textarea (unless it's the active input)
  if(activeType !== 'english') {
    document.getElementById('inp').value = enStr;
  }

  // Update Old Norse with unknowns highlighted (unless it's the active input)
  if(activeType !== 'oldnorse') {
    let onHTML = '';
    if(!onStr || onStr.trim().length === 0) {
      onHTML = '<span class="placeholder-text">Old Norse will appear here</span>';
    } else {
      const onWords = onStr.trim().split(' ');
      onWords.forEach(word => {
        if(unknowns && unknowns.some(u => word.toLowerCase().includes(u.toLowerCase()))) {
          onHTML += `<span class="unknown" title="No match">${word}</span> `;
        } else {
          onHTML += word + ' ';
        }
      });
    }
    document.getElementById('onOut').innerHTML = onHTML.trim() || '<span class="placeholder-text">Old Norse will appear here</span>';
  }

  // Update Runes (unless it's the active input)
  if(activeType !== 'runes') {
    document.getElementById('runeOut').innerHTML = runesStr;
  }

  // Always update unknowns display
  if(unknowns && unknowns.length) {
    ukEl.textContent = `Dotted underline = no dictionary match: ${[...new Set(unknowns)].join(', ')}`;
    ukEl.style.display = 'block';
  } else {
    ukEl.style.display = 'none';
  }
}

function processSentence(sentence) {
  // Step 1: raw tokenise
  const raw = sentence.toLowerCase().match(/[a-záéíóúýæøöǫþðä'-]+|[^a-záéíóúýæøöǫþðä\s]+|\s+/g) || [];

  // Step 2: classify each word token
  // types: 'space', 'punct', 'subj_pron', 'obj_pron', 'verb', 'word', 'adjective', 'possessive', 'noun', 'unknown'
  const classified = [];
  let i = 0;
  while(i < raw.length) {
    const tok = raw[i];
    if(/^\s+$/.test(tok))                        { classified.push({type:'space'}); i++; continue; }
    if(!/[a-záéíóúýæøöǫþðä]/.test(tok))          { classified.push({type:'punct',val:tok}); i++; continue; }

    // Two-word phrase check first
    let phraseMatched = false;
    if(i+2 < raw.length && /^\s+$/.test(raw[i+1]) && /[a-z]/.test(raw[i+2])) {
      const phrase = tok + ' ' + raw[i+2];
      if(EN_TO_ON[phrase]) {
        classified.push({type:'word', en:phrase, on:EN_TO_ON[phrase]});
        i += 3; phraseMatched = true;
      }
    }
    if(phraseMatched) continue;

    const clean = tok.replace(/^'+|'+$/g,'');

    if(PRONOUNS[clean]) {
      // Classify as subject or object pronoun — will resolve case in step 3
      classified.push({type:'pronoun', en:clean, pron:PRONOUNS[clean]});
    } else if(CONJ[clean]) {
      classified.push({type:'verb', en:clean});
    } else if(POSSESSIVES[clean]) {
      // Possessive — will apply gender agreement in step 4
      classified.push({type:'possessive', en:clean});
    } else if(ADJECTIVES[clean]) {
      // Adjective — will apply gender agreement in step 4
      classified.push({type:'adjective', en:clean});
    } else if(NOUN_GENDER[clean]) {
      // Noun with tracked gender — look up translation from dictionary
      const on = EN_TO_ON[clean] || clean;
      classified.push({type:'noun', en:clean, on:on, gender:NOUN_GENDER[clean]});
    } else if(EN_TO_ON[clean]) {
      classified.push({type:'word', en:clean, on:EN_TO_ON[clean]});
    } else {
      classified.push({type:'unknown', en:clean});
    }
    i++;
  }

  // Step 3: resolve pronoun case
  // Rule: Track whether we've seen a verb in the clause
  //   - Before any verb = nominative (subject)
  //   - After a verb = accusative (object)
  //   - After dative preposition = dative
  const wordToks = classified.filter(t => t.type !== 'space' && t.type !== 'punct');

  // First pass: find positions of verbs in word tokens
  const verbPositions = new Set();
  wordToks.forEach((tok, idx) => {
    if(tok.type === 'verb') verbPositions.add(idx);
  });

  const resolved = classified.map((tok, absIdx) => {
    if(tok.type !== 'pronoun') return tok;

    // Find this pronoun's position in word tokens
    const wordIdx = wordToks.indexOf(tok);
    const prev = wordToks[wordIdx - 1];

    let caseForm = 'nom'; // default to nominative

    // 1. If preceded by a dative preposition → dative (highest priority)
    if(prev && prev.type === 'word' && DATIVE_PREPS.has(prev.en)) {
      caseForm = 'dat';
    }
    // 2. Check if we've seen a verb before this pronoun
    else {
      let seenVerb = false;
      for(let i = 0; i < wordIdx; i++) {
        if(verbPositions.has(i)) {
          seenVerb = true;
          break;
        }
      }
      caseForm = seenVerb ? 'acc' : 'nom';
    }

    return { ...tok, on: tok.pron[caseForm] };
  });

  // Step 4: conjugate verbs
  // Track subject pronouns and nouns before verbs to determine conjugation form.
  // Default to 3rd person (hann for singular, þeir for plural).
  // Reset subject on 'and' to handle compound sentences correctly.
  let lastSubjON = null; // ON nominative pronoun string
  let lastSubjIsPlural = false; // Track if last subject is plural
  const conjugated = resolved.map(tok => {
    // Reset subject on conjunction (new clause)
    if(tok.type === 'word' && tok.en === 'and') {
      lastSubjON = null;
      lastSubjIsPlural = false;
    }

    // Track subject pronouns
    if(tok.type === 'pronoun' && tok.on) {
      // Only update lastSubj if this resolved to nominative
      const p = tok.pron;
      if(tok.on === p.nom) {
        lastSubjON = tok.on;
        // Pronouns 'vér' (us) and 'þeir/þær' (them) are plural
        lastSubjIsPlural = ['vér','þeir','þær','þau'].includes(tok.on);
      }
    }

    // Track subject nouns
    if(tok.type === 'noun') {
      // A noun before a verb is likely the subject if nominative
      // Check if this noun appears before a verb in the sentence
      lastSubjIsPlural = tok.en.endsWith('s') ||
                         ['men','children','people','eyes','feet','teeth','oxen'].includes(tok.en);
    }

    if(tok.type !== 'verb') return tok;

    const forms = CONJ[tok.en];
    if(!forms) return { ...tok, on: tok.en }; // fallback: pass through

    // Determine conjugation index based on subject
    let idx = 2; // default to 3rd person singular (hann)
    if(lastSubjON) {
      idx = PRON_TO_IDX[lastSubjON] ?? 2;
    } else if(lastSubjIsPlural) {
      idx = 5; // 3rd person plural (þeir/þær/þau)
    }
    return { ...tok, on: forms[idx] };
  });

  // Step 5: apply gender agreement (adjectives & possessives)
  // First, pre-compute verb positions for accurate noun case detection
  const verbIndices = [];
  for(let i = 0; i < conjugated.length; i++) {
    if(conjugated[i].type === 'verb') {
      verbIndices.push(i);
    }
  }

  // Strategy:
  //   - Possessive + noun: possessive agrees with noun's gender
  //   - Noun + adjective: adjective agrees with noun's gender & case
  const withAgreement = conjugated.map((tok, idx) => {
    // Handle possessives: find the following noun
    if(tok.type === 'possessive') {
      // Look ahead for the noun (skip spaces, adjectives, punctuation)
      let nextNounIdx = idx + 1;
      while(nextNounIdx < conjugated.length &&
            (conjugated[nextNounIdx].type === 'space' ||
             conjugated[nextNounIdx].type === 'punct' ||
             conjugated[nextNounIdx].type === 'adjective')) {
        nextNounIdx++;
      }
      const nextTok = conjugated[nextNounIdx];

      if(nextTok && (nextTok.type === 'noun' || nextTok.type === 'word')) {
        const gender = nextTok.gender || NOUN_GENDER[nextTok.en] || 'm';
        const possForm = POSSESSIVES[tok.en];
        if(possForm) {
          // Apply appropriate form based on noun's gender
          const form = gender === 'f' ? possForm.fem_sg
                     : gender === 'n' ? possForm.neut_sg
                     : possForm.masc_sg;
          return { ...tok, on: form };
        }
      }
      // Fallback: use base dictionary form
      return { ...tok, on: EN_TO_ON[tok.en] || tok.en };
    }

    // Handle adjectives: find the following noun (English: adjective BEFORE noun)
    if(tok.type === 'adjective') {
      // Look forward for the noun (skip spaces/punctuation)
      let nextNounIdx = idx + 1;
      while(nextNounIdx < conjugated.length &&
            (conjugated[nextNounIdx].type === 'space' ||
             conjugated[nextNounIdx].type === 'punct')) {
        nextNounIdx++;
      }
      const nextTok = conjugated[nextNounIdx];

      if(nextTok && (nextTok.type === 'noun' || nextTok.type === 'word')) {
        const gender = nextTok.gender || NOUN_GENDER[nextTok.en] || 'm';

        // Detect if noun is plural: ends in 's' or is irregular plural
        const isPlural = nextTok.en.endsWith('s') ||
                        ['men','children','people','eyes','feet','teeth','oxen'].includes(nextTok.en);

        // Detect case: look back for a verb
        // If verb found before adjective, noun is likely an object → accusative
        let caseForm = 'nom';
        for(let j = idx - 1; j >= 0; j--) {
          if(conjugated[j].type === 'verb') {
            caseForm = 'acc';
            break;
          }
          // Stop if we hit another noun/pronoun (new phrase)
          if(conjugated[j].type === 'noun' || (conjugated[j].type === 'pronoun' && conjugated[j].type !== 'space')) {
            break;
          }
        }

        const adjForm = ADJECTIVES[tok.en];
        if(adjForm) {
          // Apply appropriate form based on noun's gender, case, and plurality
          const numberForm = isPlural ? 'pl' : 'sg';
          const key = `${gender === 'f' ? 'fem' : gender === 'n' ? 'neut' : 'masc'}_${caseForm}_${numberForm}`;
          const form = adjForm[key] || adjForm.base;
          return { ...tok, on: form };
        }
      }
      // Fallback: use base form from dictionary
      return { ...tok, on: EN_TO_ON[tok.en] || ADJECTIVES[tok.en]?.base || tok.en };
    }

    // Handle nouns: detect case, number, and apply full declension
    if(tok.type === 'noun') {
      const gender = tok.gender || NOUN_GENDER[tok.en] || 'm';

      // Detect if noun is plural
      const isPlural = tok.en.endsWith('s') ||
                       ['men','children','people','eyes','feet','teeth','oxen'].includes(tok.en);

      // Detect case: dative preposition has highest priority
      let caseForm = 'nom'; // default nominative
      let prevWord = null;

      // Find immediately preceding word (skip spaces/punctuation)
      for(let j = idx - 1; j >= 0; j--) {
        const prevTok = conjugated[j];
        if(prevTok.type === 'word' || prevTok.type === 'pronoun') {
          prevWord = prevTok;
          break;
        }
        if(prevTok.type === 'punct') {
          break;
        }
      }

      // 1. Check if preceded by dative preposition (highest priority)
      if(prevWord && prevWord.type === 'word') {
        if(DATIVE_PREPS.has(prevWord.en)) {
          caseForm = 'dat';
        }
        // Special case: "to" is dative UNLESS preceded by motion verb
        else if(prevWord.en === 'to') {
          // Check if there's a motion verb before "to"
          let hasMotionVerbBeforeTo = false;
          for(let j = idx - 1; j >= 0; j--) {
            if(conjugated[j].type === 'verb') {
              if(MOTION_VERBS.has(conjugated[j].en)) {
                hasMotionVerbBeforeTo = true;
              }
              break;
            }
            if(conjugated[j].type === 'punct') {
              break;
            }
          }
          // If no motion verb before "to", then "to" is dative
          if(!hasMotionVerbBeforeTo) {
            caseForm = 'dat';
          }
          // If motion verb before "to", stays nominative (will be accusative from verb detection)
        }
      }
      // 2. Determine accusative vs nominative based on verb position
      else {
        // Find the nearest verb (forward or backward)
        let nearestVerbIdx = -1;
        let verbDistance = Infinity;

        // Check verbs before this noun
        for(let vIdx of verbPositions) {
          if(vIdx < idx) {
            const dist = idx - vIdx;
            if(dist < verbDistance) {
              nearestVerbIdx = vIdx;
              verbDistance = dist;
            }
          }
        }

        // Check verbs after this noun
        for(let vIdx of verbPositions) {
          if(vIdx > idx) {
            const dist = vIdx - idx;
            if(dist < verbDistance) {
              nearestVerbIdx = vIdx;
              verbDistance = dist;
            }
          }
        }

        // Determine case based on verb position:
        // - If nearest verb is AFTER: noun is likely subject (nominative)
        // - If nearest verb is BEFORE: noun is likely object (accusative)
        if(nearestVerbIdx !== -1) {
          if(nearestVerbIdx < idx) {
            // Verb is before noun → noun is object → accusative
            caseForm = 'acc';
          }
          // If verb is after noun, stays nominative (default)
        }
      }

      // Try to look up in NOUN_DECLENSION
      const declension = NOUN_DECLENSION[tok.en];
      if(declension) {
        const numberSuffix = isPlural ? 'pl' : 'sg';
        const key = `${caseForm}_${numberSuffix}`;
        const form = declension[key];
        if(form) {
          return { ...tok, on: form };
        }
      }

      // Fallback: apply basic accusative form changes for undeclensed nouns
      if(caseForm === 'acc') {
        let accForm = tok.on;

        // Masculine: -i → -a (e.g., kappi → kappa), -r → drop -r
        if(gender === 'm' && accForm.endsWith('i')) {
          accForm = accForm.slice(0, -1) + 'a';
        } else if(gender === 'm' && accForm.endsWith('r')) {
          accForm = accForm.slice(0, -1);
        }
        // Feminine: -a → -u (e.g., kona → konu)
        else if(gender === 'f' && accForm.endsWith('a')) {
          accForm = accForm.slice(0, -1) + 'u';
        }
        // Neuter: usually unchanged in accusative

        return { ...tok, on: accForm };
      }
      return tok;
    }

    return tok;
  });

  // Step 5b: Handle "to" + noun pattern (motion verbs only)
  // Old Norse expresses motion/goal with accusative alone, not preposition + dative
  // "to" after motion verb = accusative: "go to hall" → "fara höll"
  // "to" after other verbs = dative: "give to him" → "gefa honum" (dative)
  // Remove "to" ONLY for motion verbs; keep for others (treated as regular preposition)
  const withoutToPrep = [];
  for(let i = 0; i < withAgreement.length; i++) {
    const tok = withAgreement[i];
    const next = withAgreement[i + 1];
    const next2 = withAgreement[i + 2];

    // Pattern: "to" + space + noun
    if(tok.type === 'word' && tok.en === 'to' &&
       next && next.type === 'space' &&
       next2 && (next2.type === 'noun' || next2.type === 'word')) {
      // Check if there's a motion verb before this "to"
      let hasMotionVerbBefore = false;
      for(let j = i - 1; j >= 0; j--) {
        if(withAgreement[j].type === 'verb') {
          // Check if this verb is a motion verb
          if(MOTION_VERBS.has(withAgreement[j].en)) {
            hasMotionVerbBefore = true;
          }
          break; // Stop at first verb
        }
        if(withAgreement[j].type === 'punct') {
          break; // Stop at punctuation
        }
      }

      if(hasMotionVerbBefore) {
        // Skip the "to" for motion verbs (use accusative)
        continue;
      }
    }
    withoutToPrep.push(tok);
  }

  // Step 6: fix word order (negation: do + not + verb → verb + eigi)
  const reorderedTokens = [];
  for(let i = 0; i < withoutToPrep.length; i++) {
    const tok = withoutToPrep[i];
    const next = withoutToPrep[i + 1];
    const next2 = withoutToPrep[i + 2];

    // Pattern: "do" + (space) + "not" + (space) + verb
    if(tok.type === 'word' && tok.en === 'do' &&
       next && next.type === 'space' &&
       next2 && next2.type === 'word' && next2.en === 'not') {
      // Look for the verb after "not"
      let verbIdx = i + 3;
      while(verbIdx < withoutToPrep.length &&
            (withoutToPrep[verbIdx].type === 'space' ||
             withoutToPrep[verbIdx].type === 'punct')) {
        verbIdx++;
      }
      if(verbIdx < withoutToPrep.length && withoutToPrep[verbIdx].type === 'verb') {
        // Skip "do" and "not", output verb then "eigi"
        i += 2; // skip to "not"
        continue;
      }
    }

    // Pattern: "not" after a verb → output verb first, then eigi
    if(tok.type === 'word' && tok.en === 'not') {
      // Check if previous word was a verb
      let prevVerb = null;
      for(let j = reorderedTokens.length - 1; j >= 0; j--) {
        if(reorderedTokens[j].type !== 'space' && reorderedTokens[j].type !== 'punct') {
          if(reorderedTokens[j].type === 'verb') {
            prevVerb = reorderedTokens[j];
          }
          break;
        }
      }
      if(prevVerb) {
        // Output "eigi" instead of "not"
        reorderedTokens.push({type: 'word', en: 'not', on: 'eigi'});
        continue;
      }
    }

    reorderedTokens.push(tok);
  }

  // Step 7: apply V2 (Verb-Second) word order for fronted adverbs
  // Only applies to restricted set: þá, nú, svá (then, now, so)
  // Pattern: [Adverb] [Finite Verb] [Subject] [Rest]
  // Re-triggers after conjunctions (and, but, or) for each clause
  {
    // Find all potential V2 adverb positions (including after conjunctions)
    let searchStartIdx = 0;

    while(searchStartIdx < reorderedTokens.length) {
      // Find first content token from searchStartIdx (non-space, non-punct)
      let firstContentIdx = -1;
      let firstContentTok = null;
      for(let i = searchStartIdx; i < reorderedTokens.length; i++) {
        if(reorderedTokens[i].type !== 'space' && reorderedTokens[i].type !== 'punct') {
          firstContentIdx = i;
          firstContentTok = reorderedTokens[i];
          break;
        }
      }

      if(firstContentIdx === -1) break; // No more content

      // Check if this content token is a V2 adverb
      if(firstContentTok && firstContentTok.type === 'word' && V2_ADVERBS.has(firstContentTok.en)) {
        // Find the adverb's trailing space
        let adverbSpaceIdx = -1;
        for(let i = firstContentIdx + 1; i < reorderedTokens.length; i++) {
          if(reorderedTokens[i].type === 'space') {
            adverbSpaceIdx = i;
            break;
          }
        }

        if(adverbSpaceIdx !== -1) {
          // Find the main verb after the adverb+space (stop at conjunction or punctuation)
          // Strategy: Skip auxiliaries and find the main content verb
          // If only auxiliary present, use it; if main verb follows, use main verb
          let verbIdx = -1;
          let firstVerbIdx = -1;
          let firstVerbIsAuxiliary = false;

          for(let i = adverbSpaceIdx + 1; i < reorderedTokens.length; i++) {
            if(reorderedTokens[i].type === 'verb') {
              if(firstVerbIdx === -1) {
                firstVerbIdx = i;
                firstVerbIsAuxiliary = AUXILIARY_VERBS.has(reorderedTokens[i].en);
              } else if(firstVerbIsAuxiliary && !AUXILIARY_VERBS.has(reorderedTokens[i].en)) {
                // Found a main verb after an auxiliary - prefer the main verb
                verbIdx = i;
                break;
              } else if(!firstVerbIsAuxiliary) {
                // Already found a main verb, no need to continue
                verbIdx = firstVerbIdx;
                break;
              }
            }
            // Stop at clause boundaries
            if(reorderedTokens[i].type === 'punct' ||
               (reorderedTokens[i].type === 'word' && ['and','but','or'].includes(reorderedTokens[i].en))) {
              // If we only found an auxiliary, use it
              if(firstVerbIdx !== -1 && verbIdx === -1) {
                verbIdx = firstVerbIdx;
              }
              break;
            }
          }

          // If no main verb found, use first verb
          if(verbIdx === -1 && firstVerbIdx !== -1) {
            verbIdx = firstVerbIdx;
          }

          // If verb found and not already in position 2 (adverb + space + verb)
          if(verbIdx !== -1 && verbIdx !== adverbSpaceIdx + 1) {
            // Extract verb token and check for trailing space
            const verbTok = reorderedTokens[verbIdx];
            let trailingSpace = null;

            if(verbIdx + 1 < reorderedTokens.length &&
               reorderedTokens[verbIdx + 1].type === 'space') {
              trailingSpace = reorderedTokens[verbIdx + 1];
            }

            // Remove verb (and trailing space if exists) from original position
            const removeCount = trailingSpace ? 2 : 1;
            reorderedTokens.splice(verbIdx, removeCount);

            // Insert verb right after adverb+space
            const insertPos = adverbSpaceIdx + 1;
            if(trailingSpace) {
              reorderedTokens.splice(insertPos, 0, verbTok, trailingSpace);
            } else {
              reorderedTokens.splice(insertPos, 0, verbTok);
            }

            // Update searchStartIdx to continue searching after this verb position
            searchStartIdx = insertPos + (trailingSpace ? 2 : 1);
          } else {
            // No suitable verb found, move past this adverb
            searchStartIdx = adverbSpaceIdx + 2;
          }
        } else {
          // No space after adverb, move on
          searchStartIdx = firstContentIdx + 1;
        }
      } else {
        // Not a V2 adverb. If it's a conjunction, continue from next position
        // Otherwise, skip to next sentence boundary
        if(firstContentTok && firstContentTok.type === 'word' &&
           ['and','but','or'].includes(firstContentTok.en)) {
          // Found conjunction, continue searching from after it
          searchStartIdx = firstContentIdx + 1;
        } else {
          // Not a V2 adverb and not a conjunction, stop searching
          break;
        }
      }
    }
  }

  // Step 8: collect unknowns and build strings
  const unknowns = [];
  reorderedTokens.forEach(t => {
    if(t.type === 'unknown' && !unknowns.includes(t.en)) unknowns.push(t.en);
  });

  let onStr = '';
  reorderedTokens.forEach(t => {
    if     (t.type === 'space')   onStr += ' ';
    else if(t.type === 'word' || t.type === 'pronoun' || t.type === 'verb' || t.type === 'noun' ||
            t.type === 'adjective' || t.type === 'possessive') onStr += (t.on || t.en) + ' ';
    else if(t.type === 'unknown') onStr += t.en + ' ';
    // punct skipped
  });
  onStr = onStr.trim();

  return { onStr, unknowns };
}

// ─── COPY ────────────────────────────────────────────────────────────────────
function copyON() {
  navigator.clipboard.writeText(document.getElementById('onOut').textContent).catch(()=>{});
  flashCopy(document.querySelectorAll('.copy-btn')[0]);
}
function copyRunes() {
  const text = [...document.getElementById('runeOut').querySelectorAll('.rune-char')]
    .map(el => el.textContent).join('');
  navigator.clipboard.writeText(text).catch(()=>{});
  flashCopy(document.querySelectorAll('.copy-btn')[1]);
}
function flashCopy(btn){ btn.textContent='Copied'; setTimeout(()=>btn.textContent='Copy',1400); }

// ─── REFERENCE GRID ──────────────────────────────────────────────────────────
function toggleRef() {
  const sec  = document.getElementById('refSection');
  const tog  = document.getElementById('refToggle');
  const open = sec.style.display==='none';
  sec.style.display = open ? 'block' : 'none';
  tog.classList.toggle('open', open);
}

(function buildGrid(){
  document.getElementById('futharkGrid').innerHTML = FUTHARK.map(({r,sounds,name}) =>
    `<div class="rune-card">
      <div class="r">${r}</div>
      <div class="l">${sounds.join('/')}</div>
      <div class="n">${name}</div>
    </div>`
  ).join('');
})();
