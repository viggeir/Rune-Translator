  // Complement clause detection: "know/known that X", "say that X", etc.
  // We realize this as "at X" in Old Norse.
  const compMatch = clause.text.match(/^(.*?\b(?:know|knew|known|remember|remembered|say|said|think|thought|hear|heard|see|saw|believe|believed)\b)\s+that\s+(.+)$/i);
  if (compMatch) {
    clause.text = compMatch[1].trim();
    clause.complement = parseSimpleClause(compMatch[2].trim(), 'complement');
  }

  const relMatch = clause.text.match(/^(.*?\b(?:man|woman|king|queen|lord|lady|warrior|person)\b)\s+(who|that|which)\s+(.+)$/i);
  if (relMatch) {
    const headNP = parseHeadNounPhrase(relMatch[1].trim());
    const relTail = relMatch[3].trim();
    const predBoundary = relTail.match(/^(.*?)(\s+(?:would|will|can|could|should|might|must|did|does|do|has|have|had)\b.*)$/i);
    const reflexiveRelativeClause = markRelativeReflexivePossession(
      predBoundary ? predBoundary[1].trim() : relTail,
      headNP.surface
    );
    clause.text = predBoundary ? `${headNP.surface}${predBoundary[2]}`.trim() : headNP.surface;
    clause.subjectNP = headNP;
    clause.relative = {
      marker: 'er',
      attachmentTarget: headNP.surface,
      clause: reflexiveRelativeClause,
      attachment: {
        type: 'head-noun-phrase',
        headNoun: headNP.headNoun,
        headNP
      }
    };
  }

  const possessiveRelMatch = clause.text.match(/^(.*?\b(?:man|woman|king|queen|lord|lady|warrior|person)\b)\s+whose\s+([a-z'-]+)\s+(.+)$/i);
  if (possessiveRelMatch) {
    const relTail = possessiveRelMatch[3].trim();
    const predBoundary = relTail.match(/^(.*?)(\s+(?:would|will|can|could|should|might|must|did|does|do|has|have|had)\b.*)$/i);
    const headNP = parseHeadNounPhrase(possessiveRelMatch[1].trim());
    const head = headNP.surface;
    const embeddedText = predBoundary ? predBoundary[1].trim() : relTail;
    const embedded = parseEmbeddedClauseRoles(embeddedText);
    const possessorPronoun = resolveHeadPossessorPronoun(head);
    const possessedNoun = possessiveRelMatch[2].toLowerCase();
    embedded.objectPhrase = {
      type: 'possessed-noun',
      noun: possessedNoun,
      possessor: {
        type: 'head-reference',
        head,
        headNP,
        pronoun: possessorPronoun
      }
    };
    clause.text = predBoundary ? `${head}${predBoundary[2]}`.trim() : head;
    clause.relative = {
      marker: 'er',
      type: 'possessive',
      head,
      attachmentTarget: head,
      attachment: {
        type: 'head-noun-phrase',
        headNoun: headNP.headNoun,
        headNP
      },
      possessedNoun,
      possessor: embedded.objectPhrase.possessor,
      embedded,
      clause: embeddedText
    };
    clause.subjectNP = headNP;
  }

  const pastPerfectCondition = clause.text.match(/^\s*(.*?)\bhad\s+([a-z'-]+(?:ed|en|wn|ne|t|n))\b(.*)$/i);
  if (pastPerfectCondition && clauseType === 'protasis') {
    const subject = extractClauseSubject(pastPerfectCondition[1]);
    const args = parseVerbArguments(pastPerfectCondition[3] || '');
    clause.constructions.push({
      type: 'past-perfect-condition',
      tense: 'past-perfect',
      subject,
      predicate: pastPerfectCondition[2].toLowerCase(),
      object: args.object,
      trailing: args.trailing,
    });
  }

  const counterfactualHead = clause.text.match(/^\s*(.*?)\bwould\s+have\s+([a-z'-]+)\b(.*)$/i);
  if (counterfactualHead) {
    const subject = extractClauseSubject(counterfactualHead[1]);
    const args = parseVerbArguments(counterfactualHead[3] || '');
    const adverbials = parseAdverbials(args.object);
    const counterfactualConstruction = {
      type: 'counterfactual-result-construction',
      construction: 'counterfactual-result',
      mood: 'counterfactual-result',
      strategy: 'single-counterfactual-predicate',
      predicate: counterfactualHead[2].toLowerCase(),
      subject,
      object: adverbials.baseObject,
      adverbials: adverbials.modifiers,
      trailing: args.trailing,
    };
    clause.counterfactual = counterfactualConstruction;
    clause.constructions.push(counterfactualConstruction);
  }

  return clause;
}

function markRelativeReflexivePossession(relativeClauseText, headText) {
  const clause = (relativeClauseText || '').trim();
  if (!clause) return clause;
  const expectedPossessor = resolveHeadPossessorPronoun(headText || '');
  if (!expectedPossessor) return clause;
  const possRegex = new RegExp(`\\b(${expectedPossessor})\\b\\s+([a-z'-]+)`, 'gi');
  return clause.replace(possRegex, (_, poss, noun) => `${poss.toLowerCase()}-reflexive ${noun}`);
}

function parseEmbeddedClauseRoles(text) {
  const t = (text || '').trim();
  if (!t) return { subject: '', verb: '', object: '', trailing: '' };
  const roleMatch = t.match(/^(?:(i|you|he|she|it|we|they)\s+)?([a-z'-]+)(?:\s+(.+))?$/i);
  if (!roleMatch) return { subject: '', verb: '', object: t, trailing: '' };
  const args = parseVerbArguments(roleMatch[3] || '');
  return {
    subject: (roleMatch[1] || '').toLowerCase(),
    verb: (roleMatch[2] || '').toLowerCase(),
    object: args.object || '',
    trailing: args.trailing || '',
  };
}

function parseAdverbials(text) {
  const input = (text || '').trim();
  if (!input) return { baseObject: '', modifiers: [] };
  const modifiers = [];
  let base = input;
  const degreeManner = input.match(/\b([a-z'-]+)\s+([a-z'-]+ly)\b/i);
  if (degreeManner) {
    const degreeWord = degreeManner[1].toLowerCase();
    if (DEGREE_ADVERB_SET.has(degreeWord)) {
      modifiers.push({
        type: 'adverbial',
        role: 'manner',
        degree: degreeWord,
        value: degreeManner[2].toLowerCase(),
      });
      base = base.replace(degreeManner[0], '').replace(/\s{2,}/g, ' ').trim();
    }
  }
  return { baseObject: base, modifiers };
}

function parseVerbArguments(tailText) {
  const tail = (tailText || '').trim();
  if (!tail) return { object: '', trailing: '' };
  const prepositionBoundary = tail.match(/^(.*?)(\s+(?:before|after|with|without|for|from|to|in|on|under|over|into|upon|through|across|among|around|behind|beside|between|during|against|within|beyond)\b.*)$/i);
  if (prepositionBoundary) {
    return {
      object: (prepositionBoundary[1] || '').trim(),
      trailing: (prepositionBoundary[2] || '').trim(),
    };
  }
  return { object: tail, trailing: '' };
}

function buildRoleBasedClauseFromEnglish(text, options = {}) {
  const clauseText = (text || '').trim();
  const clauseMatch = clauseText ? clauseText.match(/^(?:(i|you|he|she|it|we|they)\s+)?([a-z'-]+)(?:\s+(.+))?$/i) : null;

  const subject = (options.subject || clauseMatch?.[1] || '').trim();
  const verb = (options.verb || clauseMatch?.[2] || '').trim();
  const object = (options.object !== undefined ? options.object : (clauseMatch?.[3] || '')).trim();

  return [subject, verb, object].filter(Boolean).join(' ').replace(/\s+/g, ' ').trim();
}

function parseHeadNounPhrase(text) {
  const raw = (text || '').trim();
  if (!raw) return { surface: '', determiner: '', modifiers: [], headNoun: '', coreText: '' };
  const match = raw.match(/^(?:(the)\s+)?((?:[a-z'-]+\s+){0,4})?(man|woman|king|queen|lord|lady|warrior|person)\b/i);
  if (!match) return { surface: raw, determiner: '', modifiers: [], headNoun: '', coreText: raw };
  const determiner = (match[1] || '').toLowerCase();
  const modifiers = (match[2] || '').trim().split(/\s+/).filter(Boolean);
  const headNoun = (match[3] || '').toLowerCase();
  const coreText = [...modifiers, headNoun].join(' ').trim();
  return {
    surface: raw,
    determiner,
    modifiers,
    headNoun,
    coreText: coreText || raw
  };
}

function realizeHeadNounPhrase(np, fallbackText = '', options = {}) {
  const forceStructured = !!options.forceStructured;
  const base = np && np.coreText ? np.coreText : (fallbackText || '');
  const translated = translateWithPhraseParserFallback(base);
  if (!np) return translated;

  const lexicalHead = LEMMAS[np.headNoun] || np.headNoun;
  const gender = (typeof NOUN_GENDER_EN !== 'undefined' && NOUN_GENDER_EN[lexicalHead]) || NOUN_GENDER[lexicalHead] || 'm';
  if (!forceStructured && np.determiner !== 'the') return translated;
  // Attach definite suffix to the last word of the translated noun phrase
  const words = (translated.text || '').split(' ').filter(Boolean);
  if (words.length > 0) {
    words[words.length - 1] = attachDefiniteArticle(words[words.length - 1], gender, 'nom', 'singular');
  }
  return {
    text: words.join(' ').trim(),
    unknowns: translated.unknowns || []
  };
}

function resolveHeadPossessorPronoun(headText) {
  const head = ((headText || '').match(/\b([a-z'-]+)\b(?=[^a-z'-]*$)/i) || [null, ''])[1].toLowerCase();
  if (['man', 'king', 'lord', 'warrior'].includes(head)) return 'his';
  if (['men', 'women', 'people', 'warriors', 'lords', 'kings'].includes(head)) return 'their';
  return 'her';
}

function realizeSyntaxIR(ir) {
  const unknowns = [];
  const parts = [];

  ir.clauses.forEach(node => {
    if (node.type === 'counterfactual') {
      const protasis = realizeClause(node.protasis, true);
      const apodosis = realizeClause(node.apodosis, true);
      parts.push(`ef ${protasis.text}, ${apodosis.text}`.replace(/\s+/g, ' ').trim());
      protasis.unknowns.forEach(u => { if (!unknowns.includes(u)) unknowns.push(u); });
      apodosis.unknowns.forEach(u => { if (!unknowns.includes(u)) unknowns.push(u); });
      return;
    }

    const realized = realizeClause(node, false);
    parts.push(realized.text);
    realized.unknowns.forEach(u => { if (!unknowns.includes(u)) unknowns.push(u); });
  });

  const oldNorse = enforceNoRawSourceLeakage(
    collapseDoSupportPredicates(validateGeneratedOldNorse(parts.join(' '))),
    unknowns
  );
  return { oldNorse, unknowns };
}

function realizeCounterfactualResultConstruction(construction, sourceText = '') {
  const lemma = normalizeLexiconToken(LEMMAS[construction.predicate] || construction.predicate);
  const safeObject = ensureRequiredObjectRetention(construction.predicate, construction.object, sourceText);
  const objectRealization = safeObject ? translateWithPhraseParserFallback(safeObject) : { text: '', unknowns: [] };
  const trailingRealization = construction.trailing ? translateWithPhraseParserFallback(construction.trailing) : { text: '', unknowns: [] };
  // Determine object gender for Viking-age past participle agreement
  const objEnLemma = LEMMAS[(construction.object || '').toLowerCase()] || (construction.object || '').toLowerCase();
  const objectGender = NOUN_GENDER[objEnLemma] || 'n';
  const counterfactualVerb = getCounterfactualResultVerb(
    construction.subject,
    lemma,
    objectRealization.text,
    trailingRealization.text,
    construction.adverbials || [],
    objectGender
  );
  const unknowns = EN_TO_ON[lemma] || EN_TO_ON[construction.predicate] ? [] : [construction.predicate];
  return {
    text: counterfactualVerb.replace(/\s+/g, ' ').trim(),
    unknowns: [...new Set([...(unknowns || []), ...(objectRealization.unknowns || []), ...(trailingRealization.unknowns || [])])]
  };
}

function realizeClause(clause, inCounterfactual) {
  let baseText = clause.text;
  const hasWouldHaveConstruction = /\bwould\s+have\s+/i.test(baseText);
  let deferredExplanatory = '';
  const pastPerfectCondition = clause.constructions
    ? clause.constructions.find(c => c.type === 'past-perfect-condition')
    : null;

  // Dedicated construction handling for counterfactual grammar.
  if (inCounterfactual && clause.type === 'protasis') {
    baseText = baseText.replace(/^\s*i\s+had\s+/i, 'i had ');
  } else if (inCounterfactual && clause.type === 'apodosis') {
    baseText = baseText.replace(/^\s*i\s+would\s+have\s+/i, 'i would have ');
    const explanatoryTail = baseText.match(/^(.*?),\s*for\s+(.+)$/i);
    if (explanatoryTail) {
      baseText = explanatoryTail[1].trim();
      deferredExplanatory = explanatoryTail[2].trim();
    }
  }

  // Keep original lexical material intact; verb-particle and content phrases
  // are represented in parse/IR, not rewritten into surrogate lemmas.

  let translated;
  let translatedText;
  if (inCounterfactual && clause.counterfactual && clause.counterfactual.construction === 'counterfactual-result') {
    translated = realizeCounterfactualResultConstruction(clause.counterfactual, clause.text);
    translatedText = translated.text;
  } else if (inCounterfactual && clause.type === 'protasis' && pastPerfectCondition) {
    const lemma = normalizeLexiconToken(LEMMAS[pastPerfectCondition.predicate] || pastPerfectCondition.predicate);
    const safeObject = ensureRequiredObjectRetention(pastPerfectCondition.predicate, pastPerfectCondition.object, clause.text);
    const objectRealization = safeObject ? translateWithPhraseParserFallback(safeObject) : { text: '', unknowns: [] };
    const trailingRealization = pastPerfectCondition.trailing ? translateWithPhraseParserFallback(pastPerfectCondition.trailing) : { text: '', unknowns: [] };
    // Determine object gender for Viking-age past participle agreement
    const ppObjLemma = LEMMAS[(pastPerfectCondition.object || '').toLowerCase()] || (pastPerfectCondition.object || '').toLowerCase();
    const ppObjectGender = NOUN_GENDER[ppObjLemma] || 'n';
    // If the subject is a nominal NP (not pronoun) and clause.subjectNP is available,
    // realize it with the gender-correct demonstrative (sú/sá/þat) via realizeHeadNounPhrase
    const PRONOUN_WORDS_SET = new Set(['i','you','he','she','it','we','they']);
    const isNominalSubject = pastPerfectCondition.subject &&
      !PRONOUN_WORDS_SET.has(pastPerfectCondition.subject.toLowerCase());
    if (isNominalSubject && clause.subjectNP) {
      const subjectRealized = realizeHeadNounPhrase(
        clause.subjectNP, pastPerfectCondition.subject, { forceStructured: true }
      );
      const subjHave   = getSubjHaveForm(null); // null → index 2 → 'hefði' (3rd-sg nominal)
      const participle = getParticiple(lemma, ppObjectGender);
      translatedText = `${subjectRealized.text} ${subjHave} ${participle} ${objectRealization.text} ${trailingRealization.text}`
        .replace(/\s+/g, ' ').trim();
      translated = {
        unknowns: [...new Set([
          ...(subjectRealized.unknowns || []),
          ...(EN_TO_ON[lemma] || EN_TO_ON[pastPerfectCondition.predicate] ? [] : [pastPerfectCondition.predicate]),
          ...(objectRealization.unknowns || []),
          ...(trailingRealization.unknowns || [])
        ])]
      };
    } else {
      translatedText = getPastPerfectConditionVerb(
        pastPerfectCondition.subject,
        lemma,
        objectRealization.text,
        trailingRealization.text,
        ppObjectGender
      );
      translated = { unknowns: EN_TO_ON[lemma] || EN_TO_ON[pastPerfectCondition.predicate] ? [] : [pastPerfectCondition.predicate] };
      translated.unknowns = [...new Set([...(translated.unknowns || []), ...(objectRealization.unknowns || []), ...(trailingRealization.unknowns || [])])];
    }
  } else if (clause.relative) {
    const relPredicateSplit = baseText.match(/^(.*?\b(?:man|woman|king|queen|lord|lady|warrior|person)\b)\s+((?:would|will|can|could|should|might|must|did|does|do|has|have|had)\b.+)$/i);
    const attachedHeadNP = clause.relative.attachment?.headNP || clause.subjectNP || null;
    if (clause.relative.type === 'possessive') {
      const antecedent = realizeHeadNounPhrase(
        attachedHeadNP,
        clause.relative.attachmentTarget || clause.relative.head || relPredicateSplit?.[1] || clause.text,
        { forceStructured: true }
      );
      const embedded = clause.relative.embedded || parseEmbeddedClauseRoles(clause.relative.clause || '');
      const relSubject = embedded.subject || 'i';
      const relVerb = embedded.verb || '';
      const relObjectTail = embedded.object || '';
      const relTrailing = embedded.trailing || '';
      const possessorPronoun = clause.relative.possessor?.pronoun || 'her';
      // Use reflexive only when the embedded subject IS the possessor; otherwise non-reflexive.
      // E.g. "whose brother I killed" → subject 'i' ≠ possessor 'her' → use 'her' (hennar).
      const subjectMatchesPossessor =
        (relSubject === 'she'  && possessorPronoun === 'her')   ||
        (relSubject === 'he'   && possessorPronoun === 'his')   ||
        (relSubject === 'they' && possessorPronoun === 'their') ||
        (relSubject === 'i'    && possessorPronoun === 'my')    ||
        (relSubject === 'we'   && possessorPronoun === 'our');
      const possessiveBase = subjectMatchesPossessor ? `${possessorPronoun}-reflexive` : possessorPronoun;
      const basePossessed = `${possessiveBase} ${clause.relative.possessedNoun}`.trim();
      const possessedPhrase = relObjectTail ? `${basePossessed} ${relObjectTail}` : basePossessed;
      const roleClause = buildRoleBasedClauseFromEnglish('', { subject: relSubject, verb: relVerb, object: `${possessedPhrase} ${relTrailing}`.trim() });
      const relBase = translateWithPhraseParserFallback(`${clause.relative.marker} ${roleClause}`);
      const predicateSource = relPredicateSplit ? relPredicateSplit[2].trim() : '';
      const predicate = predicateSource ? translateWithPhraseParserFallback(predicateSource) : { text: '', unknowns: [] };
      translated = { unknowns: [...(antecedent.unknowns || []), ...(relBase.unknowns || []), ...(predicate.unknowns || [])] };
      const attachedRelativeSubject = `${antecedent.text} ${relBase.text}`.replace(/\s+/g, ' ').trim();
      translatedText = `${attachedRelativeSubject} ${predicate.text}`.replace(/\s+/g, ' ').trim();
    } else if (relPredicateSplit) {
      const antecedent = realizeHeadNounPhrase(
        attachedHeadNP,
        (clause.relative.attachmentTarget || relPredicateSplit[1]).trim(),
        { forceStructured: true }
      );
      const relBase = translateWithPhraseParserFallback(`${clause.relative.marker} ${clause.relative.clause}`);
      const predicate = translateWithPhraseParserFallback(relPredicateSplit[2].trim());
      translated = { unknowns: [...(antecedent.unknowns || []), ...(relBase.unknowns || []), ...(predicate.unknowns || [])] };
      const attachedRelativeSubject = `${antecedent.text} ${relBase.text}`.replace(/\s+/g, ' ').trim();
      translatedText = `${attachedRelativeSubject} ${predicate.text}`.replace(/\s+/g, ' ').trim();
    } else {
      translated = translateWithPhraseParserFallback(baseText);
      translatedText = translated.text;
    }
  } else {
    translated = translateWithPhraseParserFallback(baseText);
    translatedText = translated.text;
  }

  translatedText = translatedText.replace(/\[(ek|hafði|mundi|hafa)\]/gi, '$1');

  if (clause.type === 'explanatory') {
    translatedText = `þvíat ${translatedText}`.trim();
  }

  let clauseText = translatedText;
  let mergedUnknowns = [...(translated.unknowns || [])];

  if (clause.relative && !/\ber\b/i.test(translatedText)) {
    let relBase;
    if (clause.relative.type === 'possessive') {
      const embedded = clause.relative.embedded || parseEmbeddedClauseRoles(clause.relative.clause || '');
      const possessorPronoun = clause.relative.possessor?.pronoun || 'her';
      // Use reflexive only when the embedded subject IS the possessor; otherwise non-reflexive.
      const relSubjectFallback = (embedded.subject || '').toLowerCase();
      const subjectMatchesPossessorFallback =
        (relSubjectFallback === 'she'  && possessorPronoun === 'her')   ||
        (relSubjectFallback === 'he'   && possessorPronoun === 'his')   ||
        (relSubjectFallback === 'they' && possessorPronoun === 'their') ||
        (relSubjectFallback === 'i'    && possessorPronoun === 'my')    ||
        (relSubjectFallback === 'we'   && possessorPronoun === 'our');
      const fallbackPossessiveBase = subjectMatchesPossessorFallback ? `${possessorPronoun}-reflexive` : possessorPronoun;
      const relObject = embedded.object ? `${fallbackPossessiveBase} ${clause.relative.possessedNoun} ${embedded.object}` : `${fallbackPossessiveBase} ${clause.relative.possessedNoun}`;
      const relClause = buildRoleBasedClauseFromEnglish('', {
        subject: embedded.subject || 'i',
        verb: embedded.verb || '',
        object: `${relObject} ${embedded.trailing || ''}`.trim()
      });
      relBase = translateWithPhraseParserFallback(`${clause.relative.marker} ${relClause}`.trim());
    } else {
      relBase = translateWithPhraseParserFallback(`${clause.relative.marker} ${clause.relative.clause}`);
    }
    clauseText = `${clauseText} ${relBase.text}`.replace(/\s+/g, ' ').trim();
    mergedUnknowns = [...new Set([...(mergedUnknowns || []), ...(relBase.unknowns || [])])];
  }

  if (clause.complement) {
    const compBase = realizeClause(clause.complement, false);
    clauseText = `${clauseText} at ${compBase.text}`.replace(/\s+/g, ' ').trim();
    mergedUnknowns = [...new Set([...(mergedUnknowns || []), ...(compBase.unknowns || [])])];
  }

  if (deferredExplanatory) {
    const explanatoryRealization = realizeClause({ type: 'explanatory', text: deferredExplanatory }, false);
    clauseText = `${clauseText}, ${explanatoryRealization.text}`.replace(/\s+/g, ' ').trim();
    mergedUnknowns = [...new Set([...(mergedUnknowns || []), ...(explanatoryRealization.unknowns || [])])];
  }

  return { text: clauseText, unknowns: mergedUnknowns };
}

function getCounterfactualResultVerb(subjectPronoun, predicate, objectText = '', trailingText = '', adverbials = [], objectGender = 'n') {
  const onSubject = realizeClauseSubject(subjectPronoun);
  const subjHave = getSubjHaveForm(onSubject);
  const predicateLemma = normalizeLexiconToken(LEMMAS[predicate] || predicate);
  const participle = getParticiple(predicateLemma, objectGender);
  const adverbText = realizeAdverbials(adverbials);
  return `${onSubject || 'ek'} ${subjHave} ${participle} ${adverbText} ${objectText} ${trailingText}`.replace(/\s+/g, ' ').trim();
}

function getPastPerfectConditionVerb(subjectPronoun, predicateLemma, objectText = '', trailingText = '', objectGender = 'n') {
  const onSubject = realizeClauseSubject(subjectPronoun) || 'ek';
  const subjHave = getSubjHaveForm(onSubject);
  const participle = getParticiple(predicateLemma, objectGender);
  return `${onSubject} ${subjHave} ${participle} ${objectText} ${trailingText}`.replace(/\s+/g, ' ').trim();
}

function realizeClauseSubject(subjectText) {
  if (!subjectText) return null;
  if (PRONOUNS[subjectText]) return PRONOUNS[subjectText].nom;
  const translated = translateWithPhraseParserFallback(subjectText);
  return translated.text || null;
}

function ensureRequiredObjectRetention(predicate, objectText, sourceClauseText = '') {
  const TRANSITIVE_REQUIRED = new Set(['see', 'saw', 'seen', 'kill', 'killed', 'name', 'call', 'called', 'curse', 'cursed']);
  if (objectText && objectText.trim()) return objectText.trim();
  if (!TRANSITIVE_REQUIRED.has((predicate || '').toLowerCase())) return '';
  const tailMatch = (sourceClauseText || '').match(/\b(?:see|saw|seen|kill|killed|name|call|called|curse|cursed)\b\s+(.+)$/i);
  return tailMatch ? tailMatch[1].trim() : '[object]';
}

function realizeAdverbials(adverbials = []) {
  if (!Array.isArray(adverbials) || !adverbials.length) return '';
  const realized = adverbials.map(mod => {
    if (!mod || mod.type !== 'adverbial') return '';
    const degree = mod.degree ? (EN_TO_ON[mod.degree] || formatUnresolvedToken(mod.degree)) : '';
    const value = mod.value ? (EN_TO_ON[mod.value] || formatUnresolvedToken(mod.value)) : '';
    return `${degree} ${value}`.replace(/\s+/g, ' ').trim();
  }).filter(Boolean);
  return realized.join(' ');
}

function inferNominalNumber(noun) {
  if (!noun) return 'singular';
  if (IRREGULAR_PLURALS[noun]) return 'plural';
  return /s$/.test(noun) ? 'plural' : 'singular';
}

function validateGeneratedOldNorse(text) {
  if (!text) return text;
  // Prevent malformed fused modal+infinitive tokens (e.g., "mundisvíkja").
  return text
    .replace(/\b(mundi|skyldi|mætti|kunni)([a-záéíóúýþðæøöǫ]{3,})\b/gi, '$1 $2')
    .replace(/\b(hafði)([a-záéíóúýþðæøöǫ]{3,})\b/gi, '$1 $2')
    .replace(/\b(frá|með|til|fyrir|hjá)\s+ek\b/gi, '$1 mér')
    .replace(/\b(frá|með|til|fyrir|hjá)\s+þú\b/gi, '$1 þér')
    .replace(/\b(frá|með|til|fyrir|hjá)\s+hann\b/gi, '$1 honum')
    .replace(/\b(frá|með|til|fyrir|hjá)\s+hon\b/gi, '$1 henni')
    .replace(/\beigaætt\b/gi, 'eigin ætt')
    .replace(/\bhans\s+eigin\s+ætt\b/gi, 'sín ætt')
    .replace(/\b(hans|hennar|þeirra)\s+ætt\b/gi, 'sín ætt')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function enforceNoRawSourceLeakage(text, unknowns = []) {
  if (!text) return text;
  let output = text;
  const deduped = [...new Set((unknowns || []).filter(Boolean).map(u => u.toLowerCase()))];
  deduped.forEach(token => {
    const escaped = token.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const barePattern = new RegExp(`(^|[^\\[]\\b)(${escaped})(\\b)(?!\\])`, 'gi');
    output = output.replace(barePattern, (match, pre, word, post) => `${pre || ''}${formatUnresolvedToken(word)}${post || ''}`);
  });
  return output
    .replace(/\b([a-z'-]+)-reflexive\b/gi, '$1')
    .replace(/\[([a-z'-]+)-reflexive\]/gi, '[$1]')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function reorderPossessiveNounPhrases(text) {
  if (!text) return text;
  return text.replace(/\b(minn|min|mitt|mín|þinn|þín|þitt|hans|hennar|þeirra|vár|várt|vor|sinn|sín|sitt)\s+([a-záðéíóúýþæöøǫ'-]+)\b/gi, '$2 $1');
}

function collapseDoSupportPredicates(text) {
  if (!text) return text;
  return text
    .replace(/\beigi(?=[a-záðéíóúýþæöøǫ\[])/gi, 'eigi ')
    .replace(/\beigi\s+([a-záðéíóúýþæöøǫ'\[\]-]+(?:\s+aptr)?)/gi, '$1 eigi')
    .replace(/\b(?:geri|gerir|gerði|gerum|gerið|gera)\s+eigi\s+([a-záðéíóúýþæöøǫ'\[\]-]+(?:\s+aptr)?)/gi, '$1 eigi')
    .replace(/\b(?:geri|gerir|gerði|gerum|gerið|gera)\s+([a-záðéíóúýþæöøǫ'\[\]-]+(?:\s+aptr)?)/gi, '$1');
}

function translateWithPhraseParserFallback(line) {
  const grammarEngine = new GrammarEngine();
  const tokens = tokenize(line);
  const phrases = parsePhrases(tokens);
  const analysis = grammarEngine.analyzePhrase(phrases);
  const inflected = grammarEngine.applyInflections(analysis);
  const unknowns = [];
  let text = '';
  inflected.forEach(item => {
    if (item.type === 'space') text += item.value;
    else if (item.type === 'punctuation') text += item.value;
    else if (item.wordType === 'unknown') {
      text += `${formatUnresolvedToken(item.value)} `;
      if (!unknowns.includes(item.value)) unknowns.push(item.value);
    } else {
      text += `${realizeLexicalItem(item)} `;
    }
  });
  const normalized = collapseDoSupportPredicates(reorderPossessiveNounPhrases(text.trim()));
  return { text: enforceNoRawSourceLeakage(normalized, unknowns), unknowns };
}

function normalizeEnglishIdioms(text) {
  if(!text || typeof text !== 'string') return text;

  return text
    // Collapse phrasal verbs to atomic lemmas before parsing.
    .replace(/\bturned\s+back\b/gi, 'returned')
    .replace(/\bturning\s+back\b/gi, 'returning')
    .replace(/\bturn\s+back\b/gi, 'return')
    // Preserve "be called" semantics so parser does not fall back to "call"
    .replace(/\bwho\s+was\s+called\b/gi, 'who-was-called')
    .replace(/\bwho\s+is\s+called\b/gi, 'who-is-called')
    .replace(/\bwho\s+are\s+called\b/gi, 'who-are-called')
    .replace(/\bwas\s+called\b/gi, 'was-called')
    .replace(/\bis\s+called\b/gi, 'is-called')
    .replace(/\bare\s+called\b/gi, 'are-called');
}

function removeIndefiniteArticles(text) {
  if(!text || typeof text !== 'string') return text;

  return text
    .replace(REGEX_INDEFINITE_ARTICLE, '')
    .replace(REGEX_MULTI_SPACE, ' ')
    .replace(REGEX_SPACE_BEFORE_PUNCT, '$1')
    .trim();
}

// ─── RENDER RUNES WITH TOOLTIPS ──────────────────────────────────────────────
function renderRunes(onStr) {
  const fragment = document.createDocumentFragment();

  if(!onStr) {
    const span = document.createElement('span');
    span.className = 'placeholder-text';
    span.textContent = '—';
    fragment.appendChild(span);
    return fragment;
  }

  const runes = onToRunes(onStr);
  if(!runes.length) {
    const span = document.createElement('span');
    span.className = 'placeholder-text';
    span.textContent = '—';
    fragment.appendChild(span);
    return fragment;
  }

  runes.forEach(r => {
    if(r.space) {
      const span = document.createElement('span');
      span.className = 'rune-char space';
      span.textContent = ' ';
      fragment.appendChild(span);
    } else if(r.newline) {
      fragment.appendChild(document.createElement('br'));
    } else if(r.isUnknown) {
      const span = document.createElement('span');
      span.className = 'unknown';
      span.title = 'No match';
      span.textContent = r.text;
      fragment.appendChild(span);
    } else {
      const wrapper = document.createElement('span');
      wrapper.className = 'tooltip-wrap';
      const runeSpan = document.createElement('span');
      runeSpan.className = 'rune-char';
      runeSpan.textContent = r.rune;
      const tipSpan = document.createElement('span');
      tipSpan.className = 'tip';
      tipSpan.textContent = r.name;
      wrapper.appendChild(runeSpan);
      wrapper.appendChild(tipSpan);
      fragment.appendChild(wrapper);
    }
  });

  return fragment;
}

// ─── UPDATE ALL OUTPUT FIELDS ────────────────────────────────────────────────
// Skip updating the active input field to preserve cursor position
function updateAllOutputs(enStr, onStr, runesStr, unknowns, ukEl, activeType) {
  // Update English textarea (unless it's the active input)
  if(activeType !== 'english') {
    document.getElementById('inp').value = enStr;
  }

  // Update Old Norse with unknowns highlighted (unless it's the active input)
  if(activeType !== 'oldnorse') {
    const onOutEl = document.getElementById('onOut');
    onOutEl.innerHTML = '';

    if(!onStr || onStr.trim().length === 0) {
      const span = document.createElement('span');
      span.className = 'placeholder-text';
      span.textContent = 'Old Norse will appear here';
      onOutEl.appendChild(span);
    } else {
      const onWords = onStr.trim().split(' ');
      onWords.forEach((word, idx) => {
        // Check if word is already bracketed (marked unknown)
        if(word.startsWith('[') && word.endsWith(']')) {
          const span = document.createElement('span');
          span.className = 'unknown';
          span.title = 'No match';
          span.textContent = word;
          onOutEl.appendChild(span);
        } else if(unknowns && unknowns.some(u => word.toLowerCase().includes(u.toLowerCase()))) {
          const span = document.createElement('span');
          span.className = 'unknown';
          span.title = 'No match';
          span.textContent = word;
          onOutEl.appendChild(span);
        } else {
          const textNode = document.createTextNode(word);
          onOutEl.appendChild(textNode);
        }
        // Add space after word (except for last word)
        if(idx < onWords.length - 1) {
          onOutEl.appendChild(document.createTextNode(' '));
        }
      });
    }
  }

  // Update Runes (unless it's the active input)
  if(activeType !== 'runes') {
    const runeOutEl = document.getElementById('runeOut');
    runeOutEl.innerHTML = '';
    runeOutEl.appendChild(runesStr);
  }

  // Always update unknowns display
  if(unknowns && unknowns.length) {
    ukEl.textContent = `Dotted underline = no dictionary match: ${[...new Set(unknowns)].join(', ')}`;
    ukEl.style.display = 'block';
  } else {
    ukEl.style.display = 'none';
  }
}

function processSentence(sentence) {
  // Input validation
  if(!sentence || typeof sentence !== 'string') return { translations: [] };
  if(sentence.length > 10000) sentence = sentence.substring(0, 10000);
  sentence = removeIndefiniteArticles(sentence);

  // Step 1: raw tokenise (using pre-compiled regex)
  const raw = sentence.toLowerCase().match(REGEX_WORD_SPLIT) || [];

  // Step 2: classify each word token
  // types: 'space', 'punct', 'subj_pron', 'obj_pron', 'verb', 'word', 'adjective', 'possessive', 'noun', 'unknown'
  const classified = [];
  let i = 0;
  while(i < raw.length) {
    const tok = raw[i];
    if(REGEX_SPACE_ONLY.test(tok))                        { classified.push({type:'space'}); i++; continue; }
    if(!REGEX_HAS_LETTER.test(tok))          { classified.push({type:'punct',val:tok}); i++; continue; }

    // Build context for smart word sense detection
    const context = {
      prev: i > 0 ? raw[i-1].trim() : null,
      next: i < raw.length - 1 ? raw[i+1].trim() : null,
      tokens: raw,
      idx: i
    };

    // Check for smart word sense detection first
    const detectedSense = detectWordSense(tok, context);

    // Phrasal verb detection: treat verb+particle as one semantic predicate.
    if(i+2 < raw.length && REGEX_SPACE_ONLY.test(raw[i+1]) && REGEX_HAS_LETTER.test(raw[i+2])) {
      const phrasalKey = `${tok} ${raw[i+2]}`.toLowerCase();
      const phrasalLemma = PHRASAL_VERB_LEMMAS[phrasalKey];
      if(phrasalLemma) {
        classified.push({type:'verb', en:phrasalKey, lemma:phrasalLemma, tense:'present'});
        i += 3;
        continue;
      }
    }
    
    // Two-word phrase check first (with compound fallback)
    // BUT: skip this for adjectives (they should stay separate)
    let phraseMatched = false;
    if(i+2 < raw.length && REGEX_SPACE_ONLY.test(raw[i+1]) && REGEX_HAS_LETTER.test(raw[i+2])) {
      const phrase = tok + ' ' + raw[i+2];
      // Use detected sense if available, otherwise fall back to dictionary lookup
      const tok_is_adjective = detectedSense === 'adjective' || ADJECTIVES[tok.toLowerCase()];
      const next_is_adjective = ADJECTIVES[raw[i+2].toLowerCase()];
      const nextLemma = LEMMAS[raw[i+2]] || raw[i+2];
      const next_is_verb = !!CONJ[raw[i+2]] || !!CONJ[nextLemma] || isLikelyPastVerbForm(raw[i+2], nextLemma);
      const tokLemma = LEMMAS[tok] || tok;
      const tok_is_verb = !!CONJ[tok] || !!CONJ[tokLemma] || isLikelyPastVerbForm(tok, tokLemma);

      // Only apply phrase fallback if NEITHER is an adjective
      // (adjectives should stay separate, not concatenate with other words)
      // EXCEPTION: Check for noun+noun compounds even if preceded by adjective
      if(!tok_is_adjective && !next_is_adjective && !tok_is_verb && !next_is_verb) {
        const compoundResult = trySmartCompound(tok, raw[i+2]);
        if(compoundResult) {
          classified.push({type:'word', en:phrase, on:compoundResult.on, gender:compoundResult.gender});
          i += 3; phraseMatched = true;
        } else {
          // Fallback to simple compositional noun+noun concatenation
          const word1 = EN_TO_ON[tok];
          const word2_raw = raw[i+2];
          const word2 = EN_TO_ON[word2_raw];
          if(
            word1 && word2 &&
            !tok_is_adjective &&
            !next_is_adjective &&
            !COMPOUND_BLACKLIST.has(tok) &&
            !COMPOUND_BLACKLIST.has(word2_raw)
          ) {
            const gender = NOUN_GENDER[word2_raw] || NOUN_GENDER[LEMMAS[word2_raw]] || 'm';
            classified.push({type:'word', en:phrase, on:word1 + word2, gender:gender});
            i += 3; phraseMatched = true;
          }
        }
      }
    }
    if(phraseMatched) continue;

    // Three-word phrase check (for compounds like "yellow heather rose")
    if(i+4 < raw.length && REGEX_SPACE_ONLY.test(raw[i+1]) && REGEX_SPACE_ONLY.test(raw[i+3]) && 
       /[a-z]/.test(raw[i+2]) && /[a-z]/.test(raw[i+4])) {
      const phrase3 = tok + ' ' + raw[i+2] + ' ' + raw[i+4];
      const tok_is_adjective = detectedSense === 'adjective' || ADJECTIVES[tok.toLowerCase()];
      const word2_is_adjective = ADJECTIVES[raw[i+2].toLowerCase()];
      const word3_is_adjective = ADJECTIVES[raw[i+4].toLowerCase()];

      // Check for adjective + noun + noun pattern (like "yellow heather rose")
      if(tok_is_adjective && !word2_is_adjective && !word3_is_adjective) {
        // Form a compound compositionally: adjective + (noun + noun compound)
        const innerCompound = trySmartCompound(raw[i+2], raw[i+4]);
        if(innerCompound) {
          const adjWord = tok.toLowerCase();
          const colors = {
            'yellow': 'gull',
            'red': 'rauð',
            'blue': 'blá',
            'green': 'græn',
            'white': 'hvít',
            'black': 'svart',
          };
          
          if(colors[adjWord]) {
            const fullCompound = colors[adjWord] + innerCompound.on;
            classified.push({type:'word', en:phrase3, on:fullCompound, gender:innerCompound.gender});
            i += 5; phraseMatched = true;
          } else {
            const adjForm = ADJECTIVES[tok.toLowerCase()];
            const adjOn = adjForm ? adjForm.base : EN_TO_ON[tok] || tok;
            classified.push({type:'word', en:phrase3, on:adjOn + innerCompound.on, gender:innerCompound.gender});
            i += 5; phraseMatched = true;
          }
        }
      }
      
      // Noun+noun+noun is handled downstream compositionally via individual tokens.
    }
    if(phraseMatched) continue;

    const clean = tok.replace(/^'+|'+$/g,'');

    // Use detected sense for classification, fall back to original logic
    if(detectedSense === 'adjective') {
      classified.push({type:'adjective', en:clean});
    } else if(detectedSense === 'noun') {
      const on = EN_TO_ON[clean] || clean;
      const gender = NOUN_GENDER[clean] || NOUN_GENDER[LEMMAS[clean]] || 'm';
      classified.push({type:'noun', en:clean, on:on, gender:gender});
    } else if(detectedSense === 'verb') {
      const verbInfo = getVerbLemmaAndTense(clean);
      classified.push({type:'verb', en:clean, lemma:verbInfo.lemma, tense:verbInfo.tense});
    } else if(INTERJECTIONS.has(clean)) {
      // Interjection — will apply vocative formatting in step 9
      classified.push({type:'interjection', en:clean, on:EN_TO_ON[clean] || 'heil'});
    } else if(PRONOUNS[clean]) {
      // Classify as subject or object pronoun — will resolve case in step 3
      classified.push({type:'pronoun', en:clean, pron:PRONOUNS[clean]});
    } else if(CONJ[clean]) {
      const verbInfo = getVerbLemmaAndTense(clean);
      classified.push({type:'verb', en:clean, lemma:verbInfo.lemma, tense:verbInfo.tense});
    } else if(POSSESSIVES[clean] || (clean.endsWith('-reflexive') && POSSESSIVES[clean.replace(/-reflexive$/,'')])) {
      // Possessive — will apply gender agreement in step 4
      const basePoss = clean.replace(/-reflexive$/,'');
      classified.push({type:'possessive', en:basePoss, forceReflexive: clean.endsWith('-reflexive')});
    } else if(ADJECTIVES[clean]) {
      // Adjective — will apply gender agreement in step 4
      classified.push({type:'adjective', en:clean});
    } else if(NOUN_GENDER[clean]) {
      // Noun with tracked gender — look up translation from dictionary
      const on = EN_TO_ON[clean] || clean;
      classified.push({type:'noun', en:clean, on:on, gender:NOUN_GENDER[clean]});
    } else {
      // Try lemmatization: reduce plural/past forms to base form
      const lemma = LEMMAS[clean];
      const baseWord = lemma || clean;

      if(CONJ[baseWord] && isLikelyPastVerbForm(clean, baseWord)) {
        classified.push({type:'verb', en:clean, lemma:baseWord, tense:'past'});
      } else if(CONJ[baseWord]) {
        classified.push({type:'verb', en:clean, lemma:baseWord, tense:'present'});
      } else if(NOUN_GENDER[baseWord]) {
        // Lemmatized noun found
        const on = EN_TO_ON[baseWord] || baseWord;
        classified.push({type:'noun', en:clean, on:on, gender:NOUN_GENDER[baseWord]});
      } else if(EN_TO_ON[baseWord]) {
        // Lemmatized word found in dictionary
        classified.push({type:'word', en:clean, on:EN_TO_ON[baseWord]});
      } else {
        // Word not found — try synonym fallback
        const synonym = SYNONYMS[clean];
        if(synonym) {
          // Synonym found — use it (will be marked as approximation in output)
          const synonymLemma = LEMMAS[synonym] || synonym;
          if(NOUN_GENDER[synonymLemma]) {
            const on = EN_TO_ON[synonymLemma] || synonymLemma;
            classified.push({type:'synonym', en:clean, originalEn:synonym, on:on, gender:NOUN_GENDER[synonymLemma]});
          } else if(EN_TO_ON[synonymLemma]) {
            classified.push({type:'synonym', en:clean, originalEn:synonym, on:EN_TO_ON[synonymLemma]});
          } else {
            classified.push({type:'unknown', en:clean});
          }
        } else {
          // No synonym available — mark as unknown
          classified.push({type:'unknown', en:clean});
        }
      }
    }
    i++;
  }

  // Step 2b: Detect appositive noun phrases
  // A noun phrase after a comma that contains no verb is an appositive.
  // Tag its tokens with appositiveHeadIdx so Step 5 can inherit the head noun's case.
  for (let i = 0; i < classified.length; i++) {
    if (classified[i].type !== 'punct' || classified[i].val !== ',') continue;

    // Find the head noun immediately before the comma (skip spaces only)
    let headNounIdx = -1;
    for (let j = i - 1; j >= 0; j--) {
      if (classified[j].type === 'space') continue;
      if (classified[j].type === 'noun' || classified[j].type === 'word' ||
          classified[j].type === 'synonym') { headNounIdx = j; break; }
      break; // any other non-space token → not an appositive context
    }
    if (headNounIdx === -1) continue;

    // Collect content tokens after the comma, up to the next comma or verb
    let j = i + 1;
    const apposTokens = [];
    let hasVerb = false;
    while (j < classified.length) {
      const t = classified[j];
      if (t.type === 'space') { j++; continue; }
      if (t.type === 'punct' && t.val === ',') break;
      if (t.type === 'verb') { hasVerb = true; break; }
      if (t.type === 'adjective' || t.type === 'noun' ||
          t.type === 'word'      || t.type === 'synonym') {
        apposTokens.push(j);
      }
      j++;
    }

    // Only mark as appositive if no verb was found and the phrase ends with a noun-like token
    if (!hasVerb && apposTokens.length > 0) {
      const lastTok = classified[apposTokens[apposTokens.length - 1]];
      if (lastTok.type === 'noun' || lastTok.type === 'word' || lastTok.type === 'synonym') {
        for (const aIdx of apposTokens) {
          classified[aIdx] = { ...classified[aIdx], appositiveHeadIdx: headNounIdx };
        }
      }
    }
  }

  // Step 3: resolve pronoun case
  // Rule: Track whether we've seen a verb in the clause
  //   - Before any verb = nominative (subject)
  //   - After a verb = accusative (object)
  //   - After dative preposition = dative
  const wordToks = classified.filter(t => t.type !== 'space' && t.type !== 'punct');

  // Create index map for O(1) token lookup (instead of O(n) indexOf)
  const tokenIndex = new Map();
  wordToks.forEach((tok, idx) => {
    tokenIndex.set(tok, idx);
  });

  // First pass: find positions of verbs in word tokens
  const verbPositions = new Set();
  wordToks.forEach((tok, idx) => {
    if(tok.type === 'verb') verbPositions.add(idx);
  });

  const resolved = classified.map((tok, absIdx) => {
    if(tok.type !== 'pronoun') return tok;

    // Find this pronoun's position in word tokens (O(1) via Map)
    const wordIdx = tokenIndex.get(tok);
    const prev = wordToks[wordIdx - 1];

    let caseForm = 'nom'; // default to nominative

    // 1. If preceded by a governing preposition, use its governed case.
    if(prev && prev.type === 'word' && CASED_PREPOSITIONS.has(prev.en)) {
      caseForm = resolveGovernedCase(prev.en, wordToks, wordIdx - 1) || 'dat';
    }
    // 2. Check if we've seen a verb before this pronoun
    else {
      let seenVerb = false;
      for(let i = 0; i < wordIdx; i++) {
        if(verbPositions.has(i)) {
          seenVerb = true;
          break;
        }
      }
      caseForm = seenVerb ? 'acc' : 'nom';
    }

    return { ...tok, on: tok.pron[caseForm] };
  });

  // Step 4: conjugate verbs
  // Track subject pronouns and nouns before verbs to determine conjugation form.
  // Default to 3rd person (hann for singular, þeir for plural).
  // Reset subject on 'and' to handle compound sentences correctly.
  let lastSubjON = null; // ON nominative pronoun string
  let lastSubjIsPlural = false; // Track if last subject is plural
  const conjugated = resolved.map(tok => {
    // Reset subject on conjunction (new clause)
    if(tok.type === 'word' && tok.en === 'and') {
      lastSubjON = null;
      lastSubjIsPlural = false;
    }

    // Track subject pronouns
    if(tok.type === 'pronoun' && tok.on) {
      // Only update lastSubj if this resolved to nominative
      const p = tok.pron;
      if(tok.on === p.nom) {
        lastSubjON = tok.on;
        // Pronouns 'vér' (us) and 'þeir/þær' (them) are plural
        lastSubjIsPlural = ['vér','þeir','þær','þau'].includes(tok.on);
      }
    }

    // Track subject nouns
    if(tok.type === 'noun') {
      // A noun before a verb is likely the subject if nominative
      // Check if this noun appears before a verb in the sentence
      lastSubjIsPlural = tok.en.endsWith('s') ||
                         ['men','children','people','eyes','feet','teeth','oxen'].includes(tok.en);
    }

    if(tok.type !== 'verb') return tok;

    const lemma = normalizeLexiconToken(tok.lemma || LEMMAS[tok.en] || tok.en);
    const forms = CONJ[lemma];

    // Determine conjugation index based on subject
    let idx = 2; // default to 3rd person singular (hann)
    if(lastSubjON) {
      idx = PRON_TO_IDX[lastSubjON] ?? 2;
    } else if(lastSubjIsPlural) {
      idx = 5; // 3rd person plural (þeir/þær/þau)
    }
    if(tok.tense === 'past') {
      const pastForms = PAST_CONJ[lemma];
      if(pastForms) return { ...tok, on: pastForms[idx], lemma };
      return { ...tok, on: formatUnresolvedToken(tok.en), lemma, unresolvedVerb:true };
    }

    if(!forms) return { ...tok, on: formatUnresolvedToken(tok.en), lemma, unresolvedVerb:true };
    return { ...tok, on: forms[idx], lemma };
  });

  // Step 5: apply gender agreement (adjectives & possessives)
  // First, pre-compute verb positions for accurate noun case detection
  const verbIndices = [];
  for(let i = 0; i < conjugated.length; i++) {
    if(conjugated[i].type === 'verb') {
      verbIndices.push(i);
    }
  }

  // Track possessives per noun phrase to avoid duplicates
  const usedNounPhrases = new Map(); // Map of noun phrase -> possessive used

  // Track resolved cases for feature propagation to appositive phrases
  const computedCases = new Map(); // absolute token index → resolved caseForm

  // Strategy:
  //   - Possessive + noun: possessive agrees with noun's gender
  //   - Noun + adjective: adjective agrees with noun's gender & case
  const withAgreement = conjugated.map((tok, idx) => {
    // Handle possessives: find the following noun
    if(tok.type === 'possessive') {
      // Look ahead for the noun (skip spaces, adjectives, punctuation)
      let nextNounIdx = idx + 1;
      let phraseWords = [];
      
      // Build the full noun phrase (including any adjectives and the noun itself)
      while(nextNounIdx < conjugated.length &&
            (conjugated[nextNounIdx].type === 'space' ||
             conjugated[nextNounIdx].type === 'punct' ||
             conjugated[nextNounIdx].type === 'adjective' ||
             conjugated[nextNounIdx].type === 'possessive')) {
        if(conjugated[nextNounIdx].type === 'adjective') {
          phraseWords.push(conjugated[nextNounIdx].en);
        }
        nextNounIdx++;
      }
      
      const nextTok = conjugated[nextNounIdx];

      if(nextTok && (nextTok.type === 'noun' || nextTok.type === 'word' || nextTok.type === 'synonym')) {
        // Create a comprehensive key for this noun phrase
        // Include the possessive type and all words to uniquely identify the phrase
        const nounWords = [nextTok.en || nextTok.on || 'unknown'];
        const fullPhrase = [...phraseWords, ...nounWords].join(' ');
        const possessiveKey = `${tok.en}:${fullPhrase}`;
        
        // Check if we already have a possessive for this specific noun phrase
        if(usedNounPhrases.has(fullPhrase) || usedNounPhrases.has(possessiveKey)) {
          // Duplicate possessive detected - skip this one
          return { ...tok, type: 'space', val: ' ' }; // Convert to space to maintain flow
        }

        // Mark this noun phrase as having a possessive
        usedNounPhrases.set(fullPhrase, tok.en);
        usedNounPhrases.set(possessiveKey, tok.en);

        // Improved gender detection: check stored gender first, then NOUN_GENDER lookup
        let gender = nextTok.gender;
        if(!gender && nextTok.en) {
          // Try direct lookup in NOUN_GENDER for the full phrase first
          gender = NOUN_GENDER[nextTok.en];
        }
        if(!gender && nextTok.en) {
          // For compound nouns like "shield maiden", try the last word
          const words = nextTok.en.split(' ');
          if(words.length > 1) {
            const lastWord = words[words.length - 1];
            gender = NOUN_GENDER[lastWord];
          }
        }
        if(!gender && nextTok.en) {
          // Try lemmatized form
          const lemma = LEMMAS[nextTok.en];
          if(lemma) {
            gender = NOUN_GENDER[lemma];
          }
        }
        if(!gender) {

      if(hasFollowingContent) {
        onStr += ', ';
      } else {
        onStr += ' ';
      }
    } else if(t.type === 'word' || t.type === 'pronoun' || t.type === 'verb' || t.type === 'noun' ||
              t.type === 'adjective' || t.type === 'possessive' || t.type === 'synonym') {
      onStr += (t.on || t.en) + ' ';
    } else if(t.type === 'unknown') {
      // Mark unknown words with brackets
      onStr += '[' + t.en + '] ';
    } else if(t.type === 'punct' && t.val === ',') {
      // Attach comma directly to preceding word, space follows with the next token
      onStr = onStr.trimEnd() + ',';
    }
  }
  onStr = onStr.trim();
  onStr = collapseDoSupportPredicates(onStr);

  return { onStr, unknowns };
}

// ─── SMART AUTO-COMPOUNDER ─────────────────────────────────────────────────────
// Noun case forms for compound usage — maps nominative form to accusative/dative variants
// These are primarily used for the second element in compounds
const NOUN_CASE_FORMS = {
  // Stone family - masculine
  'steinn': { nom: 'steinn', acc: 'stein', dat: 'steini', gen: 'steins' },
  'stein': { nom: 'stein', acc: 'stein', dat: 'steini', gen: 'steins' },
  // Add more as needed for other commonly-compounded nouns
};

// Words that should NOT form generic compounds (Rule 5)
// Includes pronouns, demonstratives, common adverbs, etc.
const COMPOUND_BLACKLIST = new Set([
  // Pronouns
  'i', 'you', 'he', 'she', 'it', 'we', 'they', 'me', 'him', 'her', 'us', 'them',
  'who', 'whom', 'what', 'which',
  // Demonstratives & articles
  'this', 'that', 'these', 'those', 'the', 'a', 'an',
  // Common adverbs
  'very', 'so', 'too', 'quite', 'just', 'only', 'well', 'now', 'then', 'here', 'there',
  'up', 'down', 'out', 'in', 'on', 'off', 'over', 'under', 'before', 'after',
  // Conjunctions & prepositions (shouldn't form compounds)
  'and', 'or', 'but', 'if', 'as', 'for', 'of', 'to', 'from', 'at', 'by', 'with', 'in', 'on',
  // Verbs (shouldn't form compounds as first element typically)
  'be', 'have', 'do', 'go', 'come', 'see', 'know', 'think', 'make', 'take', 'give',
  'is', 'are', 'was', 'were', 'being', 'been', 'has', 'have', 'had', 'does', 'did'
]);

// Intelligently forms Old Norse compounds following linguistic patterns
function trySmartCompound(word1_en, word2_en, compoundCase = 'nom') {
  const word1_on = EN_TO_ON[word1_en];
  const word2_on = EN_TO_ON[word2_en];

  if(!word1_on || !word2_on) return null;

  // Get gender from the head noun (second word)
  const gender = NOUN_GENDER[word2_en] || NOUN_GENDER[LEMMAS[word2_en]] || 'm';

  // Apply Old Norse compound formation rules
  
  // Rule 1: Nature compounds (heather + rose, mountain + peak, etc.)
  const natureCompounds = {
    'heather': { pattern: 'lyng', connector: '' },
    'mountain': { pattern: 'fjall', connector: '' },
    'river': { pattern: 'á', connector: '' },
    'water': { pattern: 'vatn', connector: '' },
    'stone': { pattern: 'steinn', connector: '' },
    'wood': { pattern: 'viðr', connector: '' },
    'sea': { pattern: 'haf', connector: '' },
    'land': { pattern: 'land', connector: '' },
    'field': { pattern: 'akr', connector: '' },
    'forest': { pattern: 'skógr', connector: '' },
  };
  
  const natureSecondaries = {
    'rose': { pattern: 'rós', connector: '' },
    'flower': { pattern: 'blóm', connector: '' },
    'tree': { pattern: 'tré', connector: '' },
    'stone': { pattern: 'steinn', connector: '' },
    'peak': { pattern: 'topp', connector: '' },
    'hill': { pattern: 'hóll', connector: '' },
    'dale': { pattern: 'dalr', connector: '' },
    'valley': { pattern: 'dalr', connector: '' },
    'wood': { pattern: 'viðr', connector: '' },
    'land': { pattern: 'land', connector: '' },
  };
  
  // Check for nature compounds
  if(natureCompounds[word1_en] && natureSecondaries[word2_en]) {
    const first = natureCompounds[word1_en];
    const second = natureSecondaries[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 2: People/Role compounds (shield + maiden, sword + bearer, etc.)
  const roleFirsts = {
    'shield': { pattern: 'skjald', connector: '' },
    'sword': { pattern: 'sverð', connector: '' },
    'war': { pattern: 'orrust', connector: '' },
    'horse': { pattern: 'hross', connector: '' },
    'ship': { pattern: 'skip', connector: '' },
    'book': { pattern: 'bók', connector: '' },
    'hall': { pattern: 'höll', connector: '' },
    'gate': { pattern: 'hlið', connector: '' },
  };
  
  const roleSeconds = {
    'maiden': { pattern: 'mær', connector: '' },
    'bearer': { pattern: 'beri', connector: '' },
    'holder': { pattern: 'hald', connector: '' },
    'keeper': { pattern: 'vörðr', connector: '' },
    'lord': { pattern: 'dróttinn', connector: '' },
    'master': { pattern: 'meistari', connector: '' },
    'guard': { pattern: 'vörðr', connector: '' },
  };
  
  if(roleFirsts[word1_en] && roleSeconds[word2_en]) {
    const first = roleFirsts[word1_en];
    const second = roleSeconds[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 3: Material compounds (gold + smith, silver + smith, etc.)
  const materials = {
    'gold': { pattern: 'gull', connector: '' },
    'silver': { pattern: 'silfr', connector: '' },
    'iron': { pattern: 'járn', connector: '' },
    'steel': { pattern: 'stál', connector: '' },
    'wood': { pattern: 'við', connector: '' },
    'stone': { pattern: 'steinn', connector: '' },
    'yellow': { pattern: 'gul', connector: '' },
  };
  
  const craftsmen = {
    'smith': { pattern: 'smiðr', connector: '' },
    'worker': { pattern: 'verkmaðr', connector: '' },
    'crafter': { pattern: 'smíðamaðr', connector: '' },
  };
  
  if(materials[word1_en] && craftsmen[word2_en]) {
    const first = materials[word1_en];
    const second = craftsmen[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 3b: Color + Nature compounds (yellow + heather, etc.)
  const colors = {
    'yellow': { pattern: 'gull', connector: '' }, // Fixed: use 'gull' not 'gul' for compounds
    'red': { pattern: 'rauð', connector: '' },
    'blue': { pattern: 'blá', connector: '' },
    'green': { pattern: 'græn', connector: '' },
    'white': { pattern: 'hvít', connector: '' },
    'black': { pattern: 'svart', connector: '' },
    'gold': { pattern: 'gull', connector: '' },
    'silver': { pattern: 'silfr', connector: '' },
  };
  
  if(colors[word1_en] && (natureCompounds[word2_en] || natureSecondaries[word2_en])) {
    const first = colors[word1_en];
    const second = natureCompounds[word2_en] || natureSecondaries[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 4: Animal compounds (wolf + hound, sea + wolf, etc.)
  const animals = {
    'wolf': { pattern: 'úlfr', connector: '' },
    'hound': { pattern: 'hundr', connector: '' },
    'eagle': { pattern: 'örn', connector: '' },
    'bear': { pattern: 'björn', connector: '' },
    'horse': { pattern: 'hestr', connector: '' },
    'snake': { pattern: 'ormr', connector: '' },
    'dragon': { pattern: 'dreki', connector: '' },
  };
  
  const places = {
    'sea': { pattern: 'haf', connector: '' },
    'mountain': { pattern: 'fjall', connector: '' },
    'forest': { pattern: 'skógr', connector: '' },
    'river': { pattern: 'á', connector: '' },
  };
  
  if(animals[word1_en] && animals[word2_en]) {
    const first = animals[word1_en];
    const second = animals[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  if(places[word1_en] && animals[word2_en]) {
    const first = places[word1_en];
    const second = animals[word2_en];
    return { on: first.pattern + second.pattern, gender: gender };
  }
  
  // Rule 5: Generic compound with phonetic adaptation
  // RESTRICTION: Don't create compounds with blacklisted words
  // This prevents inappropriate combinations like "this stone" or "very good"
  if (COMPOUND_BLACKLIST.has(word1_en) || COMPOUND_BLACKLIST.has(word2_en)) {
    return null;
  }

  // Apply common Old Norse compound sound changes
  let firstWord = word1_on;
  let secondWord = word2_on;

  // Apply case inflection to the second word if needed
  // Most compounds use nominative, but some contexts may require accusative/dative
  if (compoundCase !== 'nom' && NOUN_CASE_FORMS[word2_en]) {
    const caseMap = NOUN_CASE_FORMS[word2_en];
    if (compoundCase === 'acc' && caseMap.acc) {
      secondWord = caseMap.acc;
    } else if (compoundCase === 'dat' && caseMap.dat) {
      secondWord = caseMap.dat;
    } else if (compoundCase === 'gen' && caseMap.gen) {
      secondWord = caseMap.gen;
    }
  }

  // Common sound changes in compounds:
  // 1. Final consonant often assimilates
  if(firstWord.endsWith('r') && secondWord.startsWith('r')) {
    firstWord = firstWord.slice(0, -1); // Remove final r before r
  }

  // 2. Final -n often drops before consonants
  if(firstWord.endsWith('n') && !'aeiouáéíóúýæøöǫ'.includes(secondWord[0])) {
    firstWord = firstWord.slice(0, -1);
  }

  // 3. Final -t often drops before consonants
  if(firstWord.endsWith('t') && !'aeiouáéíóúýæøöǫ'.includes(secondWord[0])) {
    firstWord = firstWord.slice(0, -1);
  }

  // 4. Connecting vowel insertion for difficult consonant clusters
  const difficultClusters = [
    { pattern: /([lrndm])([lrndm])$/, insert: 'a' },
    { pattern: /([kgpt])([kgpt])$/, insert: 'a' },
    { pattern: /([st])([st])$/, insert: 'i' }
  ];

  for(const cluster of difficultClusters) {
    if(firstWord.match(cluster.pattern)) {
      firstWord += cluster.insert;
      break;
    }
  }

  return { on: firstWord + secondWord, gender: gender };
}

(function buildGrid(){
  const grid = document.getElementById('futharkGrid');
  FUTHARK.forEach(({r, sounds, name}) => {
    const card = document.createElement('div');
    card.className = 'rune-card';

    const rDiv = document.createElement('div');
    rDiv.className = 'r';
    rDiv.textContent = r;
    card.appendChild(rDiv);

    const lDiv = document.createElement('div');
    lDiv.className = 'l';
    lDiv.textContent = sounds.join('/');
    card.appendChild(lDiv);

    const nDiv = document.createElement('div');
    nDiv.className = 'n';
    nDiv.textContent = name;
    card.appendChild(nDiv);

    grid.appendChild(card);
  });
})();
