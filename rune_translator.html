<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rune Translator — Endrborninn</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#d4c9a8;font-family:'Cinzel',serif;padding:2rem 1.5rem 3rem;min-height:100vh}
.title-rune{font-size:22px;color:#c9a84c;letter-spacing:5px;margin-bottom:6px}
h1{font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:#e8dfc0;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.subtitle{font-family:'IM Fell English',serif;font-size:13px;color:#7a6e52;font-style:italic;margin-bottom:1.5rem;letter-spacing:.5px}
textarea{width:100%;min-height:90px;background:#0d0b06;border:1px solid #3a3020;border-radius:8px;padding:14px 16px;font-family:'IM Fell English',serif;font-size:16px;color:#d4c9a8;resize:vertical;line-height:1.6;outline:none;margin-bottom:.85rem;transition:border-color .2s}
textarea:focus{border-color:#6b5230}
textarea::placeholder{color:#3d3525;font-style:italic}
[contenteditable="true"]{outline:none}
[contenteditable="true"]:focus{border-color:#6b5230}
.on-output[contenteditable="true"],.rune-output[contenteditable="true"]{background:#0d0b06;border:1px solid #3a3020;border-radius:8px;padding:14px 16px;margin-bottom:.85rem;transition:border-color .2s;cursor:text;min-height:90px}
.rune-output[contenteditable="true"]:focus .tip{opacity:0}
.step-block{background:#0a0804;border:1px solid #2e2516;border-radius:8px;padding:14px 16px;margin-bottom:.85rem;position:relative}
.step-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#4a3e28;margin-bottom:8px}
.on-output{font-family:'IM Fell English',serif;font-size:18px;color:#a08840;line-height:1.6;min-height:28px;word-break:break-word}
.on-output .unknown{color:#5c4e2a;font-style:italic;text-decoration:underline;text-decoration-style:dotted;cursor:help}
.rune-output{font-family:'IM Fell English',serif;font-size:30px;letter-spacing:7px;color:#c9a84c;line-height:1.5;word-break:break-all;display:flex;flex-wrap:wrap;align-items:center;min-height:44px}
.rune-char{display:inline-block;cursor:default;transition:color .12s,transform .1s}
.rune-char:hover{color:#e8c76a;transform:scale(1.18)}
.rune-char.space{width:14px}
.tooltip-wrap{position:relative;display:inline-block}
.tooltip-wrap:hover .tip{opacity:1;transform:translateX(-50%) translateY(-4px)}
.tip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%) translateY(0);background:#1a1408;border:1px solid #4a3e20;border-radius:5px;padding:4px 9px;font-size:10px;font-family:'Cinzel',serif;color:#a08840;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;z-index:20;letter-spacing:.5px}
.copy-btn{position:absolute;top:10px;right:10px;background:transparent;border:1px solid #2e2516;border-radius:5px;padding:4px 10px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#4a3e28;cursor:pointer;transition:all .15s}

.ref-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}

.futhark-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px;margin-top:1rem}
.rune-card{display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;border:1px solid #2a2010;border-radius:7px;background:#0a0804}
.rune-card .r{font-size:22px;color:#c9a84c;margin-bottom:3px;line-height:1}
.rune-card .l{font-size:9px;color:#7a6e52;font-family:'Cinzel',serif;letter-spacing:1px;text-transform:uppercase}
.rune-card .n{font-size:8px;color:#4a3e28;font-family:'IM Fell English',serif;font-style:italic;margin-top:2px}
</style>
</head>
<body>

<div class="title-rune">ᚠᚢᚦᚬᚱᚴᚼᚾᛁᛋᛏᛒᛚᛘ</div>
<h1>Rune Translator</h1>
<p class="subtitle">English ↔ Old Norse ↔ Younger Futhark</p>

<textarea id="inp" placeholder="Enter English text..." onfocus="activeInput='english'" oninput="if(activeInput==='english') performTranslation()"></textarea>

<div class="step-block">
  <div class="step-label">Old Norse</div>
  <div class="on-output" id="onOut" contenteditable="true" spellcheck="false" onfocus="activeInput='oldnorse'; clearOtherFields('oldnorse')" oninput="if(activeInput==='oldnorse') performTranslation()"><span class="placeholder-text">Old Norse will appear here</span></div>
  <div class="unknown-key" id="unknownKey" style="display:none"></div>
  <button class="copy-btn" onclick="copyON()">Copy</button>
</div>

<div class="step-block">
  <div class="step-label">Younger Futhark</div>
  <div class="rune-output" id="runeOut" contenteditable="true" spellcheck="false" onfocus="activeInput='runes'; clearOtherFields('runes')" oninput="if(activeInput==='runes') performTranslation()"><span class="placeholder-text">Runes will appear here</span></div>
  <button class="copy-btn" onclick="copyRunes()">Copy</button>
</div>

<div class="ref-toggle" id="refToggle" onclick="toggleRef()">
  <span class="arrow">▶</span>
  <span class="label">Younger Futhark Reference</span>
</div>
<div id="refSection" style="display:none">
  <div class="divider"></div>
  <div class="futhark-grid" id="futharkGrid"></div>
</div>

<script>
// ─── YOUNGER FUTHARK — 16 runes, Viking Age ─────────────────────────────────
// Historically correct: Younger Futhark intentionally collapses distinctions.
// One rune covers multiple sounds — ambiguity is a feature, not a bug.
const FUTHARK = [
  {r:'ᚠ', sounds:['f','v'],        name:'Fé'},
  {r:'ᚢ', sounds:['u','w','o'],     name:'Úr'},
  {r:'ᚦ', sounds:['th','dh'],      name:'Þurs'},
  {r:'ᛅ', sounds:['a'],            name:'Ár'},
  {r:'ᚬ', sounds:['nasal_vowel'],  name:'Óss'},
  {r:'ᚱ', sounds:['r'],            name:'Reið'},
  {r:'ᛦ', sounds:['r_final'],      name:'Ýr'},
  {r:'ᚴ', sounds:['k','g'],        name:'Kaun'},
  {r:'ᚼ', sounds:['h'],            name:'Hagall'},
  {r:'ᚾ', sounds:['n'],            name:'Nauðr'},
  {r:'ᛁ', sounds:['i','e','j','y'],name:'Íss'},
  {r:'ᛋ', sounds:['s','z'],        name:'Sól'},
  {r:'ᛏ', sounds:['t','d'],        name:'Týr'},
  {r:'ᛒ', sounds:['b','p'],        name:'Bjarkan'},
  {r:'ᛚ', sounds:['l'],            name:'Lögr'},
  {r:'ᛘ', sounds:['m'],            name:'Maðr'},
];

// Build sound → rune lookup (first assignment wins)
const soundToRune = {};
FUTHARK.forEach(f => {
  f.sounds.forEach(s => { if(!soundToRune[s]) soundToRune[s] = {r:f.r, name:f.name}; });
});

// Build rune → sounds mapping (for reverse translation)
const RUNE_TO_SOUNDS = {};
FUTHARK.forEach(f => {
  RUNE_TO_SOUNDS[f.r] = f.sounds;
});

// ─── ACTIVE INPUT TRACKING ────────────────────────────────────────────────────
let activeInput = 'english'; // 'english', 'oldnorse', 'runes'

// ─── OLD NORSE PHONEME RULES → YOUNGER FUTHARK SOUNDS ───────────────────────
// Sorted longest-first so digraphs match before single chars.
const ON_RULES = [
  // Digraphs & special sequences
  ['ng', 'nk'],   // ng → nk (historically more accurate for YF)
  ['nk', 'nk'],   // nk → nk (historically written as n+k)
  ['kk', 'k'], ['gg', 'k'],
  ['tt', 't'], ['dd', 't'],
  ['nn', 'n'], ['ll', 'l'], ['rr', 'r'],
  ['ff', 'f'], ['ss', 's'], ['mm', 'm'],
  ['bb', 'b'], ['pp', 'b'],
  ['ei', 'ai'], ['ey', 'au'],
  ['au', 'u'],
  ['kv', 'k'],   // kv = k sound in YF
  // ON special characters
  ['þ',  'th'], ['ð',  'th'],
  ['æ',  'a'],  ['œ',  'i'],
  ['ø',  'o'],  ['ö',  'o'], ['ǫ', 'a'],
  ['á',  'a'],  ['é',  'i'], ['í', 'i'],
  ['ó',  'o'],  ['ú',  'u'], ['ý', 'i'],
  // Plain letters — YF collapses
  ['a','a'], ['b','b'], ['d','t'], ['e','i'], ['f','f'],
  ['g','k'], ['h','h'], ['i','i'], ['j','i'], ['k','k'],
  ['l','l'], ['m','m'], ['n','n'], ['o','o'], ['p','b'],
  ['r','r'], ['s','s'], ['t','t'], ['u','u'], ['v','f'],
  ['w','u'], ['y','i'], ['z','s'],
];
const ON_SORTED = [...ON_RULES].sort((a,b) => b[0].length - a[0].length);

// ─── PRE-COMPILED REGEX PATTERNS (Performance Optimization) ─────────────────
// Regex compilation is expensive - pre-compile once instead of on every call
const REGEX_WORD_SPLIT = /[a-záéíóúýæøöǫþðä'-]+|[^a-záéíóúýæøöǫþðä\s]+|\s+/g;
const REGEX_WHITESPACE = /\s+/;
const REGEX_SPACE_ONLY = /^\s+$/;
const REGEX_HAS_LETTER = /[a-záéíóúýæøöǫþðä]/;
const REGEX_NEWLINE = /\n/;
const REGEX_BRACKET_TEXT = /\[([^\]]*)\]/;
const REGEX_INDEFINITE_ARTICLE = /\b(a|an)\b/gi;
const REGEX_MULTI_SPACE = / {2,}/g;
const REGEX_SPACE_BEFORE_PUNCT = /\s+([.,!?;:])/g;

// ─── PROTO-GERMANIC ETYMOLOGICAL PATTERNS ────────────────────────────────────
// Auto-detection patterns for 'e' that came from Proto-Germanic 'a'
// These patterns identify words that commonly underwent 'a' → 'e' vowel shifts
const PROTO_E_FROM_A_PATTERNS = [
  /enn$/,      // -enn endings (þenna, menn < þanǭ, manǭ)
  /eri$/,      // -eri endings
  /ella$/,     // -ella endings
  /ett$/,      // -ett endings
];

// ─── ETYMOLOGICAL VOWEL SELECTION HELPERS ────────────────────────────────────

/**
 * Get the Proto-Germanic form of an Old Norse word by looking it up in EN_TO_ON
 * This searches for which English word produces this Old Norse form
 * @param {string} onWord - The Old Norse word to look up
 * @returns {string|null} The Proto-Germanic form if found, or null
 */
function getProtoGermanicForm(onWord) {
  if(!onWord) return null;

  for(const [english, entry] of Object.entries(EN_TO_ON)) {
    // Handle both simple string mappings and complex declension objects
    let protoForm = null;

    if(typeof entry === 'string') {
      // Simple mapping - no Proto-Germanic data available
      continue;
    } else if(typeof entry === 'object' && entry.protoGermanic) {
      protoForm = entry.protoGermanic;
    } else if(typeof entry === 'object' && entry.base) {
      // Check if any form of this word matches the onWord
      const forms = [
        entry.base, entry.nom_sg, entry.acc_sg, entry.dat_sg, entry.gen_sg,
        entry.nom_pl, entry.acc_pl, entry.dat_pl, entry.gen_pl
      ];

      if(forms.includes(onWord) && entry.protoGermanic) {
        return entry.protoGermanic;
      }
    }
  }

  return null;
}

/**
 * Check if 'e' at a given position in an Old Norse word should use ᛅ (Ár) instead of ᛁ (Íss)
 * This implements the rule: 'e' that came from Proto-Germanic 'a' should use ᛅ
 * @param {string} onWord - The full Old Norse word
 * @param {number} position - The position of 'e' in the word
 * @returns {boolean} True if should use ᛅ (Ár), false if should use ᛁ (Íss)
 */
function shouldUseAForE(onWord, position) {
  if(!onWord || position < 0 || position >= onWord.length) return false;

  const char = onWord.toLowerCase()[position];
  if(char !== 'e') return false;

  // First: try to find Proto-Germanic form with explicit mapping
  const protoForm = getProtoGermanicForm(onWord);
  if(protoForm) {
    const correspondenceMap = vowelCorrespondenceMap(onWord, protoForm);
    if(correspondenceMap && correspondenceMap.has(position)) {
      return correspondenceMap.get(position) === 'a';
    }
  }

  // Second: try auto-detection patterns for words without explicit Proto-Germanic data
  for(const pattern of PROTO_E_FROM_A_PATTERNS) {
    if(pattern.test(onWord.toLowerCase())) {
      // Words matching these patterns commonly have 'a' → 'e' shifts
      return true;
    }
  }

  // Default: use modern spelling (e → ᛁ)
  return false;
}

/**
 * Check if a vowel at a given position in an Old Norse word is a nasalized vowel
 * that should use ᚬ (Óss). Nasalization occurs when a Proto-Germanic 'n' was dropped
 * after the vowel (e.g. *ansiwiz → æsir: the 'a' before dropped 'n' → ᚬ).
 * Only fires when a protoGermanic form is available in the dictionary.
 * @param {string} onWord - The full Old Norse word
 * @param {number} position - The position of the vowel in the word
 * @returns {boolean} True if the vowel is nasalized → should use ᚬ
 */
function isNasalVowel(onWord, position) {
  if(!onWord || position < 0 || position >= onWord.length) return false;
  const lower = onWord.toLowerCase();
  if(!'aeiouáéíóúýæøöǫ'.includes(lower[position])) return false;

  const protoForm = getProtoGermanicForm(onWord);
  if(!protoForm) return false;
  const lowerProto = protoForm.toLowerCase();

  // Collect vowel positions in each form
  const onVowelPos = [];
  const pgVowelPos = [];
  for(let i = 0; i < lower.length; i++)
    if('aeiouáéíóúýæøöǫ'.includes(lower[i])) onVowelPos.push(i);
  for(let i = 0; i < lowerProto.length; i++)
    if('aeiouáéíóú'.includes(lowerProto[i])) pgVowelPos.push(i);

  const onVowelIdx = onVowelPos.indexOf(position);
  if(onVowelIdx === -1 || onVowelIdx >= pgVowelPos.length) return false;
  const pgPos = pgVowelPos[onVowelIdx];

  // Proto-Germanic had 'n' right after this vowel, Old Norse does not → nasalized
  return lowerProto[pgPos + 1] === 'n' && lower[position + 1] !== 'n';
}

/**
 * Build a vowel position mapping between Old Norse and Proto-Germanic forms
 * Maps which vowels in the Old Norse word correspond to which in Proto-Germanic
 * @param {string} onWord - The Old Norse word
 * @param {string} protoWord - The Proto-Germanic form
 * @returns {Map|null} Map of position → original vowel from Proto-Germanic, or null if can't map
 */
function vowelCorrespondenceMap(onWord, protoWord) {
  if(!onWord || !protoWord) return null;

  const lowerOn = onWord.toLowerCase();
  const lowerProto = protoWord.toLowerCase();

  // Simple alignment: if lengths are similar, assume direct character mapping
  // This is a heuristic for words with regular phonetic changes
  if(Math.abs(lowerOn.length - lowerProto.length) <= 2) {
    const map = new Map();
    let protoIdx = 0;

    for(let i = 0; i < lowerOn.length && protoIdx < lowerProto.length; i++) {
      // Only map vowels
      if('aeiouáéíóúýæøöǫ'.includes(lowerOn[i])) {
        // Find corresponding vowel in Proto-Germanic word
        while(protoIdx < lowerProto.length && !'aeiouáéíóúýæøöǫ'.includes(lowerProto[protoIdx])) {
          protoIdx++;
        }

        if(protoIdx < lowerProto.length) {
          // Record what vowel was in Proto-Germanic at this position
          const protoVowel = lowerProto[protoIdx];
          // Normalize all 'a' variants to 'a', all 'o' variants to 'o', etc.
          if('aáæ'.includes(protoVowel)) {
            map.set(i, 'a');
          }
          protoIdx++;
        }
      }
    }

    return map.size > 0 ? map : null;
  }

  return null;
}

function onToRunes(text) {
  // Input validation
  if(!text || typeof text !== 'string') return [];
  if(text.length > 10000) text = text.substring(0, 10000);

  const lower = text.toLowerCase();
  let i = 0;
  const result = [];

  // Helper: check if position is a word boundary (end of word)
  const isWordBoundary = (pos) => {
    if(pos >= lower.length) return true;
    const ch = lower[pos];
    return /[\s\n\-.,;:!?\[\]]/.test(ch);
  };

  // Helper: extract the current word being processed (for etymological context)
  const getCurrentWord = (pos) => {
    // Find word start (go backwards from pos to word boundary)
    let start = pos;
    while(start > 0 && !/[\s\n\-.,;:!?\[\]]/.test(lower[start-1])) {
      start--;
    }
    // Find word end (go forwards from pos to word boundary)
    let end = pos;
    while(end < lower.length && !/[\s\n\-.,;:!?\[\]]/.test(lower[end])) {
      end++;
    }
    return { word: lower.substring(start, end), wordStart: start, relativePos: pos - start };
  };

  while(i < lower.length) {
    if(lower[i] === ' ') { result.push({space:true}); i++; continue; }
    if(lower[i] === '\n') { result.push({newline:true}); i++; continue; }
    // Handle brackets (pass through as marker text, not runes)
    if(lower[i] === '[') {
      let endIdx = lower.indexOf(']', i);
      if(endIdx !== -1) {
        const unknownText = lower.substring(i+1, endIdx);
        result.push({text:'['+unknownText+']', isUnknown:true});
        i = endIdx + 1;
        continue;
      }
    }
    // Skip true geminates (already handled by rules, catch any remaining)
    if(i > 0 && lower[i] === lower[i-1] && !'aeiouáéíóúýæøöǫ'.includes(lower[i])) { i++; continue; }
    let matched = false;
    for(const [pat, sound] of ON_SORTED) {
      if(lower.slice(i, i+pat.length) === pat) {
        // Special handling for diphthongs that should be represented by two runes
        if(pat === 'ei') {
          // 'ei' from historical 'ai' → ᛅ (Ár/'a') + ᛁ (Íss/'i')
          result.push({rune:'ᛅ', name:'Ár'});
          result.push({rune:'ᛁ', name:'Íss'});
          i += pat.length; matched = true; break;
        } else if(pat === 'ey') {
          // 'ey' from historical 'au' → ᛅ (Ár/'a') + ᚢ (Úr/'u')
          result.push({rune:'ᛅ', name:'Ár'});
          result.push({rune:'ᚢ', name:'Úr'});
          i += pat.length; matched = true; break;
        } else if(pat === 'au') {
          // 'au' from historical 'au' → ᛅ (Ár/'a') + ᚢ (Úr/'u')
          result.push({rune:'ᛅ', name:'Ár'});
          result.push({rune:'ᚢ', name:'Úr'});
          i += pat.length; matched = true; break;
        }
        // Special handling for 'r': use r_final if at end of word
        let finalSound = sound;
        if('aeiouæáéíóúýøöǫ'.includes(pat)) {
          // Nasal vowel check (highest priority): vowels nasalized by dropped Proto-Germanic 'n' → ᚬ
          const { word, relativePos } = getCurrentWord(i);
          if(isNasalVowel(word, relativePos)) {
            finalSound = 'nasal_vowel';
          } else if(pat === 'e' && sound === 'i') {
            // 'e' from Proto-Germanic 'a' → ᛅ (Ár) instead of ᛁ (Íss)
            if(shouldUseAForE(word, relativePos)) {
              finalSound = 'a';
            }
          }
        }
        // Special handling for 'r': use r_final if at end of word
        else if(pat === 'r' && isWordBoundary(i + pat.length)) {
          finalSound = 'r_final';
        }

        const entry = soundToRune[finalSound];
        if(entry) result.push({rune:entry.r, name:entry.name});
        i += pat.length; matched = true; break;
      }
    }
    if(!matched) i++;
  }
  return result;
}

// ─── REVERSE TRANSLATION: OLD NORSE → ENGLISH ────────────────────────────────
function onToEnglish(text) {
  // Input validation
  if(!text || typeof text !== 'string') return { text: '', unknowns: [] };
  if(text.length > 10000) text = text.substring(0, 10000);

  // Split by lines to preserve structure
  const lines = text.split('\n');
  const allResults = [];
  const allUnknowns = [];
  
  lines.forEach(line => {
    const words = line.toLowerCase().split(REGEX_WHITESPACE).filter(w => w.length > 0);
    const result = [];
    const unknowns = [];

    words.forEach(word => {
      // Handle bracketed unknowns (from marked unknowns)
      if(word.startsWith('[') && word.endsWith(']')) {
        const bracketed = word.slice(1, -1);
        result.push('[' + bracketed + ']');
        unknowns.push(bracketed);
        return;
      }

      // Remove punctuation for lookup
      const cleanWord = word.replace(/[.,!?;:\-'"]/g, '');
      const translation = ON_TO_EN[cleanWord];

      if(translation) {
        result.push(translation);
      } else {
        result.push(word);
        unknowns.push(cleanWord);
      }
    });

    allResults.push(result.join(' '));
    allUnknowns.push(...unknowns);
  });

  return {
    text: allResults.join('\n'),
    unknowns: allUnknowns
  };
}

// ─── REVERSE TRANSLATION: RUNES → OLD NORSE ───────────────────────────────────
// Converts rune characters to phoneme combinations, then matches against ON dictionary
function runesToOldNorse(runeText) {
  // Input validation
  if(!runeText || typeof runeText !== 'string') return { text: '', unknowns: [] };
  if(runeText.length > 10000) runeText = runeText.substring(0, 10000);

  // Split by lines to preserve structure
  const lines = runeText.split('\n');
  const allResults = [];
  const allUnknowns = [];
  
  lines.forEach(line => {
    // Extract rune characters and spaces for this line
    const runes = [];
    let currentWord = [];

    for(let char of line) {
      if(char === ' ') {
        if(currentWord.length > 0) {
          runes.push(currentWord);
          currentWord = [];
        }
      } else if(RUNE_TO_SOUNDS[char]) {
        currentWord.push(char);
      }
    }
    if(currentWord.length > 0) runes.push(currentWord);

    // Convert each rune word to phoneme sequences and find best matches
    const result = [];
    const unknowns = [];

    runes.forEach(runeWord => {
      const onWord = findBestOldNorseMatch(runeWord);
      if(onWord) {
        result.push(onWord);
      } else {
        const runeStr = runeWord.join('');
        result.push(runeStr);
        unknowns.push(runeStr);
      }
    });

    allResults.push(result.join(' '));
    allUnknowns.push(...unknowns);
  });

  return {
    text: allResults.join('\n'),
    unknowns: allUnknowns
  };
}

// Helper: Find best Old Norse word matching a rune sequence
// Uses phoneme combinations and scores by match quality
function findBestOldNorseMatch(runeWord) {
  const phonemeOptions = runeWord.map(r => RUNE_TO_SOUNDS[r] || []);

  // Generate all possible phoneme combinations (depth-first)
  const allCombinations = generatePhonemeSequences(phonemeOptions);

  // Try to match each combination against ON dictionary
  for(const phoneStr of allCombinations) {
    const onWord = matchPhonemeToOldNorse(phoneStr);
    if(onWord) return onWord;
  }

  return null;
}

// Generate all possible phoneme sequences from rune ambiguity
function generatePhonemeSequences(phonemeOptions) {
  if(phonemeOptions.length === 0) return [];
  if(phonemeOptions.length === 1) return phonemeOptions[0] || [];

  const sequences = [];
  const firstOptions = phonemeOptions[0];
  const restSequences = generatePhonemeSequences(phonemeOptions.slice(1));

  firstOptions.forEach(first => {
    restSequences.forEach(rest => {
      sequences.push(first + rest);
    });
  });

  return sequences;
}

// Try to match a phoneme string to an Old Norse word
// Uses fuzzy matching with priority for exact matches
function matchPhonemeToOldNorse(phoneStr) {
  // First, try exact match in ON_TO_EN keys
  for(const onWord of Object.keys(ON_TO_EN)) {
    const onPhones = onWord.toLowerCase();
    // Simple phoneme-to-text mapping check
    if(onPhones === phoneStr) return onWord;
  }

  // Second, try matching the phoneme string against ON words
  // Convert ON text to rough phoneme representation and compare
  for(const onWord of Object.keys(ON_TO_EN)) {
    const normalized = normalizeToPhonemes(onWord);
    if(normalized === phoneStr) return onWord;
  }

  return null;
}

// Normalize Old Norse word to approximate phoneme string
function normalizeToPhonemes(onWord) {
  let phonemes = '';
  let i = 0;
  const lower = onWord.toLowerCase();

  while(i < lower.length) {
    let matched = false;
    for(const [pat, sound] of ON_SORTED) {
      if(lower.slice(i, i + pat.length) === pat) {
        phonemes += sound;
        i += pat.length;
        matched = true;
        break;
      }
    }
    if(!matched) i++;
  }

  return phonemes;
}

const DATIVE_PREPS = new Set(['with','at','from','by','beside','within','for','before']);

// Motion verbs handle "to" separately in Step 5b
const DATIVE_PREPS_WITH_TO = new Set([...DATIVE_PREPS, 'to']);

  with: 'dat',
  at: 'dat',

  beyond: 'dat',   // handan + dative
};

function getNearestVerbBefore(tokens, startIdx) {
  for (let i = startIdx - 1; i >= 0; i--) {
    const tok = tokens[i];
    if (!tok) continue;
    if (tok.type === 'punct' || tok.type === 'punctuation') break;
    if (tok.type === 'verb') return tok;
  }
  return null;
}

function resolveGovernedCase(prepWord, tokens = [], prepIdx = -1) {
  if (!prepWord) return null;
  const prep = prepWord.toLowerCase();
  if (!CASED_PREPOSITIONS.has(prep)) return null;

  // Context-sensitive governance for prepositions that can take multiple cases.
  // Basic rule fallback:
  // - static/abstract relation -> dative
  // - directional motion -> accusative
  // Dual-case prepositions: dative for location, accusative for motion
  if (prep === 'in' || prep === 'on') {
    const priorVerb = getNearestVerbBefore(tokens, prepIdx);
    const priorVerbLemma = normalizeLexiconToken((priorVerb && (priorVerb.lemma || LEMMAS[priorVerb.en] || priorVerb.en)) || '');
    if (priorVerbLemma && MOTION_VERBS.has(priorVerbLemma)) return 'acc';
    return 'dat';
  }

  // 'to' → til + genitive; after motion verbs → accusative (á/í + acc)
  if (prep === 'to') {
    const priorVerb = getNearestVerbBefore(tokens, prepIdx);
    const priorVerbLemma = normalizeLexiconToken((priorVerb && (priorVerb.lemma || LEMMAS[priorVerb.en] || priorVerb.en)) || '');
    if (priorVerbLemma && MOTION_VERBS.has(priorVerbLemma)) return 'acc';
    return 'gen';
  }

  if (prep === 'for') {
    const priorVerb = getNearestVerbBefore(tokens, prepIdx);
    const priorVerbLemma = normalizeLexiconToken((priorVerb && (priorVerb.lemma || LEMMAS[priorVerb.en] || priorVerb.en)) || '');
    if (priorVerbLemma && MOTION_VERBS.has(priorVerbLemma)) return 'acc';
    return 'dat';
  }

  return PREPOSITION_GOVERNED_CASE[prep] || null;
}

function getParticiple(lemma, objectGender) {
  const entry = PAST_PARTICIPLES[lemma];
  if (!entry) return EN_TO_ON[`${lemma}d`] || EN_TO_ON[lemma] || formatUnresolvedToken(lemma);

// Derive the bare verb stem used for imperative and present subjunctive.
// Uses the CONJ table: sg2 (forms[1]), inf/þeir (forms[5]), ek (forms[0]).
function deriveVerbStem(verbLemma) {
  const forms = CONJ[verbLemma];
  if (!forms) return null;
  const [ek, sg2, , , , inf] = forms;
  if (inf.endsWith('ja')) return inf.replace(/ja$/, '');
  if (inf.endsWith('va')) return inf.replace(/va$/, '');
  if (sg2.endsWith('ar')) return inf.endsWith('a') ? inf.slice(0, -1) : sg2.slice(0, -2);
  if (sg2.endsWith('ir')) {
    if (ek.endsWith('i')) return ek.slice(0, -1);
    if (ek.endsWith('a')) return inf.endsWith('a') ? inf.slice(0, -1) : ek;
    return ek;
  }
  return inf.endsWith('a') ? inf.slice(0, -1) : ek;
}

// Genuinely irregular imperatives that cannot be derived from CONJ data.
const VERB_IMP_EXCEPTIONS = {
  'be':'ver',   'have':'haf',  'see':'sé',    'know':'vit',
  'may':'má',   'can':'kann',  'must':'þarf', 'need':'þarf',
  'fight':'berjsk', 'fear':'óttumk',
  'walk':'gakk', 'think':'hugsa', 'open':'opna', 'call':'kalla',
};

// Return the 2nd-person singular imperative for the given English lemma.
function deriveImperative(verbLemma) {
  if (VERB_IMP_EXCEPTIONS[verbLemma]) return VERB_IMP_EXCEPTIONS[verbLemma];
  const forms = CONJ[verbLemma];
  if (!forms) return null;
  const [ek, sg2, , , , inf] = forms;
  if (inf.endsWith('ja')) return inf.replace(/ja$/, '');
  if (inf.endsWith('va')) return inf.replace(/va$/, '');
  if (sg2.endsWith('ar')) return inf;           // weak type 2: imp = infinitive
  if (sg2.endsWith('ir')) {
    if (ek.endsWith('i')) return ek.slice(0, -1);
    if (ek.endsWith('a')) return inf.endsWith('a') ? inf.slice(0, -1) : ek;
    return ek;
  }
  return inf.endsWith('a') ? inf.slice(0, -1) : ek;
}

// Irregular present subjunctive paradigms (only where derivation would be wrong).
const VERB_SUBJ_EXCEPTIONS = {
  'be':   ['sé',   'sér',   'sé',   'séum',  'séið',  'sé'],
  'have': ['hafa', 'hafir', 'hafi', 'hafim', 'hafið', 'hafi'],
  'see':  ['sé',   'sér',   'sé',   'séum',  'séið',  'sé'],
  'know': ['vita', 'vitir', 'viti', 'vitim', 'vitið', 'viti'],
};

// Return the present-subjunctive paradigm [ek,þú,hann,vér,þér,þeir] for a lemma.
function derivePresentSubjunctive(verbLemma) {
  if (VERB_SUBJ_EXCEPTIONS[verbLemma]) return VERB_SUBJ_EXCEPTIONS[verbLemma];
  const stem = deriveVerbStem(verbLemma);
  if (!stem) return null;
  return [stem+'a', stem+'ir', stem+'i', stem+'im', stem+'ið', stem+'i'];
}

// Map ON nominative pronoun → conjugation index (for CONJ arrays)
const PRON_TO_IDX = {
  'ek':1, 'þú':2, 'hann':3, 'hon':3, 'þat':3, 'vér':4, 'þér':5, 'þeir':6,
};
// Adjust to 0-based
Object.keys(PRON_TO_IDX).forEach(k => PRON_TO_IDX[k]--);

// Return the correct past-subjunctive form of hafa for the given ON subject pronoun
function getSubjHaveForm(onSubject) {
  const idx = PRON_TO_IDX[onSubject] ?? 2;
  return PAST_SUBJ_HAVE[idx];
}

// Enforce atomic-lemma lexicon policy.
// Multiword and helper phrase keys are removed so translation stays compositional.
function isAtomicLemmaKey(key) {
  if(!key || typeof key !== 'string') return false;
  if(/\s/.test(key)) return false;
  if(/^(was|is|are|be|being)-called$/i.test(key)) return false;
  if(/^who-(was|is|are)-called$/i.test(key)) return false;
  return true;
}
Object.keys(EN_TO_ON).forEach(key => {
  if(!isAtomicLemmaKey(key)) delete EN_TO_ON[key];
});

// Smart pattern-based system to detect multiple meanings of words
const CONTEXT_PATTERNS = {
  // Adjective patterns - word modifies a noun
  adjective: [
    // Direct noun modification: "yellow flower", "sweet rose"
    {
      test: (word, prev, next, tokens, idx) => {
        return next && NOUN_GENDER[next] && !ADJECTIVES[next];
      }
    },
    // Modifies another adjective: "bright yellow", "deep yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return next && ADJECTIVES[next];
      }
    }
  ],
  
  // Noun patterns - word is used as a noun
  noun: [
    // After color words: "the color yellow", "a shade of yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return prev && ['color', 'hue', 'shade', 'tint'].includes(prev);
      }
    },
    // After determiners as standalone: "the yellow", "a yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return prev && ['the', 'a', 'an'].includes(prev) && (!next || !NOUN_GENDER[next]);
      }
    },
    // In color lists: "red, yellow, and blue"
    {
      test: (word, prev, next, tokens, idx) => {
        return (prev === ',' || (prev && ADJECTIVES[prev])) && 
               (next === ',' || next === 'and' || (next && ADJECTIVES[next]));
      }
    }
  ],
  
  // Verb patterns - word is used as a verb
  verb: [
    // With verb endings: "yellows", "yellowed", "yellowing"
    {
      test: (word, prev, next, tokens, idx) => {
        return ['yellows', 'yellowed', 'yellowing'].includes(word);
      }
    },
    // After subject noun: "pages yellow", "leaves yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return prev && NOUN_GENDER[prev] && 
               (!next || ['with', 'in', 'over', 'under'].includes(next) || 
                next.startsWith('year') || next.startsWith('age'));
      }
    },
    // With modal verbs: "will yellow", "can yellow"
    {
      test: (word, prev, next, tokens, idx) => {
        return prev && ['will', 'would', 'can', 'could', 'may', 'might', 'shall', 'should'].includes(prev);
      }
    },
    // After subject pronoun with following object: "she curse my name"
    {
      test: (word, prev, next, tokens, idx) => {
        return prev && ['i', 'you', 'he', 'she', 'it', 'we', 'they'].includes(prev) &&
               !!next && !['and', 'or', 'but'].includes(next);
      }
    }
  ]
};

// Smart word sense detection function
function detectWordSense(word, context) {
  const senses = MULTI_SENSE_WORDS[word.toLowerCase()];
  if (!senses) return null; // Word has single meaning
  
  // Check patterns in priority order: adjective > verb > noun
  // Predicate contexts should prefer verbal readings over nominal fallback.
  const priorityOrder = ['adjective', 'verb', 'noun'];
  
  for (const wordType of priorityOrder) {
    if (!senses[wordType]) continue;
    
    const patterns = CONTEXT_PATTERNS[wordType];
    for (const pattern of patterns) {
      if (pattern.test(word, context.prev, context.next, context.tokens, context.idx)) {
        return wordType;
      }
    }
  }
  
  // Fallback to most common usage while preserving likely predicate contexts.
  if (context.prev && ['would', 'will', 'can', 'could', 'should', 'might', 'must', 'did', 'does', 'do'].includes(context.prev)) {
    return senses.verb ? 'verb' : (senses.adjective ? 'adjective' : 'noun');
  }
  return senses.adjective ? 'adjective' : senses.verb ? 'verb' : 'noun';
}

// ─── PHRASE PARSER ARCHITECTURE ─────────────────────────────────────────────────────────
// New pipeline: INPUT TEXT → Tokenizer → Phrase Parser → Grammar Engine → Renderer → Rune Converter

// ─── TOKENIZER COMPONENT ─────────────────────────────────────────────────────────────
// Breaks input into meaningful units: words, phrases, punctuation, spaces
function tokenize(input) {
  // Enhanced tokenization that preserves multi-word expressions and handles punctuation
  const tokens = [];
  let i = 0;
  
  while (i < input.length) {
    // Skip whitespace but record as space token
    if (/\s/.test(input[i])) {
      let space = '';
      while (i < input.length && /\s/.test(input[i])) {
        space += input[i++];
      }
      tokens.push({ type: 'space', value: space });
      continue;
    }
    
    // Handle punctuation
    if (/[.,!?;:()[\]"']/.test(input[i])) {
      tokens.push({ type: 'punctuation', value: input[i] });
      i++;
      continue;
    }
    
    // Extract word/phrase
    let word = '';
    while (i < input.length && /[a-zA-Záéíóúýæøöǫþðä'-]/.test(input[i])) {
      word += input[i++];
    }
    
    if (word) {
      tokens.push({ 
        type: 'word', 
        value: word.toLowerCase(),
        original: word
      });
    }
  }
  
  return tokens;
}

// ─── PHRASE PARSER COMPONENT ───────────────────────────────────────────────────────
// Identifies phrases, compounds, and grammatical structures
function parsePhrases(tokens) {
  // Strictly compositional pipeline:
  // parse -> IR -> morphology -> generation.
  // Do not collapse multiple source tokens into pre-translated phrase chunks.
  return tokens.map(token => {
    if (token.type !== 'word') return token;
    return {
      type: 'word',
      value: token.value,
      original: token.original,
      length: 1
    };
  });
}

function isLikelyPastVerbForm(word, lemma) {
  if (!word || !lemma) return false;
  if (word === lemma) return false;
  if (/(ed|en)$/.test(word)) return true;
  if (['was', 'were', 'had', 'did', 'knew', 'spoke', 'stood', 'took', 'gave', 'went', 'came', 'found', 'said'].includes(word)) return true;
  return LEMMAS[word] === lemma;
}


// ─── DEFINITE ARTICLE SUFFIX ────────────────────────────────────────────────────────
// Attaches the ON suffixed definite article (-inn/-in/-it etc.) to an inflected noun form.
// §3.1.9: The article agrees with the noun in gender, case, and number.
function attachDefiniteArticle(nounForm, gender, case_, number) {
  if (!nounForm) return nounForm;
  const g = gender || 'm';
  const c = case_ || 'nom';
  const isPlural = number === 'plural';
  const VOWELS = new Set('aeiouáéíóúæøöǫ'.split(''));

  if (isPlural) {
    if (c === 'dat') {
      return nounForm.endsWith('um') ? nounForm.slice(0, -2) + 'unum' : nounForm + 'num';
    }
    if (c === 'gen') return nounForm + 'nna';
    if (g === 'm') return c === 'acc' ? nounForm + 'na' : nounForm + 'nir';
    if (g === 'f') return nounForm + 'nar';
    return nounForm + 'in'; // neuter nom/acc pl
  }

  // Singular suffixes
  let suffix;
  if (g === 'm') {
    suffix = c === 'dat' ? 'inum' : c === 'gen' ? 'ins' : 'inn';
  } else if (g === 'f') {
    suffix = c === 'dat' ? 'inni' : c === 'gen' ? 'innar' : c === 'acc' ? 'ina' : 'in';
  } else {
    suffix = c === 'dat' ? 'inu' : c === 'gen' ? 'ins' : 'it';
  }

  let stem = nounForm;
  // Drop nominative -r for masculine/neuter nouns before adding vocalic suffix
  if (stem.endsWith('r') && (g === 'm' || g === 'n') && (c === 'nom' || c === 'acc')) {
    stem = stem.slice(0, -1);
  }
  // If stem ends in a vowel, drop the initial 'i' of the suffix
  if (VOWELS.has(stem[stem.length - 1]) && suffix[0] === 'i') {
    suffix = suffix.slice(1);
  }

  return stem + suffix;
}

// ─── GRAMMAR ENGINE COMPONENT ───────────────────────────────────────────────────────
// Handles agreement, case, conjugation, and grammatical rules
class GrammarEngine {
  constructor() {
    this.context = {
      subject: null,
      verb: null,
      objects: [],
      prepositions: [],
      case: 'nominative'
    };
  }
  
  // Analyze grammatical structure of a phrase
  analyzePhrase(phrases) {
    const analysis = [];
    
    for (let i = 0; i < phrases.length; i++) {
      const phrase = phrases[i];
      
      if (phrase.type === 'space' || phrase.type === 'punctuation') {
        analysis.push(phrase);
        continue;
      }
      
      const wordAnalysis = this.analyzeWord(phrase, i, phrases);
      analysis.push(wordAnalysis);
    }
    this.assignClauseBoundaries(analysis);
    this.assignSyntacticRoles(analysis);
    return analysis;
  }
  
  // Analyze individual word/phrase grammatical properties
  analyzeWord(phrase, index, context) {
    const value = phrase.value;
    const analysis = { ...phrase };
    
    // Determine word type and grammatical properties
    if (['a', 'an', 'the'].includes(value)) {
      analysis.wordType = 'article';
      analysis.translation = '';
    } else if (value === 'er') {
      analysis.wordType = 'grammar-marker';
      analysis.translation = 'er';
    } else if (POSSESSIVES[value] || (/-reflexive$/.test(value) && POSSESSIVES[value.replace(/-reflexive$/, '')])) {
      const basePossessive = value.replace(/-reflexive$/, '');
      analysis.wordType = 'possessive';
      analysis.possessiveData = POSSESSIVES[basePossessive];
      analysis.value = basePossessive;
      analysis.forceReflexive = /-reflexive$/.test(value);
    } else if (PRONOUNS[value]) {
      analysis.wordType = 'pronoun';
      analysis.pronounData = PRONOUNS[value];
      analysis.case = 'undetermined';
    } else if (PREPOSITION_WORDS.has(value)) {
      analysis.wordType = 'preposition';
      analysis.translation = EN_TO_ON[value] || value;
    } else if (DEMONSTRATIVES[value]) {
      analysis.wordType = 'demonstrative';
      analysis.demonstrativeData = DEMONSTRATIVES[value];
    } else if (CONJ[value]) {
      analysis.wordType = 'verb';
      analysis.verbData = CONJ[value];
      analysis.conjugation = 'base';
      analysis.verbLemma = value;
    } else if (LEMMAS[value] && CONJ[LEMMAS[value]] && isLikelyPastVerbForm(value, LEMMAS[value])) {
      analysis.wordType = 'verb';
      analysis.verbData = CONJ[LEMMAS[value]];
      analysis.verbLemma = LEMMAS[value];
      analysis.tense = 'past';
      analysis.translation = EN_TO_ON[LEMMAS[value]] || null;
    } else if ((/ed$/.test(value) || ['was', 'were'].includes(value)) && EN_TO_ON[value]) {
      analysis.wordType = 'verb';
      analysis.translation = EN_TO_ON[value];
    } else if (ADJECTIVES[value]) {
      analysis.wordType = 'adjective';
      analysis.adjectiveData = ADJECTIVES[value];
      analysis.adjKey = value;
    } else if (NOUN_GENDER[value]) {
      analysis.wordType = 'noun';
      analysis.gender = NOUN_GENDER[value];
      analysis.nounData = { gender: NOUN_GENDER[value] };
      analysis.translation = EN_TO_ON[value] || null;
    } else if (phrase.translation) {
      // Pre-translated phrase or compound
      if (phrase.type === 'possessive-phrase') {
        analysis.wordType = 'possessive-phrase';
        analysis.translation = phrase.translation;
        analysis.gender = phrase.gender;
        analysis.possessive = phrase.possessive;
        analysis.noun = phrase.noun;
        analysis.possessiveData = POSSESSIVES[phrase.possessive] || null;
      } else if (phrase.type === 'possessive-compound') {
        analysis.wordType = 'possessive-compound';
        analysis.translation = phrase.translation;
        analysis.gender = phrase.gender;
      } else if (['is called', 'am called', 'are called', 'be called', 'being called'].includes(phrase.value)) {
        // Special handling for "be called" verb phrases - map to heita
        analysis.wordType = 'verb';
        analysis.verbData = CONJ['heita'];
        analysis.conjugation = 'heita-phrase';
        analysis.isBeCalledPhrase = true;
      } else {
        analysis.wordType = 'translated';
        analysis.translation = phrase.translation;
        if (phrase.gender) analysis.gender = phrase.gender;
      }
    } else {
      // Try lemmatization and dictionary lookup
      const normalizedValue = normalizeLexiconToken(value);
      const lemma = normalizeLexiconToken(LEMMAS[normalizedValue] || normalizedValue);
      if (CONJ[lemma]) {
        analysis.wordType = 'verb';
        analysis.verbData = CONJ[lemma];
        analysis.conjugation = 'base';
        analysis.verbLemma = lemma;
        if (isLikelyPastVerbForm(value, lemma)) analysis.tense = 'past';
      } else if (EN_TO_ON[lemma]) {
        const nounGender = NOUN_GENDER[lemma];
        if (nounGender || NOUN_DECLENSION[lemma]) {
          analysis.wordType = 'noun';
          analysis.gender = nounGender || 'm';
          analysis.nounData = { gender: analysis.gender };
          analysis.translation = EN_TO_ON[lemma] || null;
        } else {
          analysis.wordType = 'dictionary';
          analysis.translation = EN_TO_ON[lemma];
          analysis.gender = 'm';
        }
      } else {
        analysis.wordType = 'unknown';
      }
    }
    
    return analysis;
  }

  assignClauseBoundaries(analysis) {
    for (let i = 0; i < analysis.length; i++) {
      const item = analysis[i];
      if (item.type === 'punctuation' && /[,.!?;]/.test(item.value)) {
        item.boundaryRole = 'clause-boundary';
      } else if (item.type === 'word' && ['and', 'but', 'or', 'for'].includes(item.value)) {
        item.boundaryRole = 'coordinator-boundary';
      }
    }
  }

  assignSyntacticRoles(analysis) {
    let clauseStart = 0;
    for (let i = 0; i <= analysis.length; i++) {
      const boundary = i === analysis.length ||
        (analysis[i] && (analysis[i].boundaryRole === 'clause-boundary' || analysis[i].boundaryRole === 'coordinator-boundary'));
      if (!boundary) continue;

      const slice = analysis.slice(clauseStart, i);
      let finiteVerbSeen = false;
      for (let local = 0; local < slice.length; local++) {
        const item = slice[local];
        if (!item || item.type === 'space' || item.type === 'punctuation') continue;

        if (item.wordType === 'verb') {
          finiteVerbSeen = true;
          continue;
        }

        if (item.wordType === 'adjective' && ADVERBIAL_LEXICON[item.value]) {
          item.wordType = 'adverb';
          item.adverbRole = ADVERBIAL_LEXICON[item.value].role;
        } else if (item.wordType === 'dictionary' && ADVERBIAL_LEXICON[item.value]) {
          item.wordType = 'adverb';
          item.adverbRole = ADVERBIAL_LEXICON[item.value].role;
        }

        if (item.wordType === 'adverb') {
          let nearestVerb = -1;
          for (let scan = local + 1; scan < slice.length; scan++) {
            if (slice[scan].wordType === 'verb') { nearestVerb = scan; break; }
          }
          if (nearestVerb === -1) {
            for (let scan = local - 1; scan >= 0; scan--) {
              if (slice[scan].wordType === 'verb') { nearestVerb = scan; break; }
            }
          }
          item.syntaxRole = 'adverbial';
          item.modifiesVerbIndex = nearestVerb === -1 ? null : (clauseStart + nearestVerb);
          continue;
        }

        if (item.wordType !== 'noun' && item.wordType !== 'pronoun' && item.wordType !== 'dictionary') continue;

        let previousLexical = null;
        for (let back = local - 1; back >= 0; back--) {
          if (slice[back].type === 'space') continue;
          previousLexical = slice[back];
          break;
        }

        if (previousLexical && previousLexical.wordType === 'preposition') {
          const prep = previousLexical.value;
          item.syntaxRole = 'prep-object';
          item.case = resolveGovernedCase(prep, analysis, clauseStart + local - 1) || 'acc';
          item.caseLocked = true;
        } else if (!finiteVerbSeen) {
          item.syntaxRole = 'subject';
          item.case = 'nom';
        } else {
          item.syntaxRole = 'object';
          item.case = 'acc';
        }
      }

      clauseStart = i + 1;
    }
  }

  buildNounPhraseFeatureMap(analysis, lastVerbIndex) {
    const featureMap = new Map();
    const isNounLike = item => item && ['noun', 'dictionary', 'translated', 'possessive-phrase', 'possessive-compound'].includes(item.wordType);
    const isModifierLike = item => item && ['adjective', 'possessive', 'demonstrative'].includes(item.wordType);

    for (let i = 0; i < analysis.length; i++) {
      const item = analysis[i];
      if (!isNounLike(item)) continue;

      const gender = item.gender || NOUN_GENDER[item.value] || 'm';
      const number = inferNominalNumber(item.value || '') === 'plural' ? 'plural' : 'singular';
      const caseForm = item.case && item.case !== 'undetermined'
        ? item.case
        : this.determineCaseForPosition(i, analysis, lastVerbIndex);

      // Scan left to detect preceding definite article "the"
      let definite = false;
      for (let left = i - 1; left >= 0; left--) {
        const prev = analysis[left];
        if (!prev || prev.type === 'space') continue;
        if (prev.type === 'punctuation') break;
        if (prev.wordType === 'article' && (prev.value === 'the' || prev.en === 'the')) {
          definite = true;
          break;
        }
        if (!isModifierLike(prev) && prev.wordType !== 'article') break;
      }

      featureMap.set(i, { gender, number, case: caseForm, definite });

      for (let left = i - 1; left >= 0; left--) {
        const prev = analysis[left];
        if (!prev || prev.type === 'space') continue;
        if (prev.type === 'punctuation') break;
        if (!isModifierLike(prev) && prev.wordType !== 'article') break;
        if (isModifierLike(prev)) {
          featureMap.set(left, { gender, number, case: caseForm, definite });
        }
      }

      for (let right = i + 1; right < analysis.length; right++) {
        const next = analysis[right];
        if (!next || next.type === 'space') continue;
        if (next.type === 'punctuation') break;
        if (!isModifierLike(next)) break;
        featureMap.set(right, { gender, number, case: caseForm });
      }
    }
    return featureMap;
  }
  
  // Determine pronoun case based on context
  determinePronounCase(index, context) {
    // Check if this is a reflexive pronoun
    const pronounValue = context[index]?.value?.toLowerCase();
    const isReflexive = REFLEXIVE_PRONOUNS.has(pronounValue);
    const forceObjectPronoun = OBJECT_PRONOUNS.has(pronounValue);

    // Look for preceding prepositions
    for (let i = index - 1; i >= 0; i--) {
      const item = context[i];
      if (item.type === 'word' && CASED_PREPOSITIONS.has(item.value)) {
        return resolveGovernedCase(item.value, context, i) || 'dat';
      }
      if (item.type === 'word' && ['and', 'but', 'or'].includes(item.value)) {
        break; // New clause
      }
      if (item.type === 'punctuation') {
        break; // New sentence
      }
    }

    // Look for verbs to determine subject vs object
    let seenVerb = false;
    for (let i = 0; i < index; i++) {
      const item = context[i];
      if (item.type === 'word' && (CONJ[item.value] || item.wordType === 'verb')) {
        seenVerb = true;
        break;
      }
    }

    // Reflexive pronouns are typically accusative or dative (never nominative)
    if (isReflexive) {
      return seenVerb ? 'acc' : 'dat'; // Default to dative if no verb (e.g., "by myself")
    }

    if (forceObjectPronoun) {
      return seenVerb ? 'acc' : 'dat';
    }

    return seenVerb ? 'acc' : 'nom';
  }
  
  // Apply grammatical inflections and agreements
  applyInflections(analysis) {
    const inflected = [];
    let currentSubject = null;
    let currentGender = 'm';
    let currentNumber = 'singular';
    let currentCase = 'nom';
    let lastVerbIndex = -1;
    const nounPhraseFeatures = this.buildNounPhraseFeatureMap(analysis, lastVerbIndex);
    
    for (let i = 0; i < analysis.length; i++) {
      const item = analysis[i];
      
      if (item.type === 'space' || item.type === 'punctuation') {
        inflected.push(item);
        continue;
      }
      
      switch (item.wordType) {
        case 'article':
          // Old Norse generally does not use standalone indefinite/definite articles
          break;

        case 'pronoun':
          const governedCase = this.getGovernedCaseFromPreviousToken(i, analysis);
          const resolvedPronounCase = governedCase || (item.case && item.case !== 'undetermined'
            ? item.case
            : this.determinePronounCase(i, analysis));
          const pronounForm = item.pronounData[resolvedPronounCase] || item.pronounData.nom;
          inflected.push({
            ...item,
            inflected: pronounForm,
            case: resolvedPronounCase
          });
          if (resolvedPronounCase === 'nom') {
            currentSubject = pronounForm;
            currentNumber = ['vér', 'þeir', 'þær', 'þau'].includes(pronounForm) ? 'plural' : 'singular';
          }
          break;

        case 'demonstrative':
          let demoGender = currentGender;
          for (let j = i + 1; j < analysis.length; j++) {
            const nextItem = analysis[j];
            if (nextItem.type === 'space' || nextItem.type === 'punctuation') continue;
            if (nextItem.wordType === 'noun') {
              demoGender = nextItem.gender || 'm';
            }
            break;
          }
          currentCase = this.determineCaseForPosition(i, analysis, lastVerbIndex);
          const demoForm = currentCase === 'acc'
            ? (demoGender === 'f' ? item.demonstrativeData.fem_acc : demoGender === 'n' ? item.demonstrativeData.neut_acc : item.demonstrativeData.masc_acc)
            : currentCase === 'dat'
              ? (demoGender === 'f' ? item.demonstrativeData.fem_dat : demoGender === 'n' ? item.demonstrativeData.neut_dat : item.demonstrativeData.masc_dat)
              : (demoGender === 'f' ? item.demonstrativeData.fem_sg : demoGender === 'n' ? item.demonstrativeData.neut_sg : item.demonstrativeData.masc_sg);
          inflected.push({
            ...item,
            inflected: demoForm
          });
          break;
          
        case 'verb':
          lastVerbIndex = i;
          {
          // Passive participle consumed by preceding 'be' — output the agreed form
          if (item.passiveConsumed) {
            inflected.push({ ...item, inflected: item.passiveConsumed });
            break;
          }
          const verbLemma = normalizeLexiconToken(item.verbLemma || LEMMAS[item.value] || item.value);
          const conjugationIndex = this.getConjugationIndex(currentSubject, currentNumber);
          // Detect imperative: verb is the first real token and no subject has appeared
          const isImperative = !currentSubject && (() => {
            for (let j = 0; j < i; j++) {
              const prev = analysis[j];
              if (prev.type === 'space' || prev.type === 'punctuation') continue;
              return false; // something came before
            }
            return true;
          })();
          const impForm = isImperative ? deriveImperative(verbLemma) : null;
          if (impForm) {
            inflected.push({ ...item, inflected: impForm, mood: 'imp' });
            break;
          }
          // Detect at-clause subjunctive: verb preceded by 'at' complementiser
          const inAtClause = (() => {
            for (let j = i - 1; j >= 0; j--) {
              const prev = analysis[j];
              if (!prev || prev.type === 'space') continue;
              if (prev.type === 'punctuation') break;
              if (prev.value === 'that' || prev.value === 'at') return true;
              break;
            }
            return false;
          })();
          if (inAtClause) {
            const subjForms = derivePresentSubjunctive(verbLemma);
            if (subjForms) {
              inflected.push({ ...item, inflected: subjForms[conjugationIndex] ?? subjForms[2], mood: 'subj' });
              break;
            }
          }
          if (item.tense === 'past') {
            // Passive detection: was/were + past participle → vara form + pp agreeing with subject
            if (verbLemma === 'be') {
              let ppToken = null;
              for (let j = i + 1; j < analysis.length; j++) {
                const next = analysis[j];
                if (!next || next.type === 'space') continue;
                if (next.type === 'punctuation') break;
                if (next.wordType === 'verb' && next.tense === 'past' && next.verbLemma !== 'be') {
                  ppToken = next;
                }
                break;
              }
              if (ppToken) {
                const ppLemma = normalizeLexiconToken(ppToken.verbLemma || LEMMAS[ppToken.value] || ppToken.value);
                const ppEntry = PAST_PARTICIPLES[ppLemma];
                if (ppEntry) {
                  const pastBe = PAST_CONJ['be'];
                  const varaForm = pastBe[conjugationIndex] || pastBe[2];
                  const ppForm = currentGender === 'f' ? (ppEntry.fem_acc || ppEntry.base) :
                                 currentGender === 'n' ? (ppEntry.neut || ppEntry.base) :
                                 (ppEntry.masc_acc || ppEntry.base);
                  inflected.push({ ...item, inflected: varaForm, passive: true });
                  // Mark the pp token as consumed so it outputs the agreed form
                  analysis[analysis.indexOf(ppToken)].passiveConsumed = ppForm;
                  break;
                }
              }
            }
            const pastForms = PAST_CONJ[verbLemma];
            if (pastForms) {
              inflected.push({ ...item, inflected: pastForms[conjugationIndex] || pastForms[2], conjugation: conjugationIndex });
            } else {
              inflected.push({ ...item, inflected: formatUnresolvedToken(item.value || verbLemma) });
            }
            break;
          }
          if (currentSubject && item.verbData) {
            inflected.push({
              ...item,
              inflected: item.verbData[conjugationIndex] || item.verbData[2], // Default to 3rd person
              conjugation: conjugationIndex
            });
          } else {
            inflected.push({
              ...item,
              inflected: item.verbData
                ? (item.verbData[2] || item.value)
                : (item.translation || formatUnresolvedToken(item.value || verbLemma))
            });
          }
          break;
          }

        case 'adjective':
          {
          const npFeatures = nounPhraseFeatures.get(i);
          const adjectiveGender = npFeatures?.gender || currentGender;
          const adjectiveNumber = npFeatures?.number || currentNumber;
          currentCase = npFeatures?.case || (item.case && item.case !== 'undetermined'
            ? item.case
            : this.determineCaseForPosition(i, analysis, lastVerbIndex));
          // Detect preceding degree adverb for comp/sup
          let degree = null;
          for (let j = i - 1; j >= 0; j--) {
            const prev = analysis[j];
            if (!prev || prev.type === 'space') continue;
            if (prev.value === 'more') { degree = 'comp'; }
            else if (prev.value === 'most') { degree = 'sup'; }
            break;
          }
          const adjectiveForm = this.getAdjectiveForm(
            item.adjectiveData, adjectiveGender, currentCase, adjectiveNumber,
            { definite: npFeatures?.definite, degree, adjKey: item.adjKey }
          );
          inflected.push({
            ...item,
            inflected: adjectiveForm
          });
          break;
          }
        
        case 'adverb':
          inflected.push({
            ...item,
            inflected: EN_TO_ON[item.value] || item.translation || item.value
          });
          break;
          
        case 'possessive-phrase':
          {
          const npCase = item.case && item.case !== 'undetermined'
            ? item.case
            : this.determineCaseForPosition(i, analysis, lastVerbIndex);
          const npNumber = inferNominalNumber(item.noun || item.value) === 'plural' ? 'plural' : 'singular';
          const nounForm = this.getNounForm({
            ...item,
            wordType: 'noun',
            value: item.noun,
            translation: EN_TO_ON[item.noun] || item.noun
          }, npCase, npNumber);
          const possessiveForm = item.possessiveData
            ? this.getPossessiveForm(item.possessiveData, item.gender || 'm', this.isReflexivePossessive(i, analysis), npNumber)
            : item.possessive;
          inflected.push({
            ...item,
            inflected: `${nounForm} ${possessiveForm}`.trim(),
            case: npCase
          });
          currentGender = item.gender || 'm';
          break;
          }
          
        case 'possessive-compound':
          // Already translated possessive + compound, just pass through
          inflected.push({
            ...item,
            inflected: item.translation
          });
          currentGender = item.gender || 'm';
          break;
          
        case 'possessive':
          // Look ahead to find the noun this possessive modifies
          let targetGender = currentGender; // fallback to current
          for (let j = i + 1; j < analysis.length; j++) {
            const nextItem = analysis[j];
            if (nextItem.type === 'space' || nextItem.type === 'punctuation') continue;
            if (nextItem.wordType === 'noun') {
              targetGender = nextItem.gender;
              break;
            } else if (nextItem.type === 'compound' || nextItem.type === 'translated' || nextItem.type === 'phrase') {
              targetGender = nextItem.gender || 'm';
              break;
            } else if (nextItem.wordType === 'adjective') {
              // Skip adjectives, keep looking for the noun
              continue;
            } else {
              break; // Hit different type of word
            }
          }

          const npFeatures = nounPhraseFeatures.get(i);
          targetGender = npFeatures?.gender || targetGender;
          const targetNumber = npFeatures?.number || 'singular';
          const isReflexive = !!item.forceReflexive || this.isReflexivePossessive(i, analysis);
          const possessiveForm = this.getPossessiveForm(item.possessiveData, targetGender, isReflexive, targetNumber);
          inflected.push({
            ...item,
            inflected: possessiveForm,
            reflexive: isReflexive,
            case: npFeatures?.case || item.case || 'nom'
          });
          break;
          
        case 'noun':
          {
          const npFeatures = nounPhraseFeatures.get(i);
          currentCase = npFeatures?.case || (item.case && item.case !== 'undetermined'
            ? item.case
            : this.determineCaseForPosition(i, analysis, lastVerbIndex));
          const nounNumber = npFeatures?.number || currentNumber;
          let nounForm = this.getNounForm(item, currentCase, nounNumber);
          if (npFeatures?.definite && nounForm) {
            nounForm = attachDefiniteArticle(nounForm, item.gender, currentCase, nounNumber);
          }
          inflected.push({
            ...item,
            inflected: nounForm,
            gender: item.gender,
            case: currentCase
          });
          currentGender = item.gender;
          if (currentCase === 'nom') {
            currentSubject = nounForm || item.translation || item.value;
            currentNumber = inferNominalNumber(item.value);
          }
          break;
          }
        case 'grammar-marker':
          inflected.push({
            ...item,
            inflected: item.translation || item.value
          });
          break;
          
        case 'translated':
        case 'compound':
          inflected.push({
            ...item,
            inflected: item.translation
          });
          if (item.gender) currentGender = item.gender;
          break;
          
        default:
          inflected.push({
            ...item,
            inflected: item.translation || item.original || item.value
          });
      }
    }
    return this.enforceGrammarRules(inflected);
  }

  enforceGrammarRules(inflected) {
    const corrected = [...inflected];
    let subjectFeatures = null;
    for (let i = 0; i < corrected.length; i++) {
      const item = corrected[i];
      if (!item || item.type === 'space' || item.type === 'punctuation') continue;
      if (item.wordType === 'pronoun' && item.case === 'nom') {
        subjectFeatures = {
          subject: item.inflected,
          number: ['vér', 'þeir', 'þær', 'þau'].includes(item.inflected) ? 'plural' : 'singular'
        };
      } else if (item.wordType === 'noun' && item.case === 'nom') {
        subjectFeatures = {
          subject: item.inflected,
          number: inferNominalNumber(item.value)
        };
      } else if (item.wordType === 'preposition') {
        const governed = resolveGovernedCase(item.value, corrected, i);
        if (!governed) continue;
        for (let j = i + 1; j < corrected.length; j++) {
          const next = corrected[j];
          if (!next || next.type === 'space') continue;
          if (next.type === 'punctuation') break;
          if (next.wordType === 'pronoun') {
            const form = next.pronounData[governed] || next.inflected;
            corrected[j] = { ...next, case: governed, inflected: form, caseLocked: true };
          }
          break;
        }
      } else if (item.wordType === 'verb' && item.verbData && subjectFeatures) {
        const conjugationIndex = this.getConjugationIndex(subjectFeatures.subject, subjectFeatures.number);
        corrected[i] = {
          ...item,
          inflected: item.verbData[conjugationIndex] || item.verbData[2],
          conjugation: conjugationIndex
        };
      }
    }
    return corrected;
  }
  
  // Get conjugation index for pronouns
  getConjugationIndex(subject, number) {
    const pronounIndex = PRON_TO_IDX[subject];
    if (pronounIndex !== undefined) return pronounIndex;
    return number === 'plural' ? 5 : 2; // 3rd person plural or singular
  }
  
  // Get appropriate adjective form
  getAdjectiveForm(adjectiveData, gender, case_, number, options = {}) {
    // Comparative/superlative: derive from stem with exceptions for suppletive forms
    if (options.degree) {
      const exc = COMP_SUP_EXCEPTIONS[options.adjKey];
      if (exc?.[options.degree]) return exc[options.degree];
      const stem = adjectiveData.weakStem || adjectiveData.fem_nom_sg || adjectiveData.base;
      return options.degree === 'sup' ? stem + 'astr' : stem + 'ari';
    }

    // Weak (definite) declension: derive from weakStem or fem_nom_sg
    if (options.definite) {
      const stem = adjectiveData.weakStem || adjectiveData.fem_nom_sg || adjectiveData.base;
      if (number === 'plural') {
        return case_ === 'dat' ? adjectiveData.masc_dat_pl || stem + 'um' : stem + 'u';
      }
      return (gender === 'm' && (case_ === 'nom' || !case_)) ? stem + 'i' : stem + 'a';
    }

    const genderKey = gender === 'f' ? 'fem' : gender === 'n' ? 'neut' : 'masc';
    const caseKey = case_ || 'nom';
    const numberKey = number === 'plural' ? 'pl' : 'sg';
    const key = `${genderKey}_${caseKey}_${numberKey}`;
    // Fall back gracefully for genitive (not in strong table): use dat form
    return adjectiveData[key] || adjectiveData[`${genderKey}_dat_${numberKey}`] || adjectiveData.base;
  }
  
  // Get appropriate possessive form
  getPossessiveForm(possessiveData, gender, isReflexive = false, number = 'singular') {
    // Use reflexive form if available and reflexive is true
    if (isReflexive && possessiveData.reflexive) {
      const reflexiveForm = possessiveData.reflexive;
      const numberSuffix = number === 'plural' ? '_pl' : '_sg';
      return gender === 'f' ? (reflexiveForm[`fem${numberSuffix}`] || reflexiveForm.fem_sg) :
             gender === 'n' ? (reflexiveForm[`neut${numberSuffix}`] || reflexiveForm.neut_sg) :
             (reflexiveForm[`masc${numberSuffix}`] || reflexiveForm.masc_sg);
    }
    // Otherwise use standard form
    const numberSuffix = number === 'plural' ? '_pl' : '_sg';
    return gender === 'f' ? (possessiveData[`fem${numberSuffix}`] || possessiveData.fem_sg) :
           gender === 'n' ? (possessiveData[`neut${numberSuffix}`] || possessiveData.neut_sg) :
           (possessiveData[`masc${numberSuffix}`] || possessiveData.masc_sg);
  }

  // Check if a verb is a linking verb (be, become, seem, etc.)
  isLinkingVerb(verbValue) {
    const linkingVerbs = new Set(['be', 'am', 'is', 'are', 'was', 'were', 'been',
                                  'become', 'becomes', 'became', 'seem', 'seems', 'seemed',
                                  'appear', 'appears', 'appeared', 'look', 'looks', 'looked',
                                  'feel', 'feels', 'felt', 'sound', 'sounds', 'sounded',
                                  'taste', 'tastes', 'tasted', 'smell', 'smells', 'smelled']);
    return linkingVerbs.has(verbValue);
  }

  // Determine if a possessive is reflexive (referring back to the subject)
  isReflexivePossessive(index, analysis) {
    const possessiveToken = (analysis[index]?.value || '').toLowerCase();
    if (['my', 'your', 'his', 'her', 'our', 'their'].includes(possessiveToken)) {
      return false;
    }
    // Find the noun that follows this possessive
    let targetNounIndex = -1;
    for (let j = index + 1; j < analysis.length; j++) {
      const item = analysis[j];
      if (item.type === 'space' || item.type === 'punctuation') continue;
      if (item.wordType === 'adjective') continue; // Skip adjectives
      if (item.wordType === 'noun' || (item.type === 'compound') || (item.type === 'translated')) {
        targetNounIndex = j;
        break;
      }
      break; // Hit different type of word
    }

    if (targetNounIndex === -1) return false; // No noun found, default to non-reflexive

    // Look backward to find the subject (nominative pronoun or noun)
    let subjectIndex = -1;
    for (let j = index - 1; j >= 0; j--) {
      const item = analysis[j];
      if (item.type === 'space') continue;
      if (item.type === 'punctuation') break;
      if (item.wordType === 'pronoun' && item.case === 'nom') {
        subjectIndex = j;
        break;
      }
      if (item.wordType === 'noun') {
        subjectIndex = j;
        break;
      }
    }

    // Look for a verb between the subject and the target noun
    let verbIndex = -1;
    for (let j = index - 1; j >= 0; j--) {
      const item = analysis[j];
      if (item.type === 'word' && (CONJ[item.value] || item.wordType === 'verb')) {
        verbIndex = j;
        break;
      }
    }

    // If there's no verb before the possessive, or the possessive-noun is before the verb, it's non-reflexive
    if (verbIndex === -1) {
      return false; // No verb found, it's non-reflexive (e.g., in subject position)
    }

    // If the verb is a linking verb and the noun is after it, it's non-reflexive (predicate position)
    if (this.isLinkingVerb(analysis[verbIndex]?.value?.toLowerCase() || '')) {
      return false; // Linking verb indicates predicate position, non-reflexive
    }

    // If the target noun comes after the verb, it's in object position, so reflexive
    if (targetNounIndex > verbIndex) return true;

    // Conservative fallback: possessives after any non-linking verb are often reflexive in object context
    return index > verbIndex;
  }

  // Get appropriate noun form
  getNounForm(noun, case_, number) {
    if (noun.wordType === 'translated' && noun.translation) {
      return noun.translation; // Already translated phrase
    }
    
    const declension = NOUN_DECLENSION[noun.value] || NOUN_DECLENSION[LEMMAS[noun.value]];
    if (declension) {
      const caseKey = case_ || 'nom';
      const numberKey = number === 'plural' ? 'pl' : 'sg';
      const key = `${caseKey}_${numberKey}`;
      return declension[key] || noun.translation || noun.value;
    }
    
    return noun.translation || noun.value;
  }

  determineCaseForPosition(index, analysis, lastVerbIndex) {
    if (analysis[index]?.caseLocked) return analysis[index].case;
    if (analysis[index]?.case && analysis[index].case !== 'undetermined') {
      return analysis[index].case;
    }
    // Check immediately preceding lexical token for preposition-governed case
    let prevWord = null;
    for (let i = index - 1; i >= 0; i--) {
      if (analysis[i].type === 'space') continue;
      if (analysis[i].type === 'punctuation') break;
      if (analysis[i].type === 'word') {
        prevWord = analysis[i].value;
      }
      break;
    }

    if (prevWord && CASED_PREPOSITIONS.has(prevWord)) {
      return resolveGovernedCase(prevWord, analysis, index - 1) || 'nom';
    }

    // Simple direct-object heuristic: nouns/adjectives after a verb tend accusative
    if (lastVerbIndex !== -1 && index > lastVerbIndex) return 'acc';

    return 'nom';
  }

  getGovernedCaseFromPreviousToken(index, analysis) {
    for (let i = index - 1; i >= 0; i--) {
      if (analysis[i].type === 'space') continue;
      if (analysis[i].type === 'punctuation') break;
      if (analysis[i].wordType === 'preposition') {
        return resolveGovernedCase(analysis[i].value, analysis, i) || null;
      }
      break;
    }
    return null;
  }
}

// ─── MAIN TRANSLATION ORCHESTRATOR ────────────────────────────────────────────
function performTranslation() {
  const enInp   = document.getElementById('inp').value.trim();
  const onInp   = document.getElementById('onOut').textContent.trim();
  const runesInp = document.getElementById('runeOut').textContent.trim();
  const ukEl    = document.getElementById('unknownKey');

  // Enforce input length limits for security and performance
  const MAX_INPUT_LENGTH = 5000;
  if(enInp.length > MAX_INPUT_LENGTH || onInp.length > MAX_INPUT_LENGTH || runesInp.length > MAX_INPUT_LENGTH) {
    alert(`Input exceeds maximum length of ${MAX_INPUT_LENGTH} characters`);
    return;
  }

  // If active field is empty, clear other fields
  if((activeInput === 'english' && !enInp) || 
     (activeInput === 'oldnorse' && !onInp) || 
     (activeInput === 'runes' && !runesInp)) {
    clearOtherFields(activeInput);
    ukEl.style.display = 'none';
    return;
  }

  // If all fields are empty, clear everything
  if(!enInp && !onInp && !runesInp) {
    document.getElementById('onOut').textContent = '';
    document.getElementById('runeOut').textContent = '';
    ukEl.style.display = 'none';
    return;
  }

  let enStr = enInp;
  let onStr = onInp;
  let runesStr = runesInp;
  let allUnknowns = [];

  // Route based on active input
  if(activeInput === 'english' && enStr) {
    // NEW PHRASE-BASED PIPELINE: English → Old Norse → Runes
    const result = translateWithPhraseParser(enStr);
    onStr = result.oldNorse;
    allUnknowns = result.unknowns;
    runesStr = renderRunes(onStr);

  } else if(activeInput === 'oldnorse' && onStr) {
    // Old Norse → English + Runes (existing logic)
    const enResult = onToEnglish(onStr);
    enStr = enResult.text;
    allUnknowns = enResult.unknowns;
    runesStr = renderRunes(onStr);

  } else if(activeInput === 'runes' && runesInp) {
    // Runes → Old Norse → English (existing logic)
    const onResult = runesToOldNorse(runesInp);
    onStr = onResult.text;
    allUnknowns = onResult.unknowns;

    const enResult = onToEnglish(onStr.replace(/<[^>]*>/g, ''));
    enStr = enResult.text;
    allUnknowns.push(...enResult.unknowns);
  }

  // Update outputs (but don't update active input field to preserve cursor)
  updateAllOutputs(enStr, onStr, runesStr, allUnknowns, ukEl, activeInput);
}

// ─── NEW PHRASE-BASED TRANSLATION FUNCTION ────────────────────────────────────────
function translateWithPhraseParser(input) {
  const unknowns = [];
  const lines = input.split('\n');
  const translatedLines = [];

  lines.forEach(line => {
    if (!line.trim()) {
      translatedLines.push('');
      return;
    }

    const normalized = normalizeEnglishIdioms(removeIndefiniteArticles(line));
    const ir = parseLineToSyntaxIR(normalized);
    const realized = realizeSyntaxIR(ir);

    const leakSafeOutput = enforceNoRawSourceLeakage(realized.oldNorse, realized.unknowns || []);

    translatedLines.push(leakSafeOutput);
    (realized.unknowns || []).forEach(u => { if (!unknowns.includes(u)) unknowns.push(u); });
  });

  return { oldNorse: translatedLines.join('\n'), unknowns };
}

function extractPotentialSourceLexemes(line) {
  if (!line) return [];
  const stopwords = new Set(['the','a','an','and','or','but','if','for','to','of','in','on','at','by','with','from','as','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','can','could','should','may','might','must','that','this','these','those','who','which','what']);
  const tokens = (line.toLowerCase().match(/[a-z][a-z'-]*/g) || []).filter(tok => !stopwords.has(tok));
  return [...new Set(tokens)];
}

function parseLineToSyntaxIR(line) {
  const root = { type: 'line', clauses: [] };
  const trimmed = (line || '').trim();

  const counterfactualMatch = trimmed.match(/^\s*if\s+(.+?),\s*(.+)$/i);
  if (counterfactualMatch &&
      /\bhad\b/i.test(counterfactualMatch[1]) &&
      /\bwould\b/i.test(counterfactualMatch[2])) {
    const protasis = parseSimpleClause(counterfactualMatch[1], 'protasis');
    const apodosis = parseSimpleClause(counterfactualMatch[2], 'apodosis');
    const carriedSubject = extractClauseSubject(protasis.text);
    if (carriedSubject) {
      apodosis.text = ensureExplicitClauseSubject(apodosis.text, carriedSubject);
      if (apodosis.counterfactual && !apodosis.counterfactual.subject) apodosis.counterfactual.subject = carriedSubject;
    }
    root.clauses.push({
      type: 'counterfactual',
      protasis,
      apodosis,
      boundary: 'counterfactual'
    });
    return root;
  }

  const explanatorySplit = trimmed.split(/,\s+for\s+/i);
  if (explanatorySplit.length > 1) {
    root.clauses.push({ ...parseSimpleClause(explanatorySplit[0], 'main'), boundary: 'comma' });
    root.clauses.push({ ...parseSimpleClause(explanatorySplit.slice(1).join(' for '), 'explanatory'), boundary: 'none' });
    return root;
  }

  root.clauses.push({ ...parseSimpleClause(trimmed, 'main'), boundary: 'none' });
  return root;
}

function extractClauseSubject(text) {
  const trimmed = (text || '').trim();
  if (!trimmed) return null;
  const pronounMatch = trimmed.match(/^(i|you|he|she|it|we|they)\b/i);
  if (pronounMatch) return pronounMatch[1].toLowerCase();
  const nominalMatch = trimmed.match(/^(?:the\s+)?((?:[a-z'-]+\s+){0,3}(?:man|woman|king|queen|lord|lady|warrior|person))\b/i);
  return nominalMatch ? nominalMatch[1].toLowerCase().trim() : null;
}

function ensureExplicitClauseSubject(text, subject) {
  const t = (text || '').trim();
  if (!t || !subject) return t;
  if (/^(i|you|he|she|it|we|they)\b/i.test(t)) return t;
  if (/^(would|will|can|could|should|might|must|did|does|do|has|have|had)\b/i.test(t)) {
    return `${subject} ${t}`.replace(/\s+/g, ' ').trim();
  }
  return t;
}

function normalizeLexiconToken(token) {
  if (!token) return token;
  const lower = token.toLowerCase();
  const normalizationMap = {
    gull: 'gold',
    er: 'er',
  };
  return normalizationMap[lower] || lower;
}

function formatUnresolvedToken(token) {
  const raw = (token || '').toString().trim();
  if (!raw) return '[unknown]';
  const normalized = raw.replace(/^\[+|\]+$/g, '').replace(/-reflexive$/i, '').trim();
  return `[${normalized || 'unknown'}]`;
}

function realizeLexicalItem(item) {
  if (!item || item.type === 'space' || item.type === 'punctuation') return '';
  const grammarWordTypes = new Set(['grammar-marker', 'preposition', 'pronoun', 'verb', 'demonstrative', 'possessive', 'article']);
  const sourceToken = (item.value || item.en || '').toLowerCase();
  const resolved = (item.inflected || item.translation || item.on || item.value || item.en || '').toString().trim();
  if (!resolved) return '';
  if (/^\[[^\]]+\]$/.test(resolved)) return resolved;
  if (grammarWordTypes.has(item.wordType)) return resolved;
  if (!sourceToken) return resolved;
  const mapped = EN_TO_ON[sourceToken];
  const hasMeaningfulTranslation = !!mapped && mapped.toLowerCase() !== sourceToken;
  if (!hasMeaningfulTranslation && resolved.toLowerCase() === sourceToken && /[a-z]/i.test(sourceToken)) {
    return formatUnresolvedToken(sourceToken);
  }
  return resolved;
}

function resolveVerbInfinitive(lemma) {
  const normalizedLemma = normalizeLexiconToken(lemma || '');
  if (!normalizedLemma) return '';
  if (CONJ[normalizedLemma] && Array.isArray(CONJ[normalizedLemma])) {
    return CONJ[normalizedLemma][5] || CONJ[normalizedLemma][2] || normalizedLemma;
  }
  return EN_TO_ON[`${normalizedLemma} verb`] || EN_TO_ON[normalizedLemma] || normalizedLemma;
}

function getVerbLemmaAndTense(token) {
  const clean = (token || '').toLowerCase().trim();
  const lemma = normalizeLexiconToken(LEMMAS[clean] || clean);
  const isPast = isLikelyPastVerbForm(clean, lemma) || ['was', 'were', 'did', 'had'].includes(clean);
  return { lemma, tense: isPast ? 'past' : 'present' };
}

function getLocalConjugationIndex(tokens, verbIndex) {
  let subjectOn = null;
  let subjectEn = null;
  let subjectPlural = false;
  for (let i = verbIndex - 1; i >= 0; i--) {
    const tok = tokens[i];
    if (!tok || tok.type === 'space') continue;
    if (tok.type === 'punct') break;
    if (tok.type === 'pronoun' && tok.pron) {
      subjectOn = tok.on || tok.pron.nom;
      break;
    }
    if (tok.type === 'word') {
      subjectEn = (tok.en || '').toLowerCase();
      if (['we','they','you'].includes(subjectEn)) {
        subjectPlural = true;
        break;
      } else if (['i','he','she','it'].includes(subjectEn)) {
        subjectPlural = false;
        break;
      }
    }
    if (tok.type === 'noun') {
      const nounText = (tok.en || '').toLowerCase();
      subjectPlural = nounText.endsWith('s') || ['men','children','people','eyes','feet','teeth','oxen'].includes(nounText);
      break;
    }
  }
  if (subjectOn && PRON_TO_IDX[subjectOn] !== undefined) return PRON_TO_IDX[subjectOn];
  if (subjectEn === 'we') return 3;
  if (subjectEn === 'they') return 5;
  if (subjectEn === 'you') return 4;
  if (subjectEn === 'i') return 0;
  if (subjectEn === 'he' || subjectEn === 'she' || subjectEn === 'it') return 2;
  return subjectPlural ? 5 : 2;
}

function normalizeModifierPhrases(text) {
  if (!text) return { text, modifiers: [] };
  const modifiers = [];
  let normalized = text;

  normalized = normalized.replace(/\b([a-z'-]+)\s+once\s+([a-z'-]+(?:ed|en|wn|ne|t))\b/gi, (_, head, part) => {
    modifiers.push({ type: 'temporal-participial', head: head.toLowerCase(), participle: part.toLowerCase() });
    return `${head} previously ${part}`;
  });

  return { text: normalized, modifiers };
}

function parseSimpleClause(text, clauseType) {
  const modifierNormalized = normalizeModifierPhrases(text.trim());
  const clause = { type: clauseType, text: modifierNormalized.text, relative: null, complement: null, modifiers: modifierNormalized.modifiers };
  clause.constructions = [];
  clause.subjectNP = parseHeadNounPhrase(clause.text);
